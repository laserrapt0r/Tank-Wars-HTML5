}

// Draw the top status bar for the active player.
function drawStatusBar(vga, game) {
  const p = game.players[game.current];
  vga.bar(0, 0, vga.W - 1, 58, COL.SKY);
  frame3DThick(vga, 0, 0, 639, 58, true);

  const panelOn = game.mousePanel && !p.isComputer;
  game._panel = null;
  if (panelOn) {
    drawAimPanel(vga, game, p);                        // sub_557a replaces both left boxes
  } else {
    // name box
    frame3D(vga, 6, 6, 250, 28, true);
    vga.outText(10, 9, p.name, 2, p.colorIndex);

    // weapon box (2nd row, left): count navy + name white (plural-s), or "No Mun no Fun !"
    // when the tank owns nothing (sub_4eae @0x4f36).
    frame3D(vga, 6, 31, 250, 53, false);
    let armed = false; for (let k = 1; k <= 10; k++) if ((p.inventory[k] || 0) > 0) { armed = true; break; }
    if (!armed) {
      vga.outText(30, 38, 'No Mun no Fun !', 1, 15);
    } else {
      const w = WEAPON_TABLE[p.weapon];
      const ammo = p.inventory[p.weapon] || 0;
      vga.outText(10, 38, String(ammo).padStart(3, ' '), 1, COL.BEVEL_DARK);   // count (navy, w3)
      vga.outText(40, 38, w.name + (ammo === 1 ? '' : 's'), 1, 15);            // name (white)
    }
  }

  // arsenal selector strip (sub_4eae): buttons for every OWNED weapon 1..10 at x=217+38n..
  // 253+38n, y31..53; current weapon = inverted frame; each weapon gets its HAND-DRAWN icon
  // (see drawWeaponIcon). Click regions stored on the game for the mouse handler.
  game._arsenal = [];
  // CR-Inducer icons: the ORIGINAL re-randomizes them on EVERY strip redraw (sub_2b8c with
  // Randomize=1 pulls the global RNG) — i.e. whenever a weapon is (re)selected or a new
  // turn starts. Our HUD additionally redraws on every mouse move, so we reroll the seed
  // only when the selection/turn changes (weapon clicks force it via game._crKey = -1),
  // keeping the icon steady between events and leaving the game's RNG sequence untouched.
  const selKey = (game.current << 4) | p.weapon;
  if (game._crKey !== selKey) {
    game._crKey = selKey;
    game._crSeed = (Math.imul((game._crSeed ?? 0x1234567), 1103515245) + 12345) >>> 0;
  }
  const crSeed = { s: game._crSeed >>> 0 };
  for (let n = 1; n <= 10; n++) {
    if ((p.inventory[n] || 0) <= 0) continue;
    const x1 = 217 + 38 * n, x2 = 253 + 38 * n;
    frame3D(vga, x1, 31, x2, 53, p.weapon === n);
    drawWeaponIcon(vga, n, 235 + 38 * n, crSeed);
    game._arsenal.push({ w: n, x1, y1: 31, x2, y2: 53 });
  }

  // stats box (sub_5b69: Str field widths 6/6/3/3/2/4, rows at y=10/18)
  frame3D(vga, 255, 6, 633, 28, true);
  const c = COL.HUD_TEXT;
  vga.outText(263, 10, `${String(p.points).padStart(6)} Points`, 1, c);
  vga.outText(263, 18, `${String(p.wins).padStart(6)} Win${p.wins === 1 ? '' : 's'}`, 1, c); // plural-s
  vga.outText(385, 10, `${String(p.crew).padStart(3)} Men`, 1, c);
  vga.outText(385, 18, `Wind:${String(Math.abs(game.wind)).padStart(3)} ${windArrow(game.wind)}`, 1, c);
  const shownAngle = 90 - Math.abs(90 - p.angle);
  vga.outText(490, 10, `Angle:  ${String(shownAngle).padStart(2)}° ${p.angle < 90 ? '→' : (p.angle > 90 ? '←' : '↑')}`, 1, c);
  vga.outText(490, 18, `Power:${String(p.power).padStart(4)}`, 1, c);

  // reflecting-walls "R" indicator — red, SIZE 2 (sub_5b69: SetTextStyle size 2 at (613,11))
  frame3D(vga, 610, 8, 630, 26, false);
  if (game.options.reflectActive) vga.outText(613, 11, 'R', 2, COL.NUKE_RED);
}




// ===== markdown.js =====
// markdown.js — a compact, dependency-free Markdown→HTML renderer, enough for our
// PORTIERUNG.md (headings, bold, inline code, code fences, lists, tables, links,
// blockquotes, horizontal rules, paragraphs).

function esc(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// inline: `code`, **bold**, [text](url)
function inline(s) {
  let out = '';
  let i = 0;
  while (i < s.length) {
    const ch = s[i];
    if (ch === '`') {
      const j = s.indexOf('`', i + 1);
      if (j > i) { out += '<code>' + esc(s.slice(i + 1, j)) + '</code>'; i = j + 1; continue; }
    }
    if (ch === '*' && s[i + 1] === '*') {
      const j = s.indexOf('**', i + 2);
      if (j > i) { out += '<strong>' + inline(s.slice(i + 2, j)) + '</strong>'; i = j + 2; continue; }
    }
    if (ch === '[') {
      const close = s.indexOf(']', i);
      if (close > i && s[close + 1] === '(') {
        const end = s.indexOf(')', close + 2);
        if (end > close) {
          const text = s.slice(i + 1, close);
          const href = s.slice(close + 2, end);
          const safe = /^https?:\/\//.test(href) ? href : '#';
          out += `<a href="${esc(safe)}"${safe !== '#' ? ' target="_blank" rel="noopener"' : ''}>` +
                 inline(text) + '</a>';
          i = end + 1; continue;
        }
      }
    }
    out += esc(ch);
    i++;
  }
  return out;
}

function mdToHtml(md) {
  const lines = md.replace(/\r\n/g, '\n').split('\n');
  const html = [];
  let i = 0;
  let listType = null; // 'ul' | 'ol'
  const closeList = () => { if (listType) { html.push(`</${listType}>`); listType = null; } };

  while (i < lines.length) {
    let line = lines[i];

    // code fence
    if (/^```/.test(line)) {
      closeList();
      const buf = [];
      i++;
      while (i < lines.length && !/^```/.test(lines[i])) { buf.push(esc(lines[i])); i++; }
      i++; // skip closing fence
      html.push('<pre><code>' + buf.join('\n') + '</code></pre>');
      continue;
    }
    // table: a line with | and the next line is a separator |---|
    if (line.includes('|') && i + 1 < lines.length && /^\s*\|?[\s:|-]+\|[\s:|-]*$/.test(lines[i + 1]) && lines[i + 1].includes('-')) {
      closeList();
      const parseRow = (l) => l.replace(/^\s*\|/, '').replace(/\|\s*$/, '').split('|').map(c => c.trim());
      const header = parseRow(line);
      i += 2;
      html.push('<table><thead><tr>' + header.map(c => `<th>${inline(c)}</th>`).join('') + '</tr></thead><tbody>');
      while (i < lines.length && lines[i].includes('|') && lines[i].trim() !== '') {
        const cells = parseRow(lines[i]);
        html.push('<tr>' + cells.map(c => `<td>${inline(c)}</td>`).join('') + '</tr>');
        i++;
      }
      html.push('</tbody></table>');
      continue;
    }
    // heading
    let m = /^(#{1,6})\s+(.*)$/.exec(line);
    if (m) { closeList(); const n = m[1].length; html.push(`<h${n}>${inline(m[2])}</h${n}>`); i++; continue; }
    // hr
    if (/^\s*(---|___|\*\*\*)\s*$/.test(line)) { closeList(); html.push('<hr>'); i++; continue; }
    // blockquote
    if (/^\s*>\s?/.test(line)) {
      closeList();
      const buf = [];
      while (i < lines.length && /^\s*>\s?/.test(lines[i])) { buf.push(inline(lines[i].replace(/^\s*>\s?/, ''))); i++; }
      html.push('<blockquote>' + buf.join('<br>') + '</blockquote>');
      continue;
    }
    // list item (unordered or ordered) — gather wrapped continuation lines
    const um = /^\s*[-*]\s+(.*)$/.exec(line);
    const om = /^\s*\d+\.\s+(.*)$/.exec(line);
    if (um || om) {
      const want = um ? 'ul' : 'ol';
      if (listType !== want) { closeList(); html.push(`<${want}>`); listType = want; }
      const parts = [(um || om)[1]];
      i++;
      while (i < lines.length && lines[i].trim() !== '' &&
             !/^\s*[-*]\s+/.test(lines[i]) && !/^\s*\d+\.\s+/.test(lines[i]) &&
             !/^(#{1,6}\s|```|\s*>|\s*(---|___|\*\*\*)\s*$)/.test(lines[i])) {
        parts.push(lines[i].trim()); i++;
      }
      html.push('<li>' + inline(parts.join(' ')) + '</li>');
      continue;
    }
    // blank line
    if (line.trim() === '') { closeList(); i++; continue; }
    // paragraph: gather raw lines, join, THEN inline once (so **bold** may span lines)
    closeList();
    const buf = [line];
    i++;
    while (i < lines.length && lines[i].trim() !== '' && !/^(#{1,6}\s|```|\s*[-*]\s|\s*\d+\.\s|\s*>|\s*(---|___|\*\*\*)\s*$)/.test(lines[i]) && !(lines[i].includes('|') && i + 1 < lines.length && lines[i + 1].includes('-') && lines[i+1].includes('|'))) {
      buf.push(lines[i]); i++;
    }
    html.push('<p>' + inline(buf.join(' ')) + '</p>');
  }
  closeList();
  return html.join('\n');
}

Turn‑based artillery duel (2–10 tanks) on destructible terrain. In turn, each
tank aims (angle + power) and fires a weapon; the goal is to take out all the others.

**Crew = life energy.** Each tank has **0–100 men** (starting at 100). The crew is
at the same time its "health": at **0 men the tank explodes**. The crew also limits the
**maximum power to \`10 × crew\`** (full = 1000), and the **brightness** of the tank drops
with the crew. Crew is lost through explosion and fall damage.

**Damage**
- **Explosion damage:** A hit within the radius \`B\` of a weapon costs \`80·B/D\` men, where
  \`D = max(1, distance−3)\`. A **shield** reduces this to \`B/D\` (the factor of 80 removed).
- **Fall damage:** If the ground beneath a tank is destroyed, it falls. Per **2 fallen pixels
  1 man dies** (\`Crew −= ⌊fall height/2⌋\`); if the **fall height is greater than \`2 × crew\`, the
  entire crew is dead**. A full tank (100) therefore survives falls up to ~200 px (heavily
  weakened) and dies above that. A **parachute** prevents fall damage completely (the tank
  still falls down). After damage the power is re‑clamped to \`10 × crew\`.

**Weapons & shop** (buyable between rounds; sold at half price):

| # | Weapon | Effect | Radius B | Price | Quantity |
|---|---|---|---|---|---|
| 1 | Hand Grenade | crater + explosion | 4 | 1000 | 100 (start 20) |
| 2 | 5 kT Nuke | large crater | 30 | 2000 | 10 |
| 3 | 5 MT Nuke | huge crater (white flash) | 100 | 10000 | 1 |
| 4 | Earthquake | crack fissure with ±45° branches | 30 | 5000 | 1 |
| 5 | Ping Pong Jack | bouncing projectile, digs a track + bounces back | 10 | 5000 | 5 |
| 6 / 7 | Chain‑Reaction‑Inducer 256 / 512 | "eats" terrain fractally in the shot direction | 4 / 8 | 5000 / 10000 | 1 |
| 8 / 9 | Julia 256 / 512 | like the CR‑Inducer, different fractal pattern | 4 / 8 | 5000 / 10000 | 1 |
| 10 | Captain Caveman | drills a tunnel along the surface | 5 | 20000 | 1 |
| 11 | Parachute | **protection:** no fall damage (1 round) | – | 10000 | 1 |
| 12 | Quake Protection | **protection:** against Earthquake (1 round) | – | 20000 | 1 |
| 13 | Protection Shield | **protection:** explosion damage ÷80 (1 round) | – | 20000 | 1 |

Protection items (11–13) last **one round** and are consumed at the end of the round.

**Wind:** random per round (\`round(1000·(2·R−1)⁵)\`, range ±1000, strongly weighted toward calm); deflects
projectiles horizontally (\`vx += Wind·1e‑6\` per step). **Reflecting walls** (option: No / RND
/ Yes) make projectiles bounce off the field edges.

**End of round & points:** A round ends when ≤ 1 tank is alive, no one is armed anymore, or
after 20 turn rotations. Each **survivor** receives \`(players − survivors) × 1000 ÷ survivors\`
as **money and points**; whoever kills an enemy man additionally gets **+50 points/$ per
man** (including those caused by fall damage). The sole winner of a round receives **+1 win**.

**Controls:** ◄/► angle ±1°, ▲/▼ power ±1, PgUp/PgDn power ±100, Home = max power,
End = 250; **Enter or mouse click = fire**, **Tab = switch weapon**, spacebar = status display,
F1 = help, Esc = quit. The AI opponents have
personalities (Berti/Klaus random, Jack a Ping‑Pong specialist, Ballisto/Terminator ballistic)
— all rebuilt 1:1 from the original (see §11).

**Audio/visual cues:** At the start of a round each tank "chirps" as it is set down (400→700 Hz
sweep, \`sub_5a48\` in \`sub_7060\`). When a ballistic AI (Jack/Ballisto/Terminator) aims, a
**shrinking red ring** briefly appears around its **target** just before firing (\`sub_b4a2\`,
colour 12) — from the attacked player's point of view, around their own tank.

> All the values/formulas above are **reconstructed 1:1 from the machine code**; the technical
> details, addresses and derivations are in the following sections.

## 1. Approach (methodology)

1. **File analysis.** \`TANK_ENG.EXE\` is a DOS MZ executable, produced with **Turbo
   Pascal 7.0** (real mode, 16‑bit). It contains the **Borland EGAVGA BGI graphics driver**
   embedded (signature "BGI Device Driver (EGAVGA) 2.00 - Mar 21 1988"). Graphics mode:
   **VGA 640×480, 16 colors**, single video page.
2. **Loader rebuilt.** A custom Python script reads the MZ header, applies all
   **2171 relocations** (base 0) and produces the load image \`image.bin\`
   (linear = segment·16 + offset).
3. **Disassembled** with *capstone* (16‑bit). Segment layout (paragraph values):
   \`0000\` = game code (entry \`0000:EA58\`), \`0EB0\` = custom graphics/UI/mouse unit incl.
   embedded BGI driver, \`1129\` = clock unit (centiseconds), \`1138\` = DOS unit,
   \`1140\` = **CRT**, \`11A3\` = **GRAPH**, \`1509\` = **SYSTEM**, \`16F3\` = data segment.
4. **RTL symbol map.** All **124 far‑call targets** into the units were identified
   (fingerprints: port accesses 0x42/0x43/0x61 for \`Sound\`, \`0x1234DD div f\`, INT 16h,
   the Real48 arithmetic, the LCG \`×0x08088405+1\` for \`Random\`). With this the game code was
   **fully symbolically** annotated (\`game_disasm.txt\`): every \`Sound\`, \`PutPixel\`,
   \`Sin\`, \`Round\` etc. is readable in plain text.
5. **Game logic decompiled.** From the annotated code, palette, terrain generation,
   tank sprite, ballistics, wind, damage, weapons, shop, AI, sounds and timing were
   extracted as exact formulas/constants (each constant is addressably documented in the code).
6. **Port implemented** in modular ES6 JavaScript, 1:1 following these formulas.
7. **Verified** against screenshots of the original (DOSBox‑X headless via Xvfb).

> **Important insight (Sin/Cos):** In the TP7 SYSTEM unit, \`1509:0x144f\` = **Cos**,
> \`1509:0x1462\` = **Sin** (the Cos routine adds π/2 and falls into the Sin core). Only with
> this assignment are **ballistics, barrel direction and terrain generation simultaneously
> consistent** — it also resolves the single open uncertainty of the terrain analysis.

## 2. Graphics

### 2.1 Resolution & framebuffer
VGA 640×480, 16 colors, indexed, single page. The port reproduces the **BGI drawing model**
in [\`js/vga.js\`](html5-port/js/vga.js): an indexed 640×480 buffer with
\`putPixel/getPixel\`, Bresenham \`line\`, \`bar\` (filled rectangle), midpoint \`circle\`,
\`fillCircle\`, scanline \`floodFill\` and \`outText\` (8×8 bitmap font, integer scaling).
The output is blitted into a canvas via the active palette.

### 2.2 Palette (exactly from \`SetRGBPalette\`, routine 0x1dfb–0x1f32)
The game sets 16 colors with **6‑bit DAC values (0..63)**; the VGA hardware expands
them with the rule **\`v8 = (v6<<2) | (v6>>4)\`** (not \`v*255/63\` — only this way do the
DOSBox samples match exactly, e.g. 12→48, 48→195).

| Idx | 6‑bit | 8‑bit | Menu role | Game role |
|----:|-------|-------|-----------|-------------|
| 0 | 0,0,0 | 0,0,0 | black | black |
| 1 | 63,0,0 | 255,0,0 | title/red | **Tank 1 / red** |
| 2 | 0,0,43 | 0,0,174 | button text | **Tank 2 (navy)** |
| 3 | 63,63,0 | 255,255,0 | | Tank 3 (yellow) |
| 4 | 0,36,16 | 0,146,65 | | Tank 4 (dark green) |
| 5 | 36,16,12 | 146,65,48 | | Tank 5 (brown) |
| 6 | 63,63,63 | 255,255,255 | | Tank 6 (white) |
| 7 | 44,0,55 | 178,0,223 | | Tank 7 (violet) |
| 8 | 63,28,0 | 255,113,0 | | Tank 8 (orange) |
| 9 | 35,54,0 | 142,219,0 | | Tank 9 (lime) |
| 10 | 59,0,47 | 239,0,190 | | Tank 10 (magenta) |
| 11 | 10,20,63 | 40,81,255 | **menu blue** | **sky** (→16,51,63 = 65,207,255) |
| 12 | 63,0,0 | 255,0,0 | red | **nuke red zone** |
| 13 | 0,63,0 | 0,255,0 | | **ground green** |
| 14 | 0,0,0 | 0,0,0 | black | **bevel dark** (→0,0,32 = navy) |
| 15 | 48,48,48 | 195,195,195 | **UI gray** | **bevel light** (→ white) |

On entering a game (0xdbc7) the indices 11→sky, 15→white, 14→navy
are remapped. **Player p uses color index p (1..10)** — verified against the original (player 2 =
core pixel 0,0,174 = index 2). These indices never collide with sky/ground/bevel,
which is why the **health‑dependent darkening** of the tank (\`SetRGBPalette(color,
R·men/100, …)\`) never corrupts sky or UI. Implemented in
[\`js/palette.js\`](html5-port/js/palette.js).

### 2.3 Screen layout (routine sub_5b69)
Status line y 0..58 (\`Frame3DThick(0,0,639,58)\`), playfield (0,59)–(639,479).
Text positions: Points (263,10), Wins (263,18), Men (385,10), Wind (385,18),
Angle° (490,10), Power (490,18); name box (6,6,250,28), weapon box (6,32,250,54),
"R" box (610,8,630,26). Implemented in [\`js/hud.js\`](html5-port/js/hud.js).

### 2.4 Terrain (sub_5e3f)
Segmented random walk ("turtle") into a height array per column (original DS:0x119a),
then a ground‑green fill. Since |θ| ≤ 1.2 rad (< π/2), cos θ > 0, so the surface is
unambiguous in x. Step: \`x += cos(θ)·amp\`, \`y += sin(θ)·amp\`. Parameters (all from the code):
\`stepRange = RandomN(40)+10\`, \`R1 = RandomR+0.3\`, start \`x=4\`, \`y=445−RandomN(206)\`,
\`θ = RandomR·π/2 − π/4\`, \`amp = RandomN(stepRange)+5\`; θ random walk \`θ += RandomR·R1 − R1/2\`,
clamped to ±1.2 (reset to ∓1.0), y clamped [88,470]. New for each game (\`Randomize\`).
Implemented in [\`js/terrain.js\`](html5-port/js/terrain.js).

### 2.5 Tank sprite (sub_64cc hull/turret, sub_44a6 barrel)
Full tank = **turret + hull**, measured pixel‑exact against the original (game_landed.png), 8 rows of
horizontal lines around the base center point (cx,cy): **turret** (3 rows, widths 7/9/9 at
cy−7…cy−5) on top of the **hull** (5 rows, 15/17/19/17/15 at cy−4…cy). Barrel = line of length 10 from the
pivot point (cx, cy−5) in the direction \`(cos θ, −sin θ)\`; muzzle (shot origin) length 15.
Brightness ∝ crew/100. Implemented in [\`js/tank.js\`](html5-port/js/tank.js).

**Trajectory clipping & software cursor:** Markers/trace are clipped to the playfield
(y ≥ 63) — never drawn into the status line (as in the original). Menu/names/shop use a
drawn **software mouse cursor** (OS cursor hidden over the canvas): it follows the
mouse and **jumps to the selected element on keyboard selection** (like MouseGlideTo/
MouseToMenuItem in the original).

### 2.6 Font
The original draws text with the BGI default bitmap font **8×8**, integer‑scaled
(status line scale 1, menu/title scale 2). Verified: text sits on 8‑px cell boundaries,
baseline = row 6, descenders (g, y, p, j, q) in row 7.

**The complete character set was extracted pixel‑exact from the running original**
([\`js/font8x8.js\`](html5-port/js/font8x8.js)): all A–Z, a–z, 0–9 as well as \`: . ! % $ - ©\`.
Method — the ×2‑scaled menu texts were gray‑isolated and downsampled onto the 8×8 base;
characters not appearing in the menu were typed into the name input field and captured there.
Arrows/degree signs (\`↑ ← → °\`) for the HUD are retained.

**Menu style (measured from the original):** blue background (index 11), buttons **unfilled**
with 3D bevel (light top/left = index 15 grey, dark bottom/right = index 14), text **gray
embossed** (1‑px shadow), title red with a red underline, corner "©1995 ML" white,
full-screen \`Frame3DThick\`. Implemented in \`drawMenu\`/\`embText\`
([\`js/main.js\`](html5-port/js/main.js)). In the original, palette index 0 is **the
background colour** (not black).

## 3. Physics / ballistics (sub_bd08 launch, sub_b785 loop)

Explicit Euler method, **dt = 1 per step**, position accumulated in full precision,
only a rounded copy for pixel tests:

\`\`\`
Arad = angle° · π/180
VX0 =  0.003 · Power · cos(Arad)
VY0 = -0.003 · Power · sin(Arad)          (y downward ⇒ −sin = upward)
Muzzle: (tankX + round(15·cos), tankY − 5 − round(15·sin))

per step:
  X += VX ;  Y += VY
  [Reflecting Walls: elastic bounce at x∈[4,634], y∈[63,474]]
  VX += Wind · 1e-6
  VY += 0.0011                            (gravity)
\`\`\`

**Constants** (Real48, addressed in the code): velocity scale \`0.003\` @0xbe6d,
gravity \`0.0011\` @0xba8c, wind scale \`1e‑6\` @0xba4f, π/180 @0xbd7a, barrel length 15 @0xbdca.

**Collision** (sub_b560): the front corner pixel of the 2×2 marker (according to the VX/VY sign)
counts as a hit if its color ∉ {0 sky, 15 trace} and within x∈(4,635),
y∈(63,475). Ground = 13, tank = 1..12, marker = 14, trace = 15. Also aborts at
Y≥475 (ground edge) or step counter > 20000. Without reflecting walls the shot leaves
the field sideways and falls out. Reference (45°/250/wind 0): clean parabola, apex
≈128 px, range ≈527 px, ≈994 steps. Implemented in
[\`js/physics.js\`](html5-port/js/physics.js).

**Wind** (db1f): \`Wind = round(1000·(2·RandomR−1)^5)\`, integer [−1000,1000], strongly
calm‑biased (fifth power). Sign = direction (arrow), magnitude displayed.

**Power/angle:** angle 0..180° (0=right, 90=up, 180=left), display \`90−|90−angle|\`.
Power 0..**10·crew** (starting crew 100 ⇒ max 1000); default 250, "End"=250, "Home"=max,
±1 (arrows) / ±100 (PgUp/PgDn). After damage, power re‑clamped to 10·crew.

**Fall damage** (sub_6d3c): if the ground beneath a tank falls away, it falls (pixel by pixel,
with a sideways slide into the open side) until it finds footing again;
\`crew −= fall height div 2\` (1 man per 2 px); \`fall height > 2·crew\` ⇒ crew dead; then
\`power = min(power, 10·crew)\`. The fall is **silent** (sub_6d3c has no \`Sound\` instruction).
**Parachute** (item) ⇒ the tank still settles, but damage 0 (flag 0 from sub_7060/sub_02d4).
In the port implemented as a visible animation phase \`stepAnim 'fall'\` (see §11).

**Timing / animations (measured in DOSBox, cycles=fixed 20000):** The original
clocks **every** integration step of the flight via a CPU‑calibrated **busy‑wait**
(\`sub_0a3a\`, factor 2.0 → ~2.05 ms/step), not by VSync. By tracking a
projectile and fitting \`y(t)=½·g·rate²·t²\` (g=0.0011 px/step²), the
step rate works out to **487 steps/s**. The **parachute descent** (\`sub_7060\`) in contrast waits
**1 VGA vertical retrace per descent step** (~1 px / 60‑Hz vsync) — measured **58 px/s**
(strictly linear, 117 px in 2.00 s).

The port drives both processes **time‑based** (wall clock, not framerate): \`stepFlight(dt)\`
runs at \`FLIGHT_STEPS_PER_SEC = 487\`, \`stepRoundIntro(dt)\` at \`INTRO_PX_PER_SEC = 58\`
(each with a fractional accumulator). This makes the pace **independent of the refresh
rate** (60/120/144 Hz play identically).

**Speeding up the parachute:** As in the original, **every key / every mouse click**
during the descent skips the vsync wait time (in the original via \`KeyPressed\`/\`MouseButtonDown\` before
\`WaitVRetrace\`; globally also through the demo parameter \`D\`, which sets \`[0x116e]=1\`). In the port
\`keydown\`/\`mousedown\` sets the flag \`introFast\` → the rest of the descent runs at full
speed (\`INTRO_FAST_PX_PER_SEC\`).

**All weapon effects are — as in the original — progressively animated** (not instant), with
sound, via \`game.stepAnim(dt)\` (WALL CLOCK, refresh‑independent):
- **Crater/nukes (code 0xbf8a..0xc0e1):** the original draws the crater shape in
  palette index 12 (previously set via \`SetRGBPalette\` to the SKY COLOR) and then ramps
  this entry **sky→white→sky** in 15+16 vsync steps (each \`WaitVRetrace\`,
  ≈0.52 s) — a crater‑shaped **white flash** —, after which it is carved with color 0.
  Reproduced 1:1 in the port as a palette animation (duration independent of B).
- **Earthquake/Ping‑Pong/CR/Julia/Caveman:** these loops have **no delay at all** in the original —
  their pace is the raw CPU pixel work. The port prices each sub‑operation
  by its "samples" (touched pixels) and plays them back at \`EFFECT_SAMPLES_PER_SEC = 5000\`
  — **calibrated against a DOSBox measurement** (cycles=20000): a Ping‑Pong dug a
  375‑px channel in 10.37 s ≈ 2478 steps × 21 samples ⇒ ~5000 samples/s. An earthquake
  thus takes — as in the original — several seconds.
- **Sounds of the effects:** the original pulses **per eaten ground pixel** \`Sound(f)\` and
  immediately \`NoSound\` (earthquake f=500) → a **rattling clatter**, not a continuous tone. The port
  reproduces this via \`pcspeaker.gate()\`: tone on while ground is being eaten, gaps
  when the lines cross already‑open space (Ping‑Pong \`1000−y\`, eater 500, Caveman 700).

Flight and parachute pace are **measured directly against the original** (see above), the effect pace
via the Ping‑Pong measurement. Since everything is slightly cycles‑dependent,
\`FLIGHT_STEPS_PER_SEC\`/\`INTRO_PX_PER_SEC\`/\`EFFECT_SAMPLES_PER_SEC\` are laid out in \`game.js\` as
individual adjustment knobs, in case a different DOSBox configuration is compared.

| # | Name | Cat | Price $ | Lot | B (radius/param) |
|--:|------|:--:|--:|--:|--:|
| 1 | HandGrenade | 0 | 1000 | 100 | 4 |
| 2 | 5 kT Nuke | 0 | 2000 | 10 | 30 |
| 3 | 5 MT Nuke | 0 | 10000 | 1 | 100 |
| 4 | Earthquake | 1 | 5000 | 1 | 30 |
| 5 | Ping Pong Jack | 2 | 5000 | 5 | 10 |
| 6 | CR‑Inducer 256 | 3 | 5000 | 1 | 4 (→256 px) |
| 7 | CR‑Inducer 512 | 3 | 10000 | 1 | 8 (→512 px) |
| 8 | Julia 256 | 4 | 5000 | 1 | 4 |
| 9 | Julia 512 | 4 | 10000 | 1 | 8 |
| 10 | Captain Caveman | 5 | 20000 | 1 | 5 |

Start: **20 HandGrenades**. Categories: 0 crater bomb, 1 earthquake, 2 Ping‑Pong,
3 CR‑Inducer, 4 Julia, 5 Caveman, 6 protection.

**Arsenal reset per game** (decompiled from 0x7924/0x84b9): At the start of **every** game
all players are reset — crew=100, angle=45, current weapon=1,
**HandGrenades=20, all other weapon slots=0**; the shop runs afterwards (purchases apply
only to the upcoming game, the arsenal does not carry over). If the current weapon
runs out during the game, it automatically switches to the next available one.

**Effects** (implemented in [\`js/weapons.js\`](html5-port/js/weapons.js)):
- **Crater (0):** filled circle of radius B removes ground; nuke "red zone" radius B.
- **Direct explosion damage** (shared loop 0xc8ca): \`dx=tankX−impX\`,
  \`dy=(tankY−impY)−4\`, \`dist=√(dx²+dy²)\`, \`D=max(1,round(dist−3))\`; if **B > D**:
  \`damage = (80·B) div D\` (with shield \`B div D\`), \`= min(damage, crew)\`.
  **Important:** this blast is computed for ALL categories at the **original impact point**
  with the weapon's own B (the effect routines receive the impact as a value).
  Damage along the path traversed by the effect arises **not** from the blast,
  but from **settling/fall damage** when the ground beneath tanks breaks away.
- **Earthquake (1) — decompiled 1:1** (sub_3511 → sub_2f9a recursive → sub_2c0d):
  \`count = 20·power\`; direction normalized to length 0.7 (with the original quirk that
  the vy normalization reuses the already normalized vx); start = impact −
  \`(0.005·count·vx/2, −0.005·count·vy/2)\`. Per step: \`(dx,dy)=0.7·(cos α, sin α)\`,
  position += (dx,dy), \`α += rand·0.08 − 0.04\`; **two cross lines** are drawn
  from the path line to their perpendicular offset \`0.005·count·(dy,−dx)\` → a **wedge**,
  at the epicenter \`0.0035·count\` px wide, tapering to 0 at the tip. With **1/20 per step**:
  \`n = Random(0.2·count)\`; n odd → branch at **−45°**, n even → branch at **+45°**
  (with parent cross offset \`0.005·n·(dy,−dx)\`); the parent loses the branch length
  (\`count −= n\`) → the characteristic **small ramifications**. sub_2c0d checks per
  line both endpoints (only continues if ground), samples \`0.0035·count+1\` points
  (clip x∈[4,635], y∈[63,475]), replaces only GROUND pixels with color 0 (shows sky),
  at \`count>1000\` additionally as a **2×2 block**; **per pixel \`Sound(500)\`/\`NoSound\`**
  (rattling rumble). \`Randomize\` per call — every crack is different. Tanks in the
  crack bounding box lose \`crew div 2\` (except with **Quake Protection**), plus the
  shared direct blast (B=30) at the epicenter.
- **Ping‑Pong (2) — decompiled 1:1** (sub_371d, all TP Real constants decoded). The
  routine has **TWO loops**:
  - **Loop 1 (descent, 0x37ef):** initial vx,vy **÷ 3.0**; per step \`pos += vel\`; with
    the Reflect flag \`[0xcf7]\` set, bounce at **x=635→625 / x=4→14 / ceiling y=63→64**
    (sign of the matching velocity flipped); then \`vy += 0.00012222\` (=0.0011/9);
    clear a 21‑px swath (round(x)−10..+10) with \`Sound(1000−y)\`. Runs until **y ≥ 475**.
    Busy‑wait 1.0.
  - **Loop 2 (the "bouncing back", 0x3a6c):** from the ground the ball mills itself **straight
    back up** through its landing swath, until it rises above the terrain
    (\`while min_surface ≤ y: y−−, clear swath\`). **Not** coupled to the Reflect flag
    (this is the eponymous Ping‑Pong behavior). Busy‑wait 3.0 (3× slower).

  Direct blast B=10 at the original impact; the dug channel then **collapses**
  (sub_625d), path victims via fall damage.
- **CR‑Inducer/Julia (3/4) — decompiled 1:1** (sub_2307, recursive direction fractal,
  + driver sub_2b8c): \`size = B·64\` (256/512), start = impact, direction **2 (east)**
  if vx>0, otherwise **3 (west)**. 8 directions (1,2:x+ · 3,4:x− · 5,6:y+ · 7,8:y−); each
  expands into **4 half‑size sub‑curves** according to the production rules extracted from
  0x2466..0x2b86 (e.g. dir 1 → [7|8],[1|2],[6|5],[1|2]). **CR** (flag 1) chooses per
  slot with p=1/2 (\`Random(10)\` odd) the alternative direction → chaotic
  chain reaction; **Julia** (flag 0) is strictly deterministic/self‑similar. Base case
  (size 1): 1‑px step, clip x∈[4,635]/y∈[63,475], eats only GROUND (continuous tone 500 Hz).
- **Captain Caveman (5) — 1:1** (sub_3bb7, **3 phases**, each with bounds test sub_3b4d
  = x∈[4,635] and advance sub_3b7f = x±1 in the shot direction):
  **Phase 1 (0x3bcb)** — advance from the impact until the pixel **on the shot row** is
  ground (hillside reached); **Phase 2 (0x3bee)** — skip over flat terrain
  as long as \`surface+8 ≥ Y\` and there is ground (until a hill begins >8 px above the row);
  **Phase 3 (0x3c28)** — as long as \`surface+8 < Y\` drill the column: clear rows \`surface+9..Y\`
  (a 9‑px roof remains), \`Sound(700)\` per column; stop at the valley. Direct blast **B=5**.
- **Protection (6):** no attack effect.

**Terrain settling (sub_625d) — runs after EVERY impact** over the effect's bounding box
(tracked per weapon and expanded by ±B around the impact): per column the surface sinks
over eaten air; then repeated sweeps — \`top\` moves through the solid block down to the first gap,
\`bot\` to the next ground below it; as long as a gap exists, **1 pixel falls per sweep**
(the topmost ground pixel of the column disappears, one appears at the gap head — the block
sinks), with a \`Sound(500)\` pulse per moved pixel,
until nothing falls anymore. This causes e.g. the roof over the earthquake fissure to collapse and
the eater's excavations to slump into craters. The port pre‑simulates the collapse on
impact and plays it back as a continuation of the effect animation (tank settling
+ fall damage follow as before at the conclusion).

**Color of the removed terrain (not a real deviation):** the original draws sky,
crater, tunnel etc. as pixel value **0**. The BGI driver maps, via \`SetBkColor\`, the display
of pixel value 0 to the background color (sky) and \`ClearDevice\` fills the playfield
with 0 — the sky therefore *is* pixel value 0, displayed as sky blue. The collision
(\`sub_b560\`) treats pixel values 0 and 15 (trace) as passable; projectiles fly through
sky and craters. The port internally uses a different index for "sky/removed", but displays
the same sky blue and the same passable collision → **visually and behaviorally
identical**.

**Scoring:** per killed enemy man **50 points + $50** to the shooter (⇒ 5000 per
100‑man tank). End‑of‑round pot: each survivor receives \`(players−survivors)·1000 /
survivors\` to points **and** money. 1 point = $1. Win counter +1 if exactly one
survivor. Ammo −1 per shot; empty ⇒ next available weapon.

**Protection systems** are inventory holdings of weapons 11/12/13 and act **per round**
(1 consumed at the end of the round each). Parachute 100% against falling, Quake 100% against earthquake,
Shield reduces direct damage to \`B/D\` instead of \`80·B/D\` (factor 1/80 ≈ 98.75% — the code
has **no** literal "95%" value; the manual rounds).

## 5. Computer AI (rules §5)

**No iterative trial shooting** — the AI **inverts the ballistics analytically**
([\`js/ai.js\`](html5-port/js/ai.js)):
- Parabolic (Ballisto/Jack): fixed angle 45°/135°,
  \`power = round( 333.333 · √( 0.0011 · dX² / (dX+dY) ) )\` (333.333 = 1/0.003 = 1/C,
  0.0011 = gravity — exact inversion of the engine).
- Direct fire (Terminator super weapons): \`angle = round( arctan(dHeight/dX) · 180/π )\`, max power.

**Error rate** (default 10%, menu 0..100): multiplicative random error on the distance
\`1 + ((rate+1)/100)·(2·RandomR−1)\` (≈ ±(rate+1)%), **halved after each shot** (÷2).

**5 personalities:** Berti (purely random, holds weapon ~20%), Klaus (random, ~50%),
Jack (prefers Ping‑Pong; ballistic but deliberately less accurate, ×3 error),
Ballisto (precise ballistics), Terminator (super‑weapon aware, otherwise max power + direction).
**20‑shot interrupt:** after 20 shots the game aborts. **Esc/surrender** sets an
abort flag ⇒ no winner (the original has no "Winner" string at all).

## 6. Sound (PC speaker → WebAudio)

Square wave. \`Sound(Hz)\`/\`NoSound\`/\`Delay(ms)\` → oscillator/gain/scheduling in
[\`js/pcspeaker.js\`](html5-port/js/pcspeaker.js); all effects as exact (Hz,ms) recipes in
[\`js/sounds.js\`](html5-port/js/sounds.js). All **27 \`Sound\` call sites** were decoded.
Examples (from the code): launch sweep 1000→400 Hz (step 8, 1 ms/step), flight whistle
\`400 + round(y/4)\` Hz (only with "Flight SoundFX"), impact 400→100, explosion 300→600→300 +
boom sweep 900→200, blast circle \`200 + 2·r\`, menu blips 300–500 Hz, option values encode
their value in the pitch. Gate: "SoundFX" switches almost everything, "Flight SoundFX" only the
flight whistle. **No separate melody Easter egg** — the "music" of the manual is the
shot→flight→explosion sequence itself (verified in the code: no note table present).

## 7. Options / flow (rules §6)

Menu defaults (init 0x2004–0x2051): SoundFX=on, Flight SoundFX=off, Reflecting Walls=RND
(0=No/1=RND/2=Yes), Show Trace=on, Use Mouse=on, Computer Error Rate=10% (0..100),
Money from Start=0 (0..100000, step 1000), Games per Match=10 (1..50), Number of
Players=2 (2..10). Flow: main menu → "The names please" (human/computer + name /
computer type; **first human/computer, then name**) → **parachute descent** of the tanks →
rounds (aiming → flight → impact → settling) → shop between games → rankings
(sorted by wins, then points). Command line (original): \`D\` demo (10 computers, 2 per
type), \`Fx\` error rate x%, \`M\` mouse off, \`?\` syntax.

**Purchase menu (sub_9d62, verified against real original screenshots):** appears **before every
game per human player** (computers and penniless players with nothing to sell are
skipped). 3‑column layout as in the original: at the top a **status line** (name, Men/Wins/
Points/Dollar, current inventory of the 10 attack weapons in 2 columns); on the left a **weapon list**
of all 13 items \`"<lot> <name>………"\` (upper box = 10 attack, lower = 3 protection weapons); center
**"Buy these"** with 13 price buttons \`"<price> $"\` (empty if price > money); on the right **"For Sale"**
with \`"<price/2> $"\` (empty if inventory < lot). Red headers "You have N $ ( M Games to go )"
and "Go to next Window using [Tab].". **Done = click on the red bar "Start the N. Game,
<name> !"** at the bottom. Operated by mouse (click on a button buys/sells) or keyboard (Tab
switches column, ↑↓ row, Enter buys/sells, Esc done). Purchase: inventory +lot / money −price;
sale: inventory −lot / money +price/2.

Esc surrender.

**Mouse:** menu/names/shop operable by click (left click selects/changes, right click in the
menu changes backwards). In the game the **left click fires with the current angle** — it does
**not** aim at the click point (the original never reads the click position, \`sub_bd08\`); the
**right click** toggles the aiming panel (\`[0x115f]\`).

## 10. Deliberate deviations / open points

- **Timing:** flight (487 steps/s) and parachute (58 px/s) are **measured directly against the
  original in DOSBox** and reproduced in the port time‑based (refresh‑independent). The
  original busy‑wait is slightly cycles‑dependent; the rates are laid out as adjustment knobs in
  \`game.js\`.
**Decompiled 1:1:** Earthquake (sub_3511/2f9a/2c0d),
CR‑Inducer/Julia fractal (sub_2307, production rules extracted from the code), Ping‑Pong
(sub_371d), Caveman (sub_3bb7), terrain settling (sub_625d), terrain generation
(sub_5e3f), **tank death animation (sub_6895)**, as well as the complete bitmap font.

**Tank death animation (sub_6895) — 1:1:** on destruction the tank is drawn and
its palette index is then cycled through: phase A gray **0→60** (6‑bit) with rising tone
**300+20·i** (i=0..15), a brief hold on white, phase B **60→0**, phase C ramp **black→
sky color** (16,51,60 ≈ Sky) + a final tone sweep 900→200 Hz; then the tank is
erased and the palette reset to the real player color. Multiple dead tanks flash
one after another. Implemented as \`stepAnim\` child \`'death'\` (wall clock, ~0.8 s per tank).

**Not bit/pixel exact (deliberate deviations):**
- **Random seed:** the port uses the **exact Turbo Pascal 7 generator**
  (\`RandSeed := RandSeed·134775813+1\`, \`Random(N)=(RandSeed·N) shr 32\`,
  \`Random\`‑Real = \`RandSeed/2³²\`; verified in [\`js/rtl.js\`](html5-port/js/rtl.js)) — the
  algorithm is therefore identical. Only the **seed** is time‑based as in the original
  (\`Randomize\`), so concrete sequences (terrain shape, wind, random shooters,
  CR fractal spread) are **not reproducible** — nor are they in the original, since it re‑\`Randomize\`s
  per effect anyway.
- **Results/ranking screen & help/intro:** the **logic** is documented (round pot
  \`(players−survivors)·1000/survivors\` to each survivor on points+money,
  win counter; sorting by wins/points); **layout** is rebuilt from screenshots/specs,
  not verified field by field against the code (purely cosmetic interstitial
  screens).
- **Mouse control/menu glide:** the original uses the DOS mouse driver's click‑region/
  \`MouseGlideTo\` framework; the port reproduces this functionally (cursor, click regions,
  aiming panel, selection glide) — via Pointer Lock instead of the driver, so equivalent
  but not the same internal framework.
- **Menu/shop blip sounds:** core frequencies verified against the code (menu move/names/shop
  = **400 Hz** \`[0x190]\`, weapon change **300**, effect tones 500/700/1000); individual
  detail blips are style‑matched recipes.

All core values (palette, physics constants, weapon algorithms & parameters,
damage/scoring formulas, sound frequencies, AI mathematics, timing) are documented **directly from the
machine code**; the detail specifications with address evidence are stored as
\`spec_*.md\` in the analysis working directory.

### Fall animation & event order
The tank fall is played back **visibly** as its own animation phase (pixel‑by‑pixel
fall with sideways slide; the tank darkens progressively as it loses crew, because
\`sub_6d3c\` recomputes the crew each step and redraws the hull). \`sub_6d3c\` contains
**no** \`Sound\` instruction — the gameplay fall is
**silent** in the original; the driver \`sub_7060\` also skips the score sweep tone in settle mode
(flag=1, @0xcb68). The 700‑Hz tone (\`0x2bc\`) in this code region belongs **not** to the
fall, but to the **Caveman drill phase** (\`sub_3bb7\` @0x3c4c), ported there 1:1.
\`sub_3b7f\` is the ±1‑x advance helper of the Caveman, and
\`GetPixel==0xD\` checks **ground** — color index 13 —, not a falling tank.

The **event order** follows exactly the impact handler (\`0xca..0xcb72\`):
**blast damage → death flash (per tank immediately at crew≤0, \`sub_6895\` @0xcafa) →
terrain collapse (\`sub_625d\` @0xcb65) → fall/settle (\`sub_7060\`→\`sub_6d3c\` @0xcb72) →
fall death flash** (\`sub_6d3c\` calls \`sub_6895\` @0x6f08/0x6fe1 for lethal falls).
Implemented as a phase queue in \`resolveImpact\` (builds \`this.phases\`) + \`stepAnim\`
(works through it). Damage is skipped with an active parachute (\`sub_02d4\` ⇒
\`sub_7060\` passes flag 0), but the tank still settles.

The fall runs **sequentially** as in the original: \`sub_7060\` calls \`sub_6d3c\` tank by
tank; each falls completely, and a **lethal fall flashes (\`sub_6895\`) immediately**, before
the next tank falls. The port reproduces this exactly — the fall phase handles one
tank after another and, on a lethal fall, pushes the death flash phase
**before** the continuation of the remaining falls (never overlapping, verified:
max. 1 tank dying at a time). The tank order (original: array \`0x1161\`)
is irrelevant to the result, since the fall does not change any terrain.

1. **\`audit_strings.py\`** — every EXE string vs the port + font character coverage

   stored as plain bitmaps in the EXE (BGI driver stream); they are validated end-to-end
   via the pixel goldens.
6. **\`audit_sounds.py\`** — the original's complete sound inventory (27 \`Sound()\` sites +
   11 sweep callers, byte-extracted with frequency formulas and delays) as 29 checks
   against the port sources: **flight whistle follows \`vy/4\`** (a
   near-constant 400 Hz, NoSound ≤ −1200), **angle/power

   **ring pacing** (16 ms/ring only for radius < 50). WebAudio robustness: the effect

**Mouse cursor (Pointer Lock):** the original moves the DOS mouse driver's cursor on
\`MouseGlideTo\`/\`MouseToMenuItem\`; a browser cannot move the OS pointer. On the mouse-driven
screens (menu/names/shop and the aim turn) the mouse is therefore **captured via the Pointer
Lock API** and the software cursor is driven by **relative motion** (\`movementX/Y\`) — so the
motion is **unbounded** (the real OS pointer can never hit a screen edge and freeze the
in-game cursor). A click captures the pointer, **Esc/Tab/tab-switch** release it, the next
click re-captures. Clicks act at the **software-cursor** position; in the aiming panel the
cursor stays confined to the HUD strip (\`MouseSetRange(3,3,633,52)\`).

**"The Lucky Shots" timing (\`sub_bd08\`):** the high-score table does **NOT** appear
after every match — it appears **mid-game on a qualifying
shot**: \`[0x1692]=0\` at shot start, \`+= enemy men killed\` while resolving (direct/chain/fall,
self excluded, \`0xcb0f/0xc322/0x7020\`); then **score = 50·[0x1692]** (\`0xcbb7\`), and if it
beats the 10th table row (\`0xcbc0\`) the entry (shooter name + score) is inserted and "The
Lucky Shots" is shown **immediately over the play scene** (\`0xccbe\`) until a key, after which
the turn resumes. Implemented in \`afterImpact\`/\`recordLuckyShot\`; it does not appear after the
match (after the last game → main menu). The associated whole-program "New Match, new
Luck ?" dialog (\`sub_8ac5\`) stays deliberately unported.

**Trajectory clipping:** with reflecting walls off the shell flies past the field edges; every marker pixel
is clipped to the field interior (x 4–635, y 63–475), as BGI draws inside its viewport —
draw and erase share the same clip.

**Pacing classes (disassembly):** the original uses **three pacing classes** —
(a) calibrated busy-waits \`sub_0a3a(u)\`, 1 u ≈ 5 ms by design (\`37·[0x175c]−550\` empty
loops, \`[0x175c]\` = CalibrateSpeed/100, **re-calibrated every turn**); (b)
\`WaitVerticalRetrace\` = exactly 60 Hz; (c) **none at all** (CPU-bound). In the port:
**flight = 2 u/step → 100 steps/s plus free-running
above the screen edge** (y<0 without delay — the characteristic "vanishes up, rains down
quickly" feel); **intro descent = 60 px/s** (retrace). Importantly: terrain settling
(\`sub_625d\`), earthquake cracks and the post-shot fall are **unpaced** in the original —
their DOSBox speed is an artifact of the cycles setting (20000), not a design value; the
port picks deliberate rates for them (documented approximation).

## 0. Spielmechanik (Kurzüberblick für Spieler)

Rundenbasiertes Artillerie‑Duell (2–10 Panzer) auf zerstörbarem Terrain. Reihum zielt jeder
Panzer (Winkel + Stärke) und feuert eine Waffe; Ziel ist, alle anderen auszuschalten.

**Mannschaft (Crew) = Lebensenergie.** Jeder Panzer hat **0–100 Mann** (Start 100). Die Crew ist
zugleich seine „Gesundheit": Bei **0 Mann explodiert der Panzer**. Die Crew begrenzt außerdem die
**maximale Schuss‑Stärke auf \`10 × Crew\`** (voll = 1000), und die **Helligkeit** des Panzers sinkt
mit der Crew. Mannschaft geht durch Explosions‑ und Fallschaden verloren.

**Schaden**
- **Explosionsschaden:** Ein Treffer im Radius \`B\` einer Waffe kostet \`80·B/D\` Mann, wobei
  \`D = max(1, Abstand−3)\`. Ein **Schutzschild** reduziert das auf \`B/D\` (Faktor 80 weg).
- **Fallschaden:** Wird der Boden unter einem Panzer zerstört, fällt er. Pro **2 gefallene Pixel
  stirbt 1 Mann** (\`Crew −= ⌊Fallhöhe/2⌋\`); ist die **Fallhöhe größer als \`2 × Crew\`, ist die
  gesamte Mannschaft tot**. Ein voller Panzer (100) überlebt also Stürze bis ~200 px (stark
  geschwächt) und stirbt darüber. Ein **Fallschirm** verhindert Fallschaden komplett (der Panzer
  fällt trotzdem herab). Nach Schaden wird die Stärke auf \`10 × Crew\` nachgeklemmt.

**Waffen & Shop** (zwischen den Runden kaufbar; Verkauf zum halben Preis):

| 1 | Hand Grenade | Krater + Explosion | 4 | 1000 | 100 (Start 20) |

| 3 | 5 MT Nuke | riesiger Krater (Weiß‑Blitz) | 100 | 10000 | 1 |
| 4 | Earthquake | Riss‑Fissur mit ±45°‑Verästelungen | 30 | 5000 | 1 |
| 5 | Ping Pong Jack | hüpfendes Geschoss, gräbt Bahn + bounct zurück | 10 | 5000 | 5 |
| 6 / 7 | Chain‑Reaction‑Inducer 256 / 512 | „frisst" Terrain fraktal in Schussrichtung | 4 / 8 | 5000 / 10000 | 1 |
| 8 / 9 | Julia 256 / 512 | wie CR‑Inducer, anderes Fraktalmuster | 4 / 8 | 5000 / 10000 | 1 |
| 10 | Captain Caveman | bohrt einen Tunnel entlang der Oberfläche | 5 | 20000 | 1 |

## 1. Vorgehen (Methodik)

1. **Datei‑Analyse.** \`TANK_ENG.EXE\` ist ein DOS‑MZ‑Executable, erzeugt mit **Turbo
   Pascal 7.0** (Real‑Mode, 16‑Bit). Es enthält den **Borland EGAVGA‑BGI‑Grafiktreiber**
   eingebettet (Signatur „BGI Device Driver (EGAVGA) 2.00 - Mar 21 1988"). Grafikmodus:
   **VGA 640×480, 16 Farben**, eine Bildseite.
2. **Loader nachgebaut.** Ein eigenes Python‑Skript liest den MZ‑Header, wendet alle
   **2171 Relocations** an (Basis 0) und erzeugt das Ladeabbild \`image.bin\`
   (linear = Segment·16 + Offset).
3. **Disassembliert** mit *capstone* (16‑Bit). Segmentaufteilung (Paragraph‑Werte):
   \`0000\` = Spielcode (Entry \`0000:EA58\`), \`0EB0\` = eigene Grafik/UI/Maus‑Unit inkl.
   eingebettetem BGI‑Treiber, \`1129\` = Uhr‑Unit (Centisekunden), \`1138\` = DOS‑Unit,
   \`1140\` = **CRT**, \`11A3\` = **GRAPH**, \`1509\` = **SYSTEM**, \`16F3\` = Datensegment.
4. **RTL‑Symbolkarte.** Alle **124 Far‑Call‑Ziele** in die Units wurden identifiziert
   (Fingerabdrücke: Portzugriffe 0x42/0x43/0x61 für \`Sound\`, \`0x1234DD div f\`, INT 16h,
   die Real48‑Arithmetik, der LCG \`×0x08088405+1\` für \`Random\`). Damit wurde der Spielcode
   **vollständig symbolisch** annotiert (\`game_disasm.txt\`): jeder \`Sound\`, \`PutPixel\`,
   \`Sin\`, \`Round\` usw. ist im Klartext lesbar.
5. **Spiellogik dekompiliert.** Aus dem annotierten Code wurden Palette, Terrain‑Erzeugung,
   Tank‑Sprite, Ballistik, Wind, Schaden, Waffen, Shop, KI, Sounds und Timing als exakte
   Formeln/Konstanten extrahiert (jede Konstante ist im Code adressiert belegt).
6. **Port implementiert** in modularem ES6‑JavaScript, 1:1 nach diesen Formeln.
7. **Verifiziert** gegen Screenshots des Originals (DOSBox‑X headless via Xvfb).

> **Wichtige Erkenntnis (Sin/Cos):** In der TP7‑SYSTEM‑Unit ist \`1509:0x144f\` = **Cos**,
> \`1509:0x1462\` = **Sin** (die Cos‑Routine addiert π/2 und fällt in den Sin‑Kern). Erst mit
> dieser Zuordnung sind **Ballistik, Rohr‑Richtung und Terrain‑Generierung gleichzeitig
> konsistent** — sie löst zugleich die einzige offene Unsicherheit der Terrain‑Analyse.

Die Ausgabe wird über die aktive Palette in ein Canvas geblittet.

### 2.4 Terrain (sub_5e3f)

danach Boden‑Grün‑Füllung. Da |θ| ≤ 1.2 rad (< π/2) ist cos θ > 0, die Oberfläche also
eindeutig in x. Schritt: \`x += cos(θ)·amp\`, \`y += sin(θ)·amp\`. Parameter (alle aus dem Code):
\`stepRange = RandomN(40)+10\`, \`R1 = RandomR+0.3\`, Start \`x=4\`, \`y=445−RandomN(206)\`,
\`θ = RandomR·π/2 − π/4\`, \`amp = RandomN(stepRange)+5\`; θ‑Random‑Walk \`θ += RandomR·R1 − R1/2\`,
geklemmt auf ±1.2 (Reset auf ∓1.0), y geklemmt [88,470]. Jedes Spiel neu (\`Randomize\`).

## 3. Physik / Ballistik (sub_bd08 Abschuss, sub_b785 Schleife)

Explizites Euler‑Verfahren, **dt = 1 pro Schritt**, Position in voller Genauigkeit
akkumuliert, nur eine gerundete Kopie für Pixeltests:

\`\`\`
Arad = Winkel° · π/180
VX0 =  0.003 · Power · cos(Arad)
VY0 = -0.003 · Power · sin(Arad)          (y nach unten ⇒ −sin = aufwärts)
Mündung: (tankX + round(15·cos), tankY − 5 − round(15·sin))

pro Schritt:
  X += VX ;  Y += VY
  [Reflecting‑Walls: elastischer Abprall an x∈[4,634], y∈[63,474]]
  VX += Wind · 1e-6
  VY += 0.0011                            (Gravitation)
\`\`\`

**Konstanten** (Real48, im Code adressiert): Geschwindigkeitsskala \`0.003\` @0xbe6d,
Gravitation \`0.0011\` @0xba8c, Wind‑Skala \`1e‑6\` @0xba4f, π/180 @0xbd7a, Rohrlänge 15 @0xbdca.

**Kollision** (sub_b560): Der vordere Eckpixel des 2×2‑Markers (nach VX/VY‑Vorzeichen)
zählt als Treffer, wenn seine Farbe ∉ {0 Himmel, 15 Spur} und innerhalb x∈(4,635),
y∈(63,475). Boden = 13, Panzer = 1..12, Marker = 14, Spur = 15. Abbruch außerdem bei
Y≥475 (Bodenrand) oder Schrittzähler > 20000. Ohne Reflecting‑Walls verlässt der Schuss
seitlich das Feld und fällt heraus. Referenz (45°/250/Wind 0): saubere Parabel, Scheitel
≈128 px, Reichweite ≈527 px, ≈994 Schritte. Umgesetzt in
[\`js/physics.js\`](html5-port/js/physics.js).

**Wind** (db1f): \`Wind = round(1000·(2·RandomR−1)^5)\`, ganzzahlig [−1000,1000], stark
flau‑lastig (fünfte Potenz). Vorzeichen = Richtung (Pfeil), Betrag angezeigt.

**Power/Winkel:** Winkel 0..180° (0=rechts, 90=hoch, 180=links), Anzeige \`90−|90−Winkel|\`.
Power 0..**10·crew** (Start‑crew 100 ⇒ max 1000); Default 250, „End"=250, „Home"=max,
±1 (Pfeile) / ±100 (PgUp/PgDn). Nach Schaden Power auf 10·crew neu geklemmt.

**Fallschaden** (sub_6d3c): fällt der Boden unter einem Panzer weg, fällt er (pixelweise,
mit seitlichem Rutschen in die offene Seite) bis er wieder Halt findet;
\`crew −= Fallhöhe div 2\` (1 Mann je 2 px); \`Fallhöhe > 2·crew\` ⇒ Crew tot; danach
\`power = min(power, 10·crew)\`. Der Fall ist **stumm** (sub_6d3c hat keinen \`Sound\`‑Befehl).
**Fallschirm** (Item) ⇒ Panzer settled trotzdem, aber Schaden 0 (Flag 0 aus sub_7060/sub_02d4).
Im Port als sichtbare Animations‑Phase \`stepAnim 'fall'\` umgesetzt (siehe §11).

**Timing / Animationen (Disassembly-verifiziert, siehe „Timing-Wurzelanalyse" in §10):** Das
Original taktet **jeden** sichtbaren Integrationsschritt des Fluges über einen CPU‑kalibrierten
**Busy‑Wait** \`sub_0a3a(2.0)\` (0xbcfe; 1 Einheit ≈ 5 ms im Design), nicht per VSync ⇒
**≈100 Schritte/s**. Schritte **über dem oberen Bildschirmrand (y<0) laufen ohne Delay**
(0xbcf2) — hohe Schüsse verschwinden oben und regnen schnell herab. Der **Fallschirm‑Einflug**
(\`sub_7060\`/\`sub_64cc\`) wartet dagegen **1 VGA‑Vertikalrücklauf pro Abstiegsschritt** =
**60 px/s**.

Der Port treibt beide Abläufe **zeitbasiert** (Wall‑Clock, nicht Framerate): \`stepFlight(dt)\`
läuft mit \`FLIGHT_STEPS_PER_SEC = 100\` (nur On‑Screen‑Schritte zählen die getaktete Zeit,
darüber Freilauf), \`stepRoundIntro(dt)\` mit \`INTRO_PX_PER_SEC = 60\` (je mit Nachkomma‑
Akkumulator). Dadurch ist das Tempo **unabhängig von der Bildwiederholrate** (60/120/144 Hz
spielen identisch).

**Fallschirm beschleunigen:** Wie im Original überspringt **jede Taste / jeder Mausklick**
während des Einflugs die vsync‑Wartezeit (im Original via \`KeyPressed\`/\`MouseButtonDown\` vor
\`WaitVRetrace\`; global auch durch den Demo‑Parameter \`D\`, der \`[0x116e]=1\` setzt). Im Port
setzt \`keydown\`/\`mousedown\` das Flag \`introFast\` → der Rest des Einflugs läuft mit voller
Geschwindigkeit (\`INTRO_FAST_PX_PER_SEC\`).

**Alle Waffeneffekte sind — wie im Original — progressiv animiert** (nicht instant), mit
Ton, über \`game.stepAnim(dt)\` (WALL‑CLOCK, refresh‑unabhängig):
- **Krater/Nukes (Code 0xbf8a..0xc0e1):** das Original zeichnet die Kraterform in
  Palettenindex 12 (vorher per \`SetRGBPalette\` auf die HIMMELSFARBE gesetzt) und rampt
  diesen Eintrag dann **himmel→weiß→himmel** in 15+16 vsync‑Schritten (je \`WaitVRetrace\`,
  ≈0,52 s) — ein kraterförmiger **Weiß‑Blitz** —, danach wird mit Farbe 0 gecarvt.
  Im Port 1:1 als Palettenanimation nachgebildet (Dauer unabhängig von B).
- **Earthquake/Ping‑Pong/CR/Julia/Caveman:** diese Schleifen haben im Original **keinerlei
  Delay** — ihr Tempo ist die rohe CPU‑Pixelarbeit. Der Port bepreist jede Teiloperation
  mit ihren „Samples" (angefasste Pixel) und spielt sie mit \`EFFECT_SAMPLES_PER_SEC = 5000\`
  ab — **kalibriert an einer DOSBox‑Messung** (cycles=20000): ein Ping‑Pong grub einen
  375‑px‑Kanal in 10,37 s ≈ 2478 Schritte × 21 Samples ⇒ ~5000 Samples/s. Ein Erdbeben
  dauert damit — wie im Original — mehrere Sekunden.
- **Sounds der Effekte:** Das Original pulst **pro gefressenem Bodenpixel** \`Sound(f)\` und
  sofort \`NoSound\` (Erdbeben f=500) → ein **ratterndes Knattern**, kein Dauerton. Der Port
  bildet das über \`pcspeaker.gate()\` nach: Ton an, solange Boden gefressen wird, Lücken,
  wenn die Linien bereits offenen Raum queren (Ping‑Pong \`1000−y\`, Eater 500, Caveman 700).

Flug‑ und Fallschirm‑Tempo sind **direkt am Original gemessen** (s. o.), das Effekt‑Tempo
über die Ping‑Pong‑Messung. Da alles leicht cycles‑abhängig ist, sind
\`FLIGHT_STEPS_PER_SEC\`/\`INTRO_PX_PER_SEC\`/\`EFFECT_SAMPLES_PER_SEC\` in \`game.js\` als
einzelne Stellschrauben ausgelegt, falls eine andere DOSBox‑Konfiguration verglichen wird.

Start: **20 HandGrenades**. Kategorien: 0 Krater‑Bombe, 1 Erdbeben, 2 Ping‑Pong,
3 CR‑Inducer, 4 Julia, 5 Caveman, 6 Schutz.

**Arsenal‑Reset pro Spiel** (dekompiliert aus 0x7924/0x84b9): Zu Beginn **jedes** Spiels
werden alle Spieler zurückgesetzt — crew=100, Winkel=45, aktuelle Waffe=1,
**HandGrenades=20, alle anderen Waffen‑Slots=0**; der Shop läuft danach (Käufe gelten
nur für das kommende Spiel, das Arsenal überträgt sich nicht). Läuft die aktuelle Waffe
im Spiel leer, wird automatisch auf die nächste vorhandene umgeschaltet.

**Effekte** (umgesetzt in [\`js/weapons.js\`](html5-port/js/weapons.js)):
- **Krater (0):** gefüllter Kreis Radius B entfernt Boden; Nuke‑„Rotzone" Radius B.
- **Direkter Explosionsschaden** (gemeinsame Schleife 0xc8ca): \`dx=tankX−impX\`,
  \`dy=(tankY−impY)−4\`, \`dist=√(dx²+dy²)\`, \`D=max(1,round(dist−3))\`; falls **B > D**:
  \`Schaden = (80·B) div D\` (mit Schutzschild \`B div D\`), \`= min(Schaden, crew)\`.
  **Wichtig:** Dieser Blast wird bei ALLEN Kategorien am **ursprünglichen Einschlagpunkt**
  mit dem eigenen B berechnet (die Effekt-Routinen bekommen den Einschlag als Wert).
  Schaden entlang des vom Effekt durchlaufenen Weges entsteht **nicht** durch den Blast,
  sondern durch **Nachrutschen/Fall-Schaden**, wenn der Boden unter Panzern wegbricht.
- **Earthquake (1) — 1:1 dekompiliert** (sub_3511 → sub_2f9a rekursiv → sub_2c0d):
  \`count = 20·power\`; Richtung auf Länge 0,7 normiert (mit dem Original‑Quirk, dass die
  vy‑Normierung das bereits normierte vx wiederverwendet); Start = Einschlag −
  \`(0.005·count·vx/2, −0.005·count·vy/2)\`. Pro Schritt: \`(dx,dy)=0.7·(cos α, sin α)\`,
  Position += (dx,dy), \`α += rand·0.08 − 0.04\`; gezeichnet werden **zwei Quer‑Linien**
  von der Pfadlinie zu ihrem Senkrecht‑Versatz \`0.005·count·(dy,−dx)\` → ein **Keil**, am
  Epizentrum \`0.0035·count\` px breit, zur Spitze auf 0 verjüngt. Mit **1/20 pro Schritt**:
  \`n = Random(0.2·count)\`; n ungerade → Zweig bei **−45°**, n gerade → Zweig bei **+45°**
  (mit Parent‑Querversatz \`0.005·n·(dy,−dx)\`); der Parent verliert die Zweiglänge
  (\`count −= n\`) → die charakteristischen **kleinen Verästelungen**. sub_2c0d prüft je
  Linie beide Endpunkte (nur weiter, wenn Boden), sampelt \`0.0035·count+1\` Punkte
  (Clip x∈[4,635], y∈[63,475]), ersetzt nur BODEN‑Pixel durch Farbe 0 (zeigt Himmel),
  bei \`count>1000\` zusätzlich als **2×2‑Block**; **pro Pixel \`Sound(500)\`/\`NoSound\`**
  (Ratter‑Rumble). \`Randomize\` pro Aufruf — jeder Riss ist anders. Panzer in der
  Riss‑Bounding‑Box verlieren \`crew div 2\` (außer **Quake Protection**), plus der
  gemeinsame Direkt‑Blast (B=30) am Epizentrum.
- **Ping‑Pong (2) — 1:1 dekompiliert** (sub_371d, alle TP‑Real‑Konstanten dekodiert). Die
  Routine hat **ZWEI Schleifen**:
  - **Schleife 1 (Abstieg, 0x37ef):** Start‑vx,vy **÷ 3.0**; je Schritt \`pos += vel\`; bei
    gesetztem Reflect‑Flag \`[0xcf7]\` Abprall an **x=635→625 / x=4→14 / Decke y=63→64**
    (Vorzeichen der passenden Geschwindigkeit gedreht); dann \`vy += 0.00012222\` (=0.0011/9);
    21‑px‑Schneise (round(x)−10..+10) löschen mit \`Sound(1000−y)\`. Läuft bis **y ≥ 475**.
    Busy‑Wait 1.0.
  - **Schleife 2 (das „Zurückbouncen", 0x3a6c):** vom Boden fräst sich der Ball **senkrecht
    wieder nach oben** durch seine Landungs‑Schneise, bis er über das Terrain steigt
    (\`while min_surface ≤ y: y−−, Schneise löschen\`). **Nicht** an das Reflect‑Flag gekoppelt
    (das ist das namensgebende Ping‑Pong‑Verhalten). Busy‑Wait 3.0 (3× langsamer).

  Direkt‑Blast B=10 am ursprünglichen Einschlag; der gegrabene Kanal **kollabiert**
  anschließend (sub_625d), Weg‑Opfer via Fallschaden.
- **CR‑Inducer/Julia (3/4) — 1:1 dekompiliert** (sub_2307, rekursives Richtungs‑Fraktal,
  + Treiber sub_2b8c): \`size = B·64\` (256/512), Start = Einschlag, Richtung **2 (Ost)**
  bei vx>0, sonst **3 (West)**. 8 Richtungen (1,2:x+ · 3,4:x− · 5,6:y+ · 7,8:y−); jede
  expandiert in **4 Halbgrößen‑Teilkurven** nach den aus 0x2466..0x2b86 extrahierten
  Produktionsregeln (z. B. dir 1 → [7|8],[1|2],[6|5],[1|2]). **CR** (Flag 1) wählt pro
  Slot mit p=1/2 (\`Random(10)\` ungerade) die Alternativ‑Richtung → chaotische
  Kettenreaktion; **Julia** (Flag 0) ist strikt deterministisch/selbstähnlich. Basisfall
  (size 1): 1‑px‑Schritt, Clip x∈[4,635]/y∈[63,475], frisst nur BODEN (Dauerton 500 Hz).
- **Captain Caveman (5) — 1:1** (sub_3bb7, **3 Phasen**, je mit Bounds‑Test sub_3b4d
  = x∈[4,635] und Vorschub sub_3b7f = x±1 in Schussrichtung):
  **Phase 1 (0x3bcb)** — vom Einschlag vorlaufen, bis das Pixel **auf der Schusszeile**
  Boden ist (Hügelwand erreicht); **Phase 2 (0x3bee)** — flaches Terrain überspringen,
  solange \`surface+8 ≥ Y\` und Boden da ist (bis ein Hügel >8 px über der Zeile beginnt);
  **Phase 3 (0x3c28)** — solange \`surface+8 < Y\` die Spalte bohren: Zeilen \`surface+9..Y\`
  löschen (9‑px‑Dach bleibt), \`Sound(700)\` je Spalte; Stopp am Tal. Direkt‑Blast **B=5**.
- **Schutz (6):** kein Angriffseffekt.

**Terrain‑Nachrutschen (sub_625d) — läuft nach JEDEM Einschlag** über die Bounding‑Box
des Effekts (je Waffe getrackt und um ±B um den Einschlag erweitert): pro Spalte sinkt
die Oberfläche über gefressener Luft; dann wiederholte Sweeps — \`top\` wandert durch den
festen Block bis zur ersten Lücke, \`bot\` zum nächsten Boden darunter; solange eine Lücke
existiert, fällt **1 Pixel pro Sweep** (oberstes Bodenpixel der Spalte verschwindet, am
Lückenkopf erscheint eines — der Block sinkt), mit \`Sound(500)\`‑Puls pro bewegtem Pixel,
bis nichts mehr fällt. Dadurch stürzt z. B. das Dach über der Erdbeben‑Fissur ein und
Ausgrabungen der Eater sacken zu Kratern zusammen. Der Port simuliert den Kollaps beim
Einschlag vor und spielt ihn als Fortsetzung der Effekt‑Animation ab (Panzer‑Nachrutschen
+ Fallschaden folgen wie gehabt beim Abschluss).

**Farbe des entfernten Terrains:** Das Original zeichnet Himmel,
Krater, Tunnel usw. in Pixelwert **0**. Der BGI‑Treiber bildet per \`SetBkColor\` die Anzeige
von Pixelwert 0 auf die Hintergrundfarbe (Himmel) ab und \`ClearDevice\` füllt das Spielfeld
mit 0 — der Himmel *ist* also Pixelwert 0, angezeigt als Himmelblau. Die Kollision
(\`sub_b560\`) behandelt Pixelwert 0 und 15 (Spur) als durchlässig; Geschosse fliegen durch
Himmel und Krater. Der Port nutzt intern einen anderen Index für „Himmel/entfernt", zeigt
aber dasselbe Himmelblau und dieselbe durchlässige Kollision → **optisch und im Verhalten
identisch**.

**Scoring:** Pro getötetem gegnerischen Mann **50 Punkte + $50** an den Schützen (⇒ 5000 je
100‑Mann‑Panzer). Rundenende‑Pot: jeder Überlebende erhält \`(Spieler−Überlebende)·1000 /
Überlebende\` auf Punkte **und** Geld. 1 Punkt = $1. Sieg‑Zähler +1, wenn genau ein
Überlebender. Munition −1 je Schuss; leer ⇒ nächste vorhandene Waffe.

**Schutzsysteme** sind Inventar‑Bestände der Waffen 11/12/13 und wirken **pro Runde**
(am Rundenende je 1 verbraucht). Fallschirm 100 % gegen Fall, Quake 100 % gegen Erdbeben,
Shield reduziert Direktschaden auf \`B/D\` statt \`80·B/D\` (Faktor 1/80 ≈ 98,75 % — im Code
steht **kein** literaler „95 %"‑Wert; das Handbuch rundet.).

## 5. Computer‑KI (Regeln §5)

**Kein iteratives Probeschießen** — die KI **invertiert die Ballistik analytisch**
([\`js/ai.js\`](html5-port/js/ai.js)):
- Parabolisch (Ballisto/Jack): fester Winkel 45°/135°,
  \`power = round( 333.333 · √( 0.0011 · dX² / (dX+dY) ) )\` (333.333 = 1/0.003 = 1/C,
  0.0011 = Gravitation — exakte Umkehrung der Engine).
- Direktfeuer (Terminator‑Superwaffen): \`Winkel = round( arctan(dHöhe/dX) · 180/π )\`, max Power.

**Fehlerrate** (Default 10 %, Menü 0..100): multiplikativer Zufallsfehler auf die Distanz
\`1 + ((rate+1)/100)·(2·RandomR−1)\` (≈ ±(rate+1) %), **nach jedem Schuss halbiert** (÷2).

**5 Persönlichkeiten:** Berti (rein zufällig, hält Waffe ~20 %), Klaus (zufällig, ~50 %),
Jack (bevorzugt Ping‑Pong; ballistisch aber absichtlich ungenauer, ×3‑Fehler),
Ballisto (präzise Ballistik), Terminator (Superwaffen‑bewusst, sonst max Power + Richtung).
**20‑Schuss‑Interrupt:** nach 20 Schüssen bricht das Spiel ab. **Esc/Aufgeben** setzt ein
Abbruch‑Flag ⇒ kein Sieger (das Original hat gar keinen „Winner"‑String).

## 6. Sound (PC‑Speaker → WebAudio)

Rechteckwelle. \`Sound(Hz)\`/\`NoSound\`/\`Delay(ms)\` → Oszillator/Gain/Zeitplanung in
[\`js/pcspeaker.js\`](html5-port/js/pcspeaker.js); alle Effekte als exakte (Hz,ms)‑Rezepte in
[\`js/sounds.js\`](html5-port/js/sounds.js). Alle **27 \`Sound\`‑Aufrufstellen** wurden dekodiert.
Beispiele (aus dem Code): Abschuss‑Sweep 1000→400 Hz (Schritt 8, 1 ms/Schritt), Flug‑Pfeifen
\`400 + round(y/4)\` Hz (nur bei „Flight SoundFX"), Einschlag 400→100, Explosion 300→600→300 +
Boom‑Sweep 900→200, Blast‑Kreis \`200 + 2·r\`, Menü‑Blips 300–500 Hz, Options‑Werte kodieren
ihren Wert in der Tonhöhe. Gate: „SoundFX" schaltet fast alles, „Flight SoundFX" nur das
Flug‑Pfeifen. **Kein separates Melodie‑Easter‑Egg** — die „Musik" des Handbuchs ist die
Schuss→Flug→Explosion‑Sequenz selbst (im Code verifiziert: keine Notentabelle vorhanden).

(0=No/1=RND/2=Yes), Show Trace=an, Use Mouse=an, Computer Error Rate=10 % (0..100),

Spiel je menschlichem Spieler** (Computer und mittellose Spieler ohne Verkaufbares werden
übersprungen). 3‑Spalten‑Layout wie im Original: oben eine **Statuszeile** (Name, Men/Wins/
Points/Dollar, aktuelles Inventar der 10 Angriffswaffen in 2 Spalten); links eine **Waffenliste**
aller 13 Items \`"<Los> <Name>………"\` (obere Box = 10 Angriffs‑, untere = 3 Schutzwaffen); Mitte

und „Go to next Window using [Tab].". **Fertig = Klick auf die rote Leiste „Start the N. Game,
<Name> !"** unten. Bedienung per Maus (Klick auf Knopf kauft/verkauft) oder Tastatur (Tab
wechselt Spalte, ↑↓ Zeile, Enter kauft/verkauft, Esc fertig). Kauf: Inventar +Los / Geld −Preis;
Verkauf: Inventar −Los / Geld +Preis/2.

## 9. Steuerung

**Tastatur:** ← → Winkel · ↑ ↓ Power ±1 · Bild↑/Bild↓ Power ±100 · Pos1 Power=max ·
Ende Power=250 · Tab nächste Waffe · Enter Feuern · Leertaste Spielstatus · F1 Hilfe ·
Esc Aufgeben.

**Maus:** Menü/Namen/Shop per Klick bedienbar (Linksklick wählt/ändert, Rechtsklick im
Menü ändert rückwärts). Im Spiel feuert der **Linksklick mit dem aktuellen Winkel** –
er zielt **nicht** zum Klickpunkt (das Original liest die Klickposition nie, \`sub_bd08\`);
der **Rechtsklick** schaltet das Ziel-Panel um (\`[0x115f]\`).

**Abprallen an den Rändern** ist an die Option **„Reflecting Walls"** gekoppelt (Default
**RND** = pro Spiel zufällig an/aus; aktiv erkennbar am roten **„R"** rechts in der
Statuszeile). Ist es aktiv, prallt das Geschoss elastisch an oben/links/rechts ab — genau
wie im Original (Code: gated über \`[0xCF7]\`).

## 10. Bewusste Abweichungen / offene Punkte

- **Timing:** Flug (≈100 Schritte/s = \`sub_0a3a(2.0)\`/Schritt, mit Off‑Screen‑Freilauf) und
  Fallschirm (60 px/s = 1 VSync/Schritt) sind **aus dem Design abgeleitet** (siehe
  „Timing‑Wurzelanalyse") und werden im Port zeitbasiert (refresh‑unabhängig) reproduziert. Der
  Original‑Busy‑Wait ist leicht cycles‑abhängig; die Raten sind als Stellschrauben in
  \`game.js\` ausgelegt.
**1:1 aus dem Maschinencode dekompiliert:** Earthquake (sub_3511/2f9a/2c0d),
CR‑Inducer/Julia‑Fraktal (sub_2307, Produktionsregeln aus dem Code extrahiert), Ping‑Pong
(sub_371d), Caveman (sub_3bb7), Terrain‑Nachrutschen (sub_625d), Terrain‑Erzeugung
(sub_5e3f), **Panzer‑Todesanimation (sub_6895)**, sowie die komplette Bitmap‑Schrift.

**Panzer‑Todesanimation (sub_6895) — 1:1:** Beim Zerstören wird der Panzer gezeichnet und
sein Paletten‑Index dann durchzyklt: Phase A Grau **0→60** (6‑Bit) mit steigendem Ton
**300+20·i** (i=0..15), kurzes Halten auf Weiß, Phase B **60→0**, Phase C Rampe **schwarz→
Himmelfarbe** (16,51,60 ≈ Sky) + abschließender Ton‑Sweep 900→200 Hz; danach wird der Panzer
gelöscht und die Palette auf die echte Spielerfarbe zurückgesetzt. Mehrere Tote flashen
nacheinander. Umgesetzt als \`stepAnim\`‑Kind \`'death'\` (wall‑clock, ~0,8 s je Panzer).

**Noch nicht bit‑/pixelgetreu (bewusste Rest‑Abweichungen):**
- **Zufalls‑Seed:** Der Port nutzt den **exakten Turbo‑Pascal‑7‑Generator**
  (\`RandSeed := RandSeed·134775813+1\`, \`Random(N)=(RandSeed·N) shr 32\`,
  \`Random\`‑Real = \`RandSeed/2³²\`; verifiziert in [\`js/rtl.js\`](html5-port/js/rtl.js)) — der
  Algorithmus ist also identisch. Nur der **Seed** ist wie im Original zeitbasiert
  (\`Randomize\`), daher sind konkrete Folgen (Terrainform, Wind, Zufallsschützen,
  CR‑Fraktal‑Streuung) **nicht reproduzierbar** — beim Original ebenso wenig, da es ohnehin je
  Effekt neu \`Randomize\`t.
- **Ergebnis‑/Ranglisten‑Screen & Hilfe/Intro:** die **Logik** ist belegt (Rundenpott
  \`(Spieler−Überlebende)·1000/Überlebende\` an jeden Überlebenden auf Punkte+Geld,
  Sieg‑Zähler; Sortierung nach Wins/Punkten); **Layout** ist aus Screenshots/Specs
  nachgebaut, nicht Feld‑für‑Feld gegen den Code verifiziert (rein kosmetische
  Zwischenbild‑Screens).
- **Maus‑Steuerung/Menü‑Glide:** Das Original nutzt ein Klick‑Region‑/\`MouseGlideTo\`‑Framework
  des DOS‑Maustreibers; der Port bildet dies funktional nach (Cursor, Klick‑Regionen,
  Ziel‑Panel, Auswahl‑Glide) — via Pointer‑Lock statt Maustreiber, also gleichwertig, aber
  nicht dasselbe interne Framework.
- **Menü/Shop‑Blip‑Sounds:** Kern‑Frequenzen gegen den Code verifiziert (Menü‑Move/Namen/Shop
  = **400 Hz** \`[0x190]\`, Waffenwechsel **300**, Effekt‑Töne 500/700/1000); einzelne
  Detail‑Blips sind stilgleiche Rezepte.

Alle Kern‑Werte (Palette, Physik‑Konstanten, Waffen‑Algorithmen & ‑Parameter,
Schadens‑/Scoring‑Formeln, Sound‑Frequenzen, KI‑Mathematik, Timing) sind **direkt aus dem
Maschinencode** belegt; die Detail‑Spezifikationen mit Adressnachweisen liegen als
\`spec_*.md\` im Analyse‑Arbeitsverzeichnis.

### Fall‑Animation & Ereignis‑Reihenfolge
Der Panzer‑Fall wird als eigene Animations‑Phase **sichtbar** abgespielt (pixelweiser
Fall mit seitlichem Rutschen; der Panzer dunkelt beim Crew‑Verlust fortlaufend ab, weil
\`sub_6d3c\` die Crew jeden Schritt neu berechnet und den Rumpf neu zeichnet). \`sub_6d3c\`
enthält **keinen** \`Sound\`‑Befehl — der Gameplay‑Fall ist im
Original **stumm**; auch der Treiber \`sub_7060\` überspringt im Settle‑Modus (Flag=1, @0xcb68)
den Score‑Sweep‑Ton. Der 700‑Hz‑Ton (\`0x2bc\`) in dieser Code‑Region gehört **nicht** zum
Fall, sondern zur **Caveman‑Bohrphase** (\`sub_3bb7\` @0x3c4c) und ist dort 1:1
portiert. \`sub_3b7f\` ist der ±1‑x‑Vorschub‑Helfer des Caveman, und
\`GetPixel==0xD\` prüft **Boden** (Farbindex 13), keinen fallenden Panzer.

Die **Ereignis‑Reihenfolge** folgt exakt dem Impact‑Handler (\`0xca..0xcb72\`):
**Blast‑Schaden → Tod‑Blitz (pro Panzer sofort bei Crew≤0, \`sub_6895\` @0xcafa) →
Terrain‑Kollaps (\`sub_625d\` @0xcb65) → Fall/Settle (\`sub_7060\`→\`sub_6d3c\` @0xcb72) →
Fall‑Tod‑Blitz** (\`sub_6d3c\` ruft \`sub_6895\` @0x6f08/0x6fe1 für tödliche Stürze).
Umgesetzt als Phasen‑Queue in \`resolveImpact\` (baut \`this.phases\`) + \`stepAnim\`
(arbeitet sie ab). Damage wird bei aktivem Fallschirm übersprungen (\`sub_02d4\` ⇒
\`sub_7060\` übergibt Flag 0), der Panzer settled aber trotzdem.

Der Fall läuft **sequentiell** wie im Original: \`sub_7060\` ruft \`sub_6d3c\` Panzer für
Panzer; jeder fällt komplett, und ein **tödlicher Fall blitzt (\`sub_6895\`) sofort**, bevor
der nächste Panzer fällt. Der Port bildet das exakt ab — die Fall‑Phase behandelt einen
Panzer nach dem anderen und schiebt bei einem tödlichen Sturz die Death‑Blitz‑Phase
**vor** die Fortsetzung der restlichen Fälle (nie überlappend, verifiziert:
max. 1 gleichzeitig sterbender Panzer). Die Panzer‑Reihenfolge (Original: Array \`0x1161\`)
ist für das Ergebnis irrelevant, da der Fall kein Terrain verändert.

  Abrufbar per **Esc im Hauptmenü**; bleibt danach stehen, bis die Seite neu geladen wird
  (Browser hat kein Programm-Ende).
- **Highscores „The Lucky Shots"** (\`sub_96f4\`) mit **\`localStorage\`-Persistenz** und
  'L'-Taste (in-game) — \`main.js\`; erscheint bei einem wertungswürdigen Schuss,
  **nicht** nach dem Match.
- **Rangliste nach jeder Runde** (\`sub_abdc\`): „Rankings after N of M Games", Trosttext,

- **Audio:** Rundenstart-Töne am Rundenstart (Chirp 400→700 + je

### Automatisierte Faithfulness-Audits — \`html5-port/tools/\`
Eine **automatisierte Audit-Suite** (\`tools/audit.sh\`, Details in \`tools/README.md\`) prüft
den Port differenziell gegen das **Original** (EXE-Image + Disassembly):
1. **\`audit_strings.py\`** — prüft jeden EXE-String gegen den Port und die
   Font-Zeichenabdeckung (u. a. \`= @ #\`).
2. **\`audit_input.py\`** — alle Cursor-/Klick-Region-Aufrufe (\`MouseGlideTo\`/\`SetRange\`/…)
   mit Koordinaten + der In-Game-Tasten-Dispatch (DOS-Codes → Browser-Taste), inkl.
   **Ins/Del = Winkel ±45°** (\`min(180,a+45)\`/\`max(0,a-45)\`).
3. **\`invariants.mjs\`** — spielt viele geseedete Rein-CPU-Matches headless durch und prüft
   Wertgrenzen, Rundenterminierung, Crashes, **RNG-Varianz** und **Arsenal-Persistenz**
   (deterministische Regression): 0 Verletzungen.
4. **\`pixel_diff.py\`** (+ \`capture_dosbox.sh\`) — Golden-Master: rendert jeden Screen headless
   und difft gegen DOSBox-Referenzen (native 640×480 via Nearest-Neighbor). Abgedeckt:
   **weiße Schrift des selektierten Menüpunkts** (\`[0x177e]=6\`), das Status-Format
   **\`Error Rate 10.0 %\`** (\`Str(:4:1)\`) + Header-Feldbreiten \`Str(:2)\`, Shop-Paddings
   (money \`:6\`, Preise \`:7\`) und die „Buy these/For Sale"-Höhe (y=75).
5. **\`audit_font.py\`** — die EXE-eigene 8×8-Buchstabentabelle (bei 0x1067b, \`A-Z [ ] _ a-z\`)
   byte-für-byte gegen \`font8x8.js\`: **55/55 identisch**. Ziffern/Interpunktion liegen nicht
   als Klartext-Bitmaps in der EXE (BGI-Treiber-Stream) und sind über die Pixel-Goldens
   end-to-end validiert.
6. **\`audit_sounds.py\`** — das komplette Sound-Inventar des Originals (27 \`Sound()\`-Sites +
   11 Sweep-Aufrufer, byte-extrahiert mit Frequenz-Formeln und Delays) als 29 Checks gegen
   die Port-Quellen. Abgedeckt: **Flug-Pfeifton folgt \`vy/4\`** (quasi konstant 400 Hz,
   NoSound ≤ −1200), **Winkel/Power-Töne 150 ms**
   (\`sub_0a3a(30)\`), **Miss-Ton 300 ms** (\`sub_0aa1(30)\`), **Death-Flash-Leiter**
   (Rampen in 5-ms-Einheiten, 500 ms Weiß-Halt, Staccato-Abstieg), **Ring-Pacing** (16 ms/Ring
   nur bei Radius < 50). Das Effekt-Ende ist allein
   audio-clock-geplant; der \`setTimeout\`-Fallback hat +80 ms Marge gegen
   Timer/Audio-Clock-Drift auf verschiedenen Plattformen.

**Maus-Cursor (Pointer Lock):** Das Original verschiebt bei \`MouseGlideTo\`/\`MouseToMenuItem\`
den echten Maustreiber-Cursor mit; im Browser ist das unmöglich. Auf den mausgesteuerten
Screens (Menü/Names/Shop und der Ziel-Zug) wird die Maus deshalb per **Pointer-Lock-API
eingefangen** und der Software-Cursor über die **relative Bewegung** (\`movementX/Y\`) geführt —
so ist die Bewegung **unbegrenzt** (der echte OS-Cursor kann an keinen Bildschirmrand stoßen
und den Ingame-Cursor einfrieren). Ein Klick fängt den Pointer ein, **Esc/Tab/Tab-Wechsel**
geben ihn frei, der nächste Klick fängt ihn wieder ein. Klicks wirken an der
**Software-Cursor-Position**; im Ziel-Panel bleibt der Cursor auf den HUD-Streifen geklemmt
(\`MouseSetRange(3,3,633,52)\`).

**„The Lucky Shots" — Timing (\`sub_bd08\`):** Die Hi-Score-Tabelle erscheint **bei einem
wertungswürdigen Schuss mitten im Spiel** (nicht nach dem Match): bei Schussbeginn wird
\`[0x1692]=0\` gesetzt,
während der Auflösung \`+= getötete gegnerische Männer\` (Direkt-/Ketten-/Fall-Kills, Selbst
ausgeschlossen, \`0xcb0f/0xc322/0x7020\`); danach **Score = 50·[0x1692]** (\`0xcbb7\`), und wenn
das die 10. Tabellenzeile schlägt (\`0xcbc0\`), wird der Eintrag (Schützenname + Score)
einsortiert und „The Lucky Shots" **sofort über der Spielszene** gezeigt (\`0xccbe\`), bis eine
Taste kommt; dann läuft der Zug weiter. Umgesetzt in \`afterImpact\`/\`recordLuckyShot\`; nach
dem letzten Spiel folgt das Hauptmenü. Der zugehörige
Ganzprogramm-Dialog „New Match, new Luck ?" (\`sub_8ac5\`) bleibt bewusst weggelassen.

**Flugbahn-Clipping:** Bei ausgeschalteten Reflecting Walls fliegt das Geschoss über die
Feldränder hinaus; jedes Marker-Pixel wird auf den Feld-Innenbereich (x 4–635, y 63–475)
geclippt (wie BGI innerhalb des Viewports zeichnet) — Draw und Erase teilen denselben Clip.

**Timing-Wurzelanalyse (Disassembly):** Das Original nutzt **drei Pacing-Klassen** —
(a) kalibrierte Busy-Waits \`sub_0a3a(u)\`, 1 u ≈ 5 ms Design (\`37·[0x175c]−550\` Leerschleifen,
\`[0x175c]\` = CalibrateSpeed/100, **pro Zug neu kalibriert**); (b) \`WaitVerticalRetrace\` =
exakt 60 Hz; (c) **gar keins** (CPU-gebunden). Daraus abgeleitet:
**Flug = 2 u/Schritt → 100 Schritte/s** **plus Freilauf über dem Bildschirmrand**
(y<0 ohne Delay — das charakteristische „verschwindet oben, regnet schnell herab");
**Intro-Abstieg = 60 px/s** (Retrace). Terrain-Nachrutschen (\`sub_625d\`),
Erdbeben-Risse und der Post-Schuss-Fall sind im Original **ungetaktet** — ihre Geschwindigkeit
in DOSBox ist ein Artefakt der Cycles-Einstellung (20000), keine Design-Größe; der Port
wählt dafür bewusste Raten (dokumentierte Näherung).

### Pixelgenaue Screen-Layouts
Alle Haupt-Screens sind **pixelgenau** gegen DOSBox-Captures des Originals abgeglichen
(Scan-Linien/Bounding-Boxen per Bildanalyse, Farben per Pixel-Sampling):

  Schwarz (\`[0x177b]=0\`; das Spiel setzt per \`SetRGBPalette\` Index 0 auf Sky bzw. Menü-Blau).
