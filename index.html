const DOC_MD = DOC_EN;



// ===== game.js =====
// game.js — the simulation engine: round setup, tank placement, the fire→flight→
// impact→settle→scoring cycle. Faithful to the turn/fire flow in the original
// (re/spec_rules.md §3/§5, spec_physics.md §1/§4, spec_graphics.md §3/§4).










// Timing is driven by WALL-CLOCK time, not the display refresh rate, so the game
// runs at the original's speed on any monitor (60/120/144 Hz). The rates below were
// measured directly from TANK_ENG.EXE in DOSBox (cycles=fixed 20000):
//   * Flight: the original paces every integration step with a CPU-calibrated
//     busy-wait (sub_0a3a, factor 2.0 -> ~2.05 ms/step). Measured 487 steps/s by
//     tracking a shell and fitting y(t)=½·g·rate²·t² (g=0.0011 px/step²).
//   * Parachute fly-in (sub_7060): one VGA vertical-retrace per descent step
//     (~1 px / 60 Hz vsync). Measured 58 px/s (117 px in 2.00 s), strictly linear.
// Flight pacing — DECOMPILED from sub_b785's loop tail (0xbcd3-0xbd01): each VISIBLE step
// with y>0 busy-waits sub_0a3a(2.0) = 2 calibration units; 1 unit is designed as ≈5 ms
// (37·[0x175c]−550 empty loops, [0x175c] = CalibrateSpeed/100). → 10 ms/step = 100 steps/s.
// Steps while the shell is ABOVE the screen (y<0) have NO delay at all — the original
// fast-forwards there (that's the characteristic "vanishes up, rains down quickly" feel),
// reproduced in stepFlight below.
const FLIGHT_STEPS_PER_SEC = 100;
// Weapon 'ops' effects (quake/pingpong/eater/caveman) have NO delay loop in the
// original — their pace is the raw CPU pixel-work rate. Each op carries its sample
// count; this constant converts it to wall-clock. Calibrated against a DOSBox demo
// capture (cycles=20000): a Ping-Pong dug a 375-px channel in 10.37 s ≈ 2478 steps
// × 21 samples ⇒ ~5000 samples/s.
const EFFECT_SAMPLES_PER_SEC = 5000;
const INTRO_PX_PER_SEC     = 60;     // descent: 1 px per WaitVerticalRetrace (sub_64cc) = 60/s
const INTRO_FAST_PX_PER_SEC = 900;   // "press any key / click" skips the vsync wait
const FALL_PX_PER_SEC      = 240;    // animated tank-fall speed (sub_6d3c has no delay;
                                     // chosen visible-but-quick, tunable)

// ---- tank support tests (sub_6cbd/6b84/6b0c/6a93). `g(x,y)` returns true if that pixel
// is solid GROUND. They read the terrain (world) layer so a falling tank never "supports"
// itself or is fooled by the composited sprites.
// sub_6cbd: supported if ground under the centre 5 px (X-2..X+2, Y+1)
const centreSupp = (g, x, y) => g(x, y + 1) || g(x - 2, y + 1) || g(x - 1, y + 1) || g(x + 2, y + 1) || g(x + 1, y + 1);
// sub_6b84: supported if ground anywhere under the footprint (X-6..X+6, Y+1)
const footSupp = (g, x, y) => { for (let dx = -6; dx <= 6; dx++) if (g(x + dx, y + 1)) return true; return false; };
// sub_6b0c: left underside blocked (diagonal X-6..X-9) or against the left wall
const leftBlk = (g, x, y) => x <= 13 || g(x - 6, y + 1) || g(x - 7, y + 1) || g(x - 8, y) || g(x - 9, y - 1);
// sub_6a93: right underside blocked (diagonal X+6..X+9) or against the right wall
const rightBlk = (g, x, y) => x >= 626 || g(x + 6, y + 1) || g(x + 7, y + 1) || g(x + 8, y) || g(x + 9, y - 1);
const DEFAULT_STEPS_PER_FRAME = 8;   // fallback when no dt is supplied (debug/headless)

function makePlayer(idx) {
  const inv = new Array(14).fill(0);
  inv[WPN.HANDGRENADE] = 20;
  return {
    name: `Player ${idx + 1}`,
    isComputer: false,
    personality: 'Terminator',
    colorIndex: TANK_COLORS[idx],
    crew: 100, angle: 45, power: 250, weapon: WPN.HANDGRENADE,
    inventory: inv,
    x: 0, y: 0,
    points: 0, money: 0, wins: 0,
    alive: true,
    get hasParachute() { return (this.inventory[WPN.PARACHUTE] || 0) > 0; },
    get hasQuake()     { return (this.inventory[WPN.QUAKEPROT] || 0) > 0; },
    get hasShield()    { return (this.inventory[WPN.SHIELD] || 0) > 0; },
  };
}

class Game {
  constructor(vga, rnd, spk) {
    this.vga = vga;
    this.rnd = rnd;
    this.spk = spk;
    this.players = [];
    this.options = {
      soundFX: true, flightSFX: false, reflectWalls: 1, // 0 No,1 RND,2 Yes
      showTrace: true, useMouse: true, errorRate: 10, moneyStart: 0,
      gamesPerMatch: 10, numPlayers: 2, reflectActive: false,
    };
    this.currentGame = 1;
    this.wind = 0;
    this.current = 0;
    this.heightmap = null;
    this.projectile = null;
    this.errRateWork = 10;    // AI working error rate (halved each shot)
    this.onImpactDone = null; // callback set by front-end
  }

  setupPlayers(defs) {
    // defs: [{name, isComputer, personality}]
    this.options.numPlayers = defs.length;
    this.players = defs.map((d, i) => {
      const p = makePlayer(i);
      p.name = d.name;
      p.isComputer = d.isComputer;
      p.personality = d.personality || 'Terminator';
      p.money = this.options.moneyStart;
      return p;
    });
  }

  // ---- round setup ------------------------------------------------------------
  // per-GAME arsenal reset — decompiled from the original's new-game player init
  // (0x7924 / 0x84b9): crew=100, angle=45, current weapon = slot 1, HandGrenades = 20,
  // ALL other weapon slots = 0. The shop runs AFTER this reset, so purchases apply to
  // the upcoming game only — the arsenal does NOT carry over between games. (Without
  // this, everyone eventually runs dry and firing stops working.)
  resetPlayersForGame() {
    for (const p of this.players) {
      p.crew = 100; p.alive = true;
      p.angle = 45;
      p.weapon = WPN.HANDGRENADE;
      p.inventory = new Array(14).fill(0);
      p.inventory[WPN.HANDGRENADE] = 20;
      p.power = Math.min(p.power || 250, 1000);
    }
  }

  startRound() {
    // mouse aiming panel ([0x115f]): the preference [0x1775] is initialised to 0 at program
    // start (0x2051) — the panel is OFF until the player toggles it with a RIGHT CLICK
    // during aim (0xe228); it then persists across turns/rounds.
    if (this.mousePanel === undefined) this.mousePanel = false;
    this.spk.enabled = this.options.soundFX;
    this.vga.setPalette(GAME_PALETTE.map(c => c.slice()));  // fresh working palette
    // reflecting-walls per round (sub_da0c @0xda1f): NO=0 off, Yes=2 always on,
    // RND=1 -> on iff RandomN(20) is odd (50%, same draw semantics as the original).
    this.options.reflectActive = this.options.reflectWalls === 2 ||
      (this.options.reflectWalls === 1 && this.rnd.next(20) % 2 === 1);

    this.heightmap = generateTerrain(this.vga, this.rnd);
    // playfield 3-D frame (original: Frame3DThick(0,59,639,479)) — part of the world layer
    frame3DThick(this.vga, 0, FIELD.YTOP - 4, this.vga.W - 1, this.vga.H - 1, true);
    this.wind = generateWind(this.rnd);
    this.errRateWork = this.options.errorRate;   // P = [0x176e], reset from [0x1768] each round
    this.roundCycles = 1;                         // turn-rotation counter ([0x1776], inits 1; ends >20)

    // reset crew, decrement protections (per-round), place tanks
    const N = this.players.length;
    for (let i = 0; i < N; i++) {
      const p = this.players[i];
      p.crew = 100; p.alive = true;
      if (p.power === 0) p.power = 250;
      // protections last one round: decrement (floored at 0)
      for (const w of [WPN.PARACHUTE, WPN.QUAKEPROT, WPN.SHIELD]) {
        p.inventory[w] = Math.max(0, (p.inventory[w] || 0) - 0); // consumed at round END; keep here
      }
      applyTankBrightness(this.vga, p.colorIndex, 100);
    }
    // snapshot the persistent background (sky + terrain, no tanks) — the world layer.
    this.bg = this.vga.buf.slice();
    // place tanks spread across the field with jitter; they PARACHUTE in from the top
    // to their resting position on the surface (round-start insertion, like the original).
    const slotW = (FIELD.X1 - FIELD.X0 - 40) / N;
    for (let i = 0; i < N; i++) {
      const p = this.players[i];
      const base = FIELD.X0 + 20 + i * slotW;
      p.x = Math.round(base + this.rnd.next(Math.max(1, slotW - 24)));
      p.x = Math.max(20, Math.min(FIELD.X1 - 20, p.x));
      p.restY = surfaceYAt(this.vga, p.x) - 1;
      p.y = Math.min(p.restY - 8, FIELD.YTOP + 6);   // start high (below the status bar)
      p.chute = true;
    }
    this._introAcc = 0;                 // reset the wall-clock descent accumulator
    this.dyingTanks = [];               // active death-flash tanks (sub_6895)

    // Turn order — a RANDOM PERMUTATION of the players, DECOMPILED 1:1 from sub_da0c
    // (0xda43..0xdad3): slot 1 = RandomN(N)+1, each further slot re-rolled until it is not
    // a duplicate (rejection sampling). `this.order[slot]` = the tank index that shoots in
    // that slot; `this.turnSlot` is the current slot ([0x1774]) that the AI target walks use.
    const NP = this.players.length;
    this.order = [this.rnd.next(NP)];
    for (let m = 1; m < NP; m++) {
      let v, dup;
      do { v = this.rnd.next(NP); dup = this.order.includes(v); } while (dup);
      this.order[m] = v;
    }
    this.turnSlot = 0;
    this.current = this.order[0];       // all tanks alive at round start
    this.drawScene();
  }

  // advance the round-start parachute descent; returns true when all landed.
  // dtMs = real milliseconds since the last frame (refresh-independent). `fast` is
  // set once the player presses any key or mouse button, which in the original skips
  // the per-step vsync wait so the rest of the fly-in plays at full speed.
  stepRoundIntro(dtMs, fast) {
    let dpx;
    if (dtMs === undefined) {           // headless/debug: advance a fixed pixel per call
      dpx = 3;
    } else {
      const rate = fast ? INTRO_FAST_PX_PER_SEC : INTRO_PX_PER_SEC;
      this._introAcc = (this._introAcc || 0) + (dtMs / 1000) * rate;
      dpx = Math.floor(this._introAcc);
      this._introAcc -= dpx;
      if (dpx > 240) dpx = 240;         // clamp after a stalled/backgrounded tab
    }
    let anyFalling = false;
    for (const p of this.players) {
      if (!p.alive || !p.chute) continue;
      if (p.y < p.restY) { p.y = Math.min(p.restY, p.y + dpx); anyFalling = true; }
      else {  // sub_7060 [bp+6]==0: chirp, then armed→rising 100+5·i / unarmed→800→1500
        p.chute = false;
        let armed = false; for (let w = 1; w <= 10; w++) if ((p.inventory[w] || 0) > 0) { armed = true; break; }
        this.spk.play(SND.roundPlace(armed, p.angle), this.options.soundFX);
      }
    }
    this.drawScene();
    return !anyFalling;
  }

  firstAlive(from) {
    for (let k = 0; k < this.players.length; k++) {
      const i = (from + k) % this.players.length;
      if (this.players[i].alive) return i;
    }
    return from;
  }
  nextPlayer() {
    // Advance the turn-order slot pointer ([0x1774]) to the next tank that is ALIVE and
    // still ARMED — DECOMPILED from 0xd101..0xd123 (skip on sub_0225 unarmed OR sub_01bc
    // dead). When the pointer WRAPS past the end of the slot ring (one full turn-rotation),
    // HALVE the AI error rate and count the cycle (0xd0d0: [0x176e]/=2, inc [0x1776]).
    const N = this.players.length;
    let wrapped = false;
    for (let k = 0; k < N; k++) {
      if (this.turnSlot === N - 1) wrapped = true;
      this.turnSlot = (this.turnSlot + 1) % N;
      const t = this.order[this.turnSlot];
      if (this.players[t].alive && this._isArmed(t)) { this.current = t; break; }
    }
    if (wrapped) { this.errRateWork /= 2; this.roundCycles = (this.roundCycles || 0) + 1; }
  }
  // sub_0225 inverse: does tank idx still own any weapon 1..10?
  _isArmed(idx) {
    const inv = this.players[idx].inventory;
    for (let w = 1; w <= 10; w++) if ((inv[w] || 0) > 0) return true;
    return false;
  }

  // sub_0420 / sub_03da: next / previous ALIVE slot in the turn order (wrapping).
  nextAliveSlot(slot) {
    const N = this.players.length;
    for (let k = 0; k < N; k++) { slot = (slot + 1) % N; if (this.players[this.order[slot]].alive) return slot; }
    return slot;
  }
  prevAliveSlot(slot) {
    const N = this.players.length;
    for (let k = 0; k < N; k++) { slot = (slot - 1 + N) % N; if (this.players[this.order[slot]].alive) return slot; }
    return slot;
  }

  // Surface Y at column x from the clean world layer (mirrors the [0x119a] height array the
  // AI line-of-sight test reads). Returns the topmost GROUND row, or FIELD.YBOT if none.
  surfaceHeightAt(x) {
    x = Math.max(0, Math.min(this.vga.W - 1, x | 0));
    const buf = this.bg || this.vga.buf, W = this.vga.W;
    for (let y = FIELD.YTOP; y <= FIELD.YBOT; y++) if (buf[y * W + x] === COL.GROUND) return y;
    return FIELD.YBOT;
  }
  aliveCount() { return this.players.filter(p => p.alive).length; }
  // A tank is "armed" if it owns at least one weapon 1..10 (sub_0225 is the inverse).
  aliveArmedCount() {
    return this.players.filter(p => {
      if (!p.alive) return false;
      for (let w = 1; w <= 10; w++) if ((p.inventory[w] || 0) > 0) return true;
      return false;
    }).length;
  }
  // Round is over — the da0c turn-loop guards (0xd0b3..): at most one tank alive
  // (`[0x116c] < 2`), OR no alive tank still has a weapon (`sub_0273`), OR the 20th turn-
  // cycle has elapsed (`[0x1776] > 20`, incremented once per full rotation in nextPlayer).
  roundOver() {
    return this.aliveCount() <= 1 || this.aliveArmedCount() === 0 || (this.roundCycles || 0) > 20;
  }

  // ---- rendering --------------------------------------------------------------
  // Composite the frame from the persistent background: restore world (sky+terrain
  // +craters), then draw HUD and live tanks on top. This is why old barrels ("fan")
  // and flight traces never accumulate — every frame starts from the clean world.
  drawScene() {
    if (this.bg) this.vga.buf.set(this.bg);
    drawStatusBar(this.vga, this);
    for (const p of this.players) if (p.alive) {
      drawTank(this.vga, p, this.wind);
      if (p.chute) drawParachute(this.vga, p.x | 0, p.y | 0, p.colorIndex);
    }
    // tanks currently in their death-flash are still drawn (in their colour index; the
    // death animation drives that index's palette entry — sub_6895 draws then colour-cycles).
    if (this.dyingTanks) for (const d of this.dyingTanks) drawDeadTank(this.vga, d);
    this.vga.present();
  }

  // ---- firing -----------------------------------------------------------------
  fire() {
    const p = this.players[this.current];
    if ((p.inventory[p.weapon] || 0) <= 0) return false;
    this.spk.play(SND.launch(), this.options.soundFX);
    this._flightAcc = 0;               // reset the wall-clock step accumulator
    this.projectile = launch(p);
    this.projectile.shooter = this.current;
    this.projectile.weapon = p.weapon;
    // remember velocity direction for directional weapons
    this.projectile.dir = { x: Math.sign(this.projectile.vx), y: Math.sign(this.projectile.vy) };
    return true;
  }

  // advance the flight animation; returns 'flying' | 'impact'. dtMs = real ms since
  // the last frame -> the shell always flies at the original's ~487 steps/s, whatever
  // the monitor refresh rate is.
  stepFlight(dtMs) {
    const p = this.projectile;
    const opts = { reflect: this.options.reflectActive, wind: this.wind };
    let n;
    if (dtMs === undefined) {            // headless/debug fallback
      n = DEFAULT_STEPS_PER_FRAME;
    } else {
      this._flightAcc = (this._flightAcc || 0) + (dtMs / 1000) * FLIGHT_STEPS_PER_SEC;
      n = Math.floor(this._flightAcc);
      this._flightAcc -= n;
      if (n > 60) n = 60;               // clamp after a stall so the arc can't teleport
    }
    // Steps while the shell is ABOVE the screen (y<0) are FREE — the original's per-step
    // busy-wait is skipped there (0xbcf2 jbe), so the off-screen part of a high arc runs
    // at full CPU speed. We bound the free-running with a safety counter.
    let guard = 0;
    for (let s = 0; s < n && !p.done && guard < 25000; guard++) {
      // erase the exact previously-drawn marker (leaving a trace pixel if enabled)
      eraseLastMarker(this.vga, p, this.options.showTrace);
      step(this.vga, p, opts);
      if (!p.done) drawMarker(this.vga, p);
      if (p.y >= 0) s++;                 // only on-screen steps consume paced time
    }
    // in-flight whistle — f = 400 + Round(vy/4), NoSound below 100 Hz (0xb883-0xb8d0).
    // vy is tiny (±~1 px/step), so the original's whistle is a near-constant 400 Hz.
    if (this.options.flightSFX && !p.done) {   // gated by the flight-sound option ([0xcfa]) only
      const wf = SND_LIVE.flightWhistle(p.vy);
      if (wf > 0) this.spk.soundOn(wf); else this.spk.soundOff();
    }
    this.vga.present();
    if (p.done) { this.spk.soundOff(); return 'impact'; }
    return 'flying';
  }

  // resolve the impact: weapon effect + damage + deaths + settle. Returns result.
  resolveImpact() {
    const p = this.projectile;
    const shooter = this.players[p.shooter];
    const w = WEAPON_TABLE[p.weapon];
    // consume ammo; if the current weapon ran dry, auto-switch to the next owned one
    // (original rule: "leer ⇒ nächste vorhandene Waffe")
    shooter.inventory[p.weapon] = Math.max(0, (shooter.inventory[p.weapon] || 0) - 1);
    if ((shooter.inventory[shooter.weapon] || 0) <= 0) {
      for (let k = 1; k <= 13; k++) {
        const w2 = ((shooter.weapon - 1 + k) % 13) + 1;
        if ((shooter.inventory[w2] || 0) > 0) { shooter.weapon = w2; break; }
      }
    }

    let menKilled = 0;
    const impact = p.impact || { x: Math.round(p.x), y: Math.round(p.y) };
    impact.dx = p.dir.x;

    // Apply terrain-destroying effects to the CLEAN world layer (no tanks/trace),
    // then fold the result back into the background.
    if (this.bg) this.vga.buf.set(this.bg);

    // Build an ordered ANIMATION PHASE QUEUE that mirrors the original's post-impact
    // sequence exactly (sub_bd08 tail): weapon-dig → blast-death flashes → terrain
    // collapse → animated tank fall → fall-death flashes. Each phase animates wall-clock.
    // (The AI error rate is NOT halved here — the original decays it once per completed
    // turn-cycle in nextPlayer(), not per shot.)
    const phases = [];
    let res = null;
    // sub_bd08 tail @0xbf4c: a shot MISSES only if its final X is outside [4,635]. A shell
    // that falls to the arena floor (X in range, Y>475 — e.g. down a dug shaft) still
    // DETONATES at the bottom; only shells that left the side are duds.
    const missed = impact.x < FIELD.X0 || impact.x > FIELD.X1;
    if (impact.y > FIELD.YBOT) impact.y = FIELD.YBOT;
    if (missed) {
      this.spk.play(SND.miss, this.options.soundFX);
    } else {
      const vel = { x: p.vx, y: p.vy }, dir = p.dir.x || 1;
      switch (w.cat) {
        case 0: res = effectCrater(this.vga, this.players, p.shooter, impact, w.B); break;
        case 1: res = effectEarthquake(this.vga, this.players, p.shooter, impact, shooter.power, vel, this.rnd); break;
        case 2: res = effectPingPong(this.vga, this.players, p.shooter, impact, vel, w.B, this.options.reflectActive); break;
        case 3: res = effectEater(this.vga, this.players, p.shooter, impact, w.B, dir, true, this.rnd); break;
        case 4: res = effectEater(this.vga, this.players, p.shooter, impact, w.B, dir, false, this.rnd); break;
        case 5: res = effectCaveman(this.vga, this.players, p.shooter, impact, dir); break;
        default: break; // protections have no offensive effect
      }
      if (res) {
        menKilled = res.menKilled;
        // (1) weapon dig / crater flash
        if (res.anim) phases.push(res.anim.kind === 'crater' ? { ...res.anim } : { ...res.anim, i: 0 });
        // (2) blast-death flashes (tanks the blast reduced to 0 crew) — BEFORE the collapse,
        //     as in the original (the 0xc8ca damage loop calls sub_6895 immediately).
        const blastDead = this.reapDead();
        if (blastDead.length) phases.push({ kind: 'death', queue: blastDead, di: 0, t: 0, soundPlayed: false });
        // (3) terrain collapse (sub_625d) over the effect's box, simulated on the post-carve world
        if (res.box) {
          const scratch = this.bg.slice();
          if (res.anim && res.anim.kind === 'ops') for (const o of res.anim.ops) if (o.px) for (const idx of o.px) scratch[idx] = COL.SKY;
          else if (res.anim && res.anim.kind === 'crater') makeCrater({ W: this.vga.W, buf: scratch }, res.anim.x, res.anim.y, res.anim.B);
          const col = simulateCollapse(scratch, this.vga.W, res.box);
          if (col.length) phases.push({ kind: 'ops', ops: col, i: 0 });
        }
        // (4) animated tank fall (+ fall damage + fall-death flashes, queued at its end)
        phases.push({ kind: 'fall' });
      }
    }

    // per-man kill award: 50 pts + $50 per enemy man killed (shooter)
    if (menKilled > 0) { shooter.points += 50 * menKilled; shooter.money += 50 * menKilled; }

    this.projectile = null;
    this._menKilled = menKilled;
    this._shooterIdx = p.shooter;      // for crediting fall casualties during the animation
    this.phases = phases;
    this.anim = phases.shift() || null;
    if (this.anim) { this.drawScene(); return { menKilled, over: false, animating: true }; }
    this.bg = this.vga.buf.slice();
    return { menKilled, over: this.roundOver() };
  }

  // mark every alive tank whose crew hit 0 as dead and return death-flash snapshots.
  reapDead() {
    const dead = [];
    for (const t of this.players) {
      if (t.alive && t.crew <= 0) { t.alive = false; dead.push({ x: t.x, y: t.y, angle: t.angle, colorIndex: t.colorIndex }); }
    }
    return dead;
  }

  // called by the loop when the whole phase queue is finished — the terrain, deaths and
  // tank positions are already final. this.bg is the clean world layer, kept current by
  // the phases (crater/ops carve into it; fall moves only tanks), so we must NOT re-snap
  // it from vga.buf here — that buffer already has the tanks drawn on top.
  finishAnim() {
    return { menKilled: this._menKilled || 0, over: this.roundOver() };
  }

  // advance the weapon-effect animation; returns true when finished. dtMs = real
  // milliseconds since the last frame — all effect pacing is WALL-CLOCK so it matches
  // the original on any display refresh rate.
  //
  // 'crater' (impact code 0xbf8a..0xc0e1): the original paints the crater shape in
  // palette index 12 preset to the SKY colour, then ramps that entry sky→white→sky in
  // 15+16 vsync steps (SetRGBPalette + WaitVRetrace, ~0.52 s) — a crater-shaped white
  // FLASH — and finally carves with colour 0. Reproduced 1:1 via palette animation.
  //
  // 'ops' (quake/pingpong/eater/caveman): the original has NO delay in these loops —
  // the pace is CPU-bound pixel work. Each op carries `cost` (samples the original
  // touched); we consume ops at EFFECT_SAMPLES_PER_SEC and pulse the PC speaker per op
  // (Sound(f)/NoSound around each eaten pixel run) — the authentic rattling rumble.
  stepAnim(dtMs) {
    if (!this.anim) return true;
    const dt = (dtMs === undefined) ? 1000 / 60 : Math.min(100, dtMs);
    const done = this._stepPhase(this.anim, dt);
    if (done) {
      this.anim = this.phases.shift() || null;   // advance to the next queued phase
      this.drawScene();
      return this.anim === null;
    }
    return false;
  }

  // Advance ONE animation phase; returns true when THAT phase completes (the wrapper
  // then pops the next queued phase). Handlers must NOT touch this.anim/this.phases —
  // except the 'fall' handler, which QUEUES the fall-death flashes onto this.phases.
  _stepPhase(a, dt) {
    // ---- tank death flash (sub_6895): draws the dead tank, then colour-cycles its
    // palette index black→white→black→sky over 4 phases with a rising 300+20i tone,
    // then erases it and restores the tank's real colour. Tanks die one after another.
    if (a.kind === 'death') {
      const d = a.queue[a.di];
      const PH = 260;                                     // ms per phase (A/B/C); ~0.9s/tank
      if (!a.soundPlayed) {                               // rising tones + end sweep, once/tank
        this.dyingTanks.push(d);
        const notes = [];
        for (let i = 0; i <= 15; i++) notes.push({ f: 300 + 20 * i, d: PH / 16 });
        for (let i = 15; i >= 0; i--) notes.push({ f: 300 + 20 * i, d: PH / 16 });
        for (let s = 900; s >= 200; s -= 2) notes.push({ f: s, d: 1 });   // sub_5a48(900,200,2) — step 2, 1 ms/note
        this.spk.play(notes, this.options.soundFX);
        a.soundPlayed = true;
      }
      a.t += dt;
      const e = v => ((v << 2) | (v >> 4)) & 0xff;        // 6-bit DAC → 8-bit
      const ci = d.colorIndex;
      let col;
      if (a.t < PH) {                                     // phase A: grey 0→60
        const i = Math.min(15, Math.floor(a.t / PH * 16)); col = [e(i * 4), e(i * 4), e(i * 4)];
      } else if (a.t < 2 * PH) {                          // phase B: grey 60→0
        const i = Math.max(0, 15 - Math.floor((a.t - PH) / PH * 16)); col = [e(i * 4), e(i * 4), e(i * 4)];
      } else if (a.t < 3 * PH) {                          // phase C: black → sky (16,51,60)
        const i = Math.min(15, Math.floor((a.t - 2 * PH) / PH * 16));
        col = [e(Math.round(16 * i / 15)), e(Math.round(51 * i / 15)), e(i * 4)];
      } else {                                            // done with this tank: erase + restore
        this.dyingTanks.pop();
        this.vga.palette[ci] = GAME_PALETTE[ci].slice(); this.vga._syncPalette();
        a.di++; a.t = 0; a.soundPlayed = false;
        if (a.di >= a.queue.length) { this.drawScene(); return true; }
        this.drawScene();
        return false;
      }
      this.vga.palette[ci] = col; this.vga._syncPalette();
      this.drawScene();
      return false;
    }

    if (a.kind === 'crater') {
      const STEP = 1000 / 60, TOTAL = 31 * STEP;          // 15 up + 16 down vsyncs
      if (a.t === undefined) {
        a.t = 0;
        this.spk.play(SND.craterSeq(a.B), this.options.soundFX);
      } else a.t += dt;
      if (a.t >= TOTAL) {
        this.vga.buf.set(this.bg); makeCrater(this.vga, a.x, a.y, a.B); this.bg = this.vga.buf.slice();
        this.vga.palette[COL.NUKE_RED] = GAME_PALETTE[COL.NUKE_RED].slice(); // restore red
        this.vga._syncPalette();
        this.drawScene();
        return true;
      }
      // flash colour: index 12 ramps sky(16,51,63) → white(63,63,63) → sky (6-bit DAC)
      const i = Math.floor(a.t / STEP);
      const ph = i <= 15 ? i : Math.max(0, 31 - i);
      const e = v => ((v << 2) | (v >> 4)) & 0xff;
      this.vga.palette[COL.NUKE_RED] =
        [e(Math.round(47 * ph / 15) + 16), e(Math.round(12 * ph / 15) + 51), e(63)];
      this.vga._syncPalette();
      this.drawScene();                                    // bg + tanks
      // crater-shaped flash in index 12, clipped to the playfield (like sub_b044)
      const W = this.vga.W, r = a.B;
      for (let dy = -r; dy <= r; dy++) {
        const y = a.y + dy;
        if (y < FIELD.YTOP || y > FIELD.YBOT) continue;
        const half = Math.floor(Math.sqrt(r * r - dy * dy) + 1e-9);
        const x0 = Math.max(FIELD.X0, a.x - half), x1 = Math.min(FIELD.X1, a.x + half);
        if (x0 <= x1) this.vga.buf.fill(COL.NUKE_RED, y * W + x0, y * W + x1 + 1);
      }
      this.vga.present();
      return false;
    }

    // ---- animated tank fall + fall damage — DECOMPILED 1:1 from sub_6d3c, driven per
    // tank by sub_7060's loop (0x70a0..0x7132). SEQUENTIAL, exactly like the original:
    // each tank falls to completion, and if the fall kills it, sub_6d3c flashes it
    // (sub_6895 @0x6f08) BEFORE sub_7060 advances to the next tank — falls and their
    // death-flashes never overlap. A tank not supported at its centre (sub_6cbd) drops
    // one pixel per step, SLIDING toward the open side (sub_6b0c left / sub_6a93 right)
    // until its footprint finds ground (sub_6b84) or BOTH sides are blocked. sub_6d3c
    // has NO Sound call — the fall is SILENT (the 700 Hz tone nearby is the Caveman drill
    // sub_3bb7 @0x3c4c, not this). Fall damage (§4): fall>2·crew0 ⇒ crew 0; else
    // crew0−⌊fall/2⌋; power=min(power,10·crew), recomputed each step so the tank visibly
    // dims. Skipped for an active parachute (sub_02d4 ⇒ flag 0), but that tank still
    // settles. Terrain is untouched by the fall, so the tank order is result-irrelevant
    // (we process in player order — the original walks the 0x1161 order array).
    if (a.kind === 'fall') {
      const W = this.vga.W, bg = this.bg, players = this.players;
      // Support/blocked tests read the composited scene: sub_6cbd et al. use GetPixel != sky,
      // so GROUND *or any OTHER alive tank* supports (a tank can rest on top of another). The
      // tank whose own support we test (`excl`) is excluded so it can't support itself.
      let excl = null;
      const g = (x, y) => {
        if (x < 0 || x >= W || y < 0 || y >= 480) return false;
        if (bg[y * W + x] === COL.GROUND) return true;
        for (const o of players) { if (o === excl || !o.alive) continue; if (tankOccupies(o, x, y)) return true; }
        return false;
      };
      if (!a.tanks) {                                     // discover candidates once
        a.tanks = players.filter(t => t.alive);
        a.ti = 0; a.started = false; a.acc = 0;
      }
      // pick the next tank that actually needs to fall (sub_6cbd initial test @0x6d7b)
      while (a.ti < a.tanks.length && !a.started) {
        const t = a.tanks[a.ti];
        excl = t;
        if (t.alive && !centreSupp(g, t.x | 0, t.y | 0)) {
          t._startY = t.y | 0; t._crew0 = t.crew; a.started = true; a.acc = 0;
        } else a.ti++;
      }
      if (a.ti >= a.tanks.length) return true;            // no (more) tanks to fall
      const t = a.tanks[a.ti];
      excl = t;
      a.acc += (dt / 1000) * FALL_PX_PER_SEC;
      let steps = Math.floor(a.acc); a.acc -= steps;
      let landed = false;
      while (steps-- > 0 && !landed) {
        let x = t.x | 0, y = t.y | 0;
        // sub_6d3c @0x6dd4: BOTH edge tests read the ORIGINAL X (0x3b), then a copy is
        // shifted — so evaluate leftBlk/rightBlk before applying either shift.
        const lb = leftBlk(g, x, y), rb = rightBlk(g, x, y);
        if (lb) x++;                                      // sub_6b0c: slide off blocked left
        if (rb) x--;                                      // sub_6a93: slide off blocked right
        y++;                                              // drop one pixel
        t.x = x; t.y = y;
        if (!t.hasParachute) {                            // sub_6d3c damage branch (flag==1)
          const fall = y - t._startY;
          t.crew = (fall > 2 * t._crew0) ? 0 : t._crew0 - Math.floor(fall / 2);
          t.power = Math.min(t.power, 10 * Math.max(0, t.crew));
        }
        if (footSupp(g, x, y) || (leftBlk(g, x, y) && rightBlk(g, x, y)) || y >= FIELD.YBOT) landed = true;
      }
      this.drawScene();
      if (!landed) return false;                          // this tank is still falling
      // this tank settled. Credit any crew the FALL cost to the shooter — sub_6d3c adds
      // max(0, crew0−crew) to the kill counter [0x1692] (×50 for points AND money), for
      // every tank other than the shooter itself.
      const fallLoss = Math.max(0, (t._crew0 || 0) - t.crew);
      if (fallLoss > 0 && t !== this.players[this._shooterIdx]) {
        const sh = this.players[this._shooterIdx];
        if (sh) { sh.points += 50 * fallLoss; sh.money += 50 * fallLoss; }
        this._menKilled = (this._menKilled || 0) + fallLoss;
      }
      // advance; if the fall killed it, interleave its death flash NOW (before the next
      // tank falls), exactly as sub_6d3c → sub_6895 does inline.
      delete t._startY; delete t._crew0;
      a.ti++; a.started = false;
      if (t.alive && t.crew <= 0) {
        t.alive = false;
        const death = { kind: 'death', queue: [{ x: t.x, y: t.y, angle: t.angle, colorIndex: t.colorIndex }], di: 0, t: 0, soundPlayed: false };
        if (a.ti < a.tanks.length) this.phases.unshift(a);   // resume the remaining falls after…
        this.phases.unshift(death);                          // …flashing this tank first
        return true;
      }
      return a.ti >= a.tanks.length;                      // stay in phase if tanks remain
    }

    // 'ops': consume the op queue at the original's sample rate; carve into the world
    // layer and build this frame's speaker gating pattern (tone while eating ground,
    // silence while the strip lines cross already-open space).
    const ops = a.ops;
    a.budget = (a.budget || 0) + (dt / 1000) * EFFECT_SAMPLES_PER_SEC;
    const slots = [];
    while (a.i < ops.length) {
      const o = ops[a.i];
      const c = o.cost || (o.px.length + 1);
      if (c > a.budget) break;
      a.budget -= c;
      for (const idx of o.px) this.bg[idx] = COL.SKY;       // carve into world layer
      if (o.add) for (const idx of o.add) this.bg[idx] = COL.GROUND;  // collapse: pixel lands
      const f = (o.px.length || (o.add && o.add.length)) ? o.f : 0;
      const d = c / EFFECT_SAMPLES_PER_SEC;
      const last = slots[slots.length - 1];
      if (last && last.f === f) last.d += d; else slots.push({ f, d });
      a.i++;
    }
    if (slots.length) this.spk.gate(slots.slice(0, 160), this.options.soundFX);
    this.drawScene();
    if (a.i >= ops.length) { this.spk.soundOff(); return true; }
    return false;
  }

  // called at the end of a round: scoring pot + wins + consume protections
  endRoundScoring() {
    const survivors = this.aliveCount();
    const N = this.players.length;
    if (survivors > 0) {
      const bonus = Math.floor(((N - survivors) * 1000) / survivors);
      for (const p of this.players) {
        if (p.alive) { p.money += bonus; p.points += bonus; }
      }
    }
    if (survivors === 1) {
      const w = this.players.find(p => p.alive);
      if (w) w.wins++;
    }
    // protections are per-round: consume one unit of each owned protection
    for (const p of this.players) {
      for (const w of [WPN.PARACHUTE, WPN.QUAKEPROT, WPN.SHIELD]) {
        p.inventory[w] = Math.max(0, (p.inventory[w] || 0) - 1);
      }
    }
  }

  // AI move for the current player
  aiMove() {
    const p = this.players[this.current];
    const ctx = {
      order: this.order, slot: this.turnSlot,
      nextAliveSlot: (s) => this.nextAliveSlot(s),
      prevAliveSlot: (s) => this.prevAliveSlot(s),
      surfaceY: (x) => this.surfaceHeightAt(x),
    };
    const mv = computeMove(this.players, this.current, this.errRateWork, this.rnd, this.options.reflectActive, ctx);
    p.weapon = mv.weapon;
    p.angle = Math.max(0, Math.min(180, mv.angle));
    p.power = Math.max(0, Math.min(10 * p.crew, mv.power));
    // sub_b4a2: the aiming brains (Jack/Ballisto/Terminator-direct/-reflect) mark their
    // TARGET with a shrinking red ring before firing; random brains (Berti/Klaus) and the
    // super-blast / blind-lob branches do not (they return no ringTarget).
    this._aimRingTarget = (mv.ringTarget && mv.ringTarget.alive) ? mv.ringTarget : null;
  }

  // Draw one frame of the CPU aim ring (sub_b4a2): a red (colour 12) circle of the given
  // radius around the target tank, clipped to the play field, over the current scene.
  drawAimRing(tank, r) {
    this.drawScene();
    if (r <= 0) return;
    const W = this.vga.W, buf = this.vga.buf, cx = tank.x | 0, cy = tank.y | 0;
    const plot = (x, y) => {
      if (x >= FIELD.X0 && x <= FIELD.X1 && y >= FIELD.YTOP && y <= FIELD.YBOT) buf[y * W + x] = COL.NUKE_RED;
    };
    let x = r, y = 0, err = 1 - r;         // integer midpoint circle (like BGI Circle)
    while (x >= y) {
      plot(cx + x, cy + y); plot(cx - x, cy + y); plot(cx + x, cy - y); plot(cx - x, cy - y);
      plot(cx + y, cy + x); plot(cx - y, cy + x); plot(cx + y, cy - x); plot(cx - y, cy - x);
      y++; if (err < 0) err += 2 * y + 1; else { x--; err += 2 * (y - x) + 1; }
    }
    this.vga.present();
  }

  // Between-rounds CPU auto-shopping — DECOMPILED 1:1 from the CPU branch of sub_9d62
  // (0xa801..0xab34) + the affordable-list builder sub_9b05. The CPU repeatedly rebuilds
  // the list of AFFORDABLE weapons (price ≤ money, ascending w = 1..13, sub_9b05 @0x9b25)
  // and, per its personality brain, either buys one bundle (inventory[w] += lot,
  // money -= price, @0xaad6) or stops. Probabilistic brains stop the moment their die
  // roll says "no buy"; Berti buys until nothing is affordable. IMPORTANT: the field the
  // brains read as an "AI stat" (`es:[rec+0x1a]`, compared to 20) is simply inventory[2]
  // — the 5 kT Nuke count (inventory lives at rec+0x16+w·2, so w=2 → +0x1a); it is never
  // written elsewhere. Since the cheapest item (HandGrenade, 1000) is always list[0] when
  // anything is affordable, every downward cat-scan is guaranteed to terminate at index 0.
  cpuShop(p) {
    let guard = 0;
    while (guard++ < 5000) {
      const list = [];
      for (let w = 1; w <= 13; w++) if (WEAPON_TABLE[w].price <= p.money) list.push(w);
      if (!list.length) break;                       // nothing affordable (sub_9b05 count==0)
      const d = this._cpuShopDecide(p, list);        // {w, buy}
      if (!d.buy) break;
      p.inventory[d.w] = (p.inventory[d.w] || 0) + WEAPON_TABLE[d.w].lot;
      p.money -= WEAPON_TABLE[d.w].price;
    }
  }

  // One CPU purchase decision from the affordable `list` (ascending weapon ids). Returns
  // {w, buy}. Mirrors the five brains at 0xa811 (Berti), 0xa83e (Klaus), 0xa8a2 (Jack),
  // 0xa9a0 (Ballisto) and the default 0xaa59 (Terminator).
  _cpuShopDecide(p, list) {
    const R = this.rnd;
    const cat = w => WEAPON_TABLE[w].cat;
    const owns = w => (p.inventory[w] || 0) > 0;
    const n = list.length, last = n - 1;
    const name = p.personality;

    if (name === 'Berti')                             // Brain1: random affordable, always buy
      return { w: list[R.next(n)], buy: true };

    if (name === 'Klaus') {                           // Brain2: highest cat-0/6, 50%
      let k = last; while (k > 0 && cat(list[k]) !== 0 && cat(list[k]) !== 6) k--;
      return { w: list[k], buy: (R.next(10) & 1) === 1 };
    }

    if (name === 'Jack') {                            // Brain3
      if (!owns(WPN.PINGPONG)) {                      // owns no Ping-Pong → buy it if affordable
        const i = list.indexOf(WPN.PINGPONG);
        return i >= 0 ? { w: WPN.PINGPONG, buy: true } : { w: list[last], buy: false };
      }
      let k = last;                                   // else: highest cat-2 / owned cat-6, 70%
      while (k > 0 && !(cat(list[k]) === 2 || (cat(list[k]) === 6 && owns(list[k])) || list[k] <= 1)) k--;
      const c = cat(list[k]);
      return { w: list[k], buy: (c === 2 || c === 6) ? R.next(10) < 7 : false };
    }

    if (name === 'Ballisto') {                        // Brain4
      if ((p.inventory[2] || 0) < 20) {               // stock 5 kT Nukes up to 20
        const i = list.indexOf(2);
        return i >= 0 ? { w: 2, buy: true } : { w: list[last], buy: false };
      }
      let k = R.next(n);                              // else: random start → cat-0 / unowned cat-6, 50%
      while (k > 0 && !(cat(list[k]) === 0 || (cat(list[k]) === 6 && !owns(list[k])))) k--;
      return { w: list[k], buy: (R.next(10) & 1) === 1 };
    }

    // Terminator / default (Brain5)
    if ((p.inventory[2] || 0) < 20) {                 // stock 5 kT Nukes up to 20
      const i = list.indexOf(2);
      return i >= 0 ? { w: 2, buy: true } : { w: list[last], buy: false };
    }
    let k = R.next(n);                                // else: random start, skip cat-2, 70%
    while (k > 0 && cat(list[k]) === 2) k--;
    return { w: list[k], buy: R.next(10) < 7 };
  }
}

// ---- marker drawing helpers (2x2 block, colour 14; trace colour 15) -----------
// The exact integer position last drawn is stored on the projectile so the erase
// removes precisely those pixels (rounding is not reversible from the float pos).
// Each of the 2x2 pixels is CLIPPED to the playfield interior (x 4..635, y 63..475):
// with reflecting walls OFF the shell flies past the field edges, and without the clip
// its trace would draw over the surrounding 3-D frame (as the original never does — BGI
// draws inside the viewport). drawMarker/eraseLastMarker share the same clip so the erase
// removes exactly what was drawn.
function markerPix(vga, x, y, c) {
  if (x >= FIELD.X0 && x <= FIELD.X1 && y >= FIELD.YTOP && y <= FIELD.YBOT) vga.putPixel(x, y, c);
}
function drawMarker(vga, p) {
  const x = Math.round(p.x), y = Math.round(p.y);
  p.mx = x; p.my = y;
  markerPix(vga, x, y, COL.PROJECTILE);     markerPix(vga, x + 1, y, COL.PROJECTILE);
  markerPix(vga, x, y + 1, COL.PROJECTILE); markerPix(vga, x + 1, y + 1, COL.PROJECTILE);
}
function eraseLastMarker(vga, p, trace) {
  if (p.mx === undefined) return;
  const x = p.mx, y = p.my, c = trace ? COL.TRACE : COL.SKY;
  markerPix(vga, x, y, c);     markerPix(vga, x + 1, y, c);
  markerPix(vga, x, y + 1, c); markerPix(vga, x + 1, y + 1, c);
}




// ===== main.js =====
// main.js — front-end: boot, screen state machine, input, and the animation loop.
// Screen flow mirrors the original: main options menu -> name/player setup ->
// play rounds (aim -> flight -> impact -> settle) -> shop between games -> rankings.













const CPU_NAMES = ['Terminator', 'Ballisto', 'Jack', 'Klaus', 'Berti'];

const canvas = document.getElementById('screen');
const overlay = document.getElementById('overlay');
const vga = new VGA(canvas, MENU_PALETTE.map(c => c.slice()));
vga.setFont(FONT8X8);
const rnd = new TPRandom();
rnd.randomize();   // TP7 `Randomize` at program start: time-based seed so terrain/wind/shooters
                   // differ every session. (Without this the seed stayed 0 → identical first world.)
                   // The ?seed= debug path below overrides this for reproducible screenshots.
const spk = new PCSpeaker();
const game = new Game(vga, rnd, spk);

// fit canvas to viewport, integer-scaled, 4:3.
function resize() {
  const s = Math.max(1, Math.min(Math.floor(innerWidth / 640), Math.floor(innerHeight / 480)));
  canvas.style.width = (640 * s) + 'px';
  canvas.style.height = (480 * s) + 'px';
}
addEventListener('resize', resize); resize();

// ------------------------------------------------------------------ state ----
const S = { MENU: 'menu', NAMES: 'names', AIM: 'aim', FLIGHT: 'flight',
  IMPACT: 'impact', ANIM: 'anim', BETWEEN: 'between', SHOP: 'shop', RANK: 'rank',
  HELP: 'help', QUIT: 'quit', STATUS: 'status', ROUNDINTRO: 'roundintro', HISCORE: 'hiscore',
  INFO: 'info', FAREWELL: 'farewell' };
let state = S.MENU;
let prevState = S.AIM;

// main menu model
const MENU_ITEMS = [
  { key: 'soundFX',      label: 'SoundFX',            type: 'bool' },
  { key: 'flightSFX',    label: 'Flight SoundFX',     type: 'bool' },
  { key: 'reflectWalls', label: 'Reflecting Walls',   type: 'refl' },
  { key: 'showTrace',    label: 'Show Trace',         type: 'bool' },
  { key: 'useMouse',     label: 'Use your Mouse',     type: 'bool' },
  { key: 'errorRate',    label: 'Computer Error Rate',type: 'pct'  },
  { key: 'moneyStart',   label: 'Money from Start : $',type: 'money'},
  { key: 'gamesPerMatch',label: 'Games per Match',    type: 'games'},
  { key: 'numPlayers',   label: 'Number of Players',  type: 'players'},
];
let menuSel = MENU_ITEMS.length;   // original: "Go for it !" is pre-highlighted (MenuSelect last)

// name-setup model
let nameSetup = null;

// shop model
let shop = null;
let farewell = null;   // active shareware farewell screen (sub_116c), set on Esc-in-menu
let _startMs = Date.now();   // program-start timestamp, for the farewell's "You played N…"
let infoTimer = 0;           // 'A' info screen auto-dismiss countdown (sub_95a0: ~200 cs = 2 s)

// impact pause timer
let impactTimer = 0;
let introTimer = 0;
// set once the player presses any key / mouse button during the parachute fly-in,
// which (as in the original) skips the per-step vsync wait and runs it at full speed.
let introFast = false;
// wall-clock timestamp of the previous animation frame (for refresh-independent timing)
let lastFrameTs = 0;

// ---- software mouse cursor (like the original: the OS cursor is hidden, we draw an
// arrow that follows the mouse AND jumps onto the selected element on keyboard input) ---
const cursor = { x: 320, y: 240, show: false };
let kbSelect = false;   // true => cursor snaps to the keyboard selection; false => follows mouse
// Original arrow, extracted PIXEL-EXACT from a DOSBox capture: solid body in index 15
// (grey in the menu palette, white in-game) with an outline drawn in colour 0 — which in
// the original IS the background colour, so the outline is invisible on the bg and only
// "punches through" text/frames the cursor passes over. We reproduce that with COL.SKY.
const CURSOR_BMP = [
  'X.......',
  'XX......',
  'XXX.....',
  'XXXX....',
  'XXXXX...',
  'XXXXXX..',
  'XXXXXXX.',
  'XXXXXXXX',
  'XXXXX...',
  'XX.XX...',
  'X...XX..',
  '....XX..',
  '.....XX.',
  '.....XX.',
];
function drawCursor() {
  if (!cursor.show) return;
  const ox = cursor.x | 0, oy = cursor.y | 0;
  const at = (rx, ry) => ry >= 0 && ry < CURSOR_BMP.length && CURSOR_BMP[ry][rx] === 'X';
  for (let ry = -1; ry <= CURSOR_BMP.length; ry++) {
    for (let rx = -1; rx <= 8; rx++) {
      if (at(rx, ry)) { vga.putPixel(ox + rx, oy + ry, 15); continue; }   // body (index 15)
      let touch = false;                                   // colour-0 outline around the body
      for (let dy = -1; dy <= 1 && !touch; dy++)
        for (let dx = -1; dx <= 1 && !touch; dx++) touch = at(rx + dx, ry + dy);
      if (touch) vga.putPixel(ox + rx, oy + ry, COL.SKY);
    }
  }
}
// warp the software cursor onto a screen element (like MouseGlideTo/MouseToMenuItem)
function warpCursor(x, y) { cursor.x = x; cursor.y = y; cursor.show = true; }
// redraw whatever screen is currently visible (used after a mouse move)
function redrawCurrent() {
  if (state === S.MENU) drawMenu();
  else if (state === S.NAMES) drawNames();
  else if (state === S.SHOP) drawShop();
}
// position the software cursor over the current keyboard selection (per screen)
function warpToSelection() {
  if (state === S.MENU) {
    if (popup) {                                     // MouseToMenuItem: glide onto the popup button
      const b = popup.def.btn;
      warpCursor(((b.x1 + b.x2) >> 1) - 4, b.ys[popup.sel] + 4);
      return;
    }
    const { x2, top, h, goY } = MENU_LAYOUT;
    if (menuSel < MENU_ITEMS.length) warpCursor(x2 - 74, top + menuSel * h + 8);
    else warpCursor(360, goY + 12);
  } else if (state === S.NAMES && nameSetup) {
    if (nameSetup.phase === 'hc') warpCursor(505, nameSetup.isComputer ? 138 : 106);
    else if (nameSetup.phase === 'cpu') warpCursor(505, 244 + nameSetup.cpuSel * 40);
    else warpCursor(70, 82 + nameSetup.idx * 24);   // typing: point at the row
  } else if (state === S.SHOP && shop) {
    const col = shop.side === 0 ? SHOP_BUY : SHOP_SELL;
    warpCursor((col.x1 + col.x2) / 2 - 40, SHOP_ROWY(shop.sel) + 2);
  }
}

// ---------------------------------------------------------------- rendering --
function valueText(item) {
  const o = game.options;
  switch (item.type) {
    case 'bool': return o[item.key] ? 'Yes' : 'No';
    case 'refl': return ['No', 'RND', 'Yes'][o.reflectWalls];
    case 'pct':  return o.errorRate + ' %';
    case 'money':return '' + o.moneyStart;
    default:     return '' + o[item.key];
  }
}

// Menu colour roles (MENU_PALETTE): 11 blue bg, 15 grey text/bevel-light, 0 black
// text-shadow/bevel-dark, 1 red title, 6 white. The original draws all ×2 menu text
// EMBOSSED: a 1-px black drop-shadow under the main colour (measured from the original).
const MENU_TEXT = 15;   // grey (195,195,195)
function drawMenu() {
  // Geometry pixel-measured from a DOSBox capture of the original menu: full-screen raised
  // Frame3DThick, red size-2 title at y=20 with a red underline at y=40 (x 205..433), item
  // boxes (40,y)-(508,y+35) at y = 50 + i*40, labels at x=58 (+9 into the box), values
  // right-aligned to x2-16, and the "Go for it !" box SET OFF at y=430..465 (25 px gap).
  vga.setPalette(MENU_PALETTE.map(c => c.slice()));
  vga.clear(COL.SKY);                              // menu blue background
  frame3DThick(vga, 0, 0, 639, 479, false);        // full-screen raised frame (was missing)
  embCenter('TankWars V2.07', 20, 2, COL.RED);     // red title, embossed
  vga.line(206, 41, 434, 41, COL.BLACK);           // underline shadow
  vga.line(205, 40, 433, 40, COL.RED);             // red underline
  const x1 = 40, x2 = 508, top = 50, h = 40;
  // MenuDrawItem label colour: [0x177c]=15 grey normally, [0x177e]=6 WHITE when highlighted
  const itemCol = (i) => (i === menuSel ? 6 : MENU_TEXT);
  for (let i = 0; i < MENU_ITEMS.length; i++) {
    const y = top + i * h;
    drawButton(x1, y, x2, y + 35, i === menuSel);
    embText(60, y + 9, MENU_ITEMS[i].label, 2, itemCol(i));   // MenuDrawItem: f5+10·size = 60
    const v = valueText(MENU_ITEMS[i]);
    embText(x2 - 16 - v.length * 16, y + 9, v, 2, itemCol(i));
  }
  const gy = 430;                                  // original: clearly separated from the items
  const goSel = menuSel === MENU_ITEMS.length;
  drawButton(x1, gy, x2, gy + 35, goSel);
  // original label is "       Go for it !" (7 leading spaces) drawn at x=60 like every menu
  // item → text starts at 60+7*16 = 172 (NOT box-centred); measured x=172 in the golden.
  embText(172, gy + 9, 'Go for it !', 2, goSel ? 6 : MENU_TEXT);   // white when selected
  vga.outText(550, 459, '©1995 ML', 1, 6);         // white copyright (measured 550,459)
  if (popup) drawPopup();                          // active options popup on top
  if (kbSelect) warpToSelection();
  drawCursor();
  vga.present();
}

// Menu button: blue interior (no fill), raised 3-D bevel (grey top/left, black
// bottom/right). The selected item is drawn sunken (inverted bevel).
function drawButton(x1, y1, x2, y2, sel) {
  frame3DThick(vga, x1, y1, x2, y2, sel);
}
// Embossed text: 1-px black drop-shadow under the main colour (final-pixel offset,
// independent of scale) — matches the original's OutTextXY menu styling.
function embText(x, y, str, scale, color) {
  vga.outText(x + 1, y + 1, str, scale, COL.BLACK);
  vga.outText(x, y, str, scale, color);
}
function embCenter(str, y, scale, color) {
  const w = str.length * 8 * scale;
  embText((640 - w) >> 1, y, str, scale, color);
}
function centerText(str, y, scale, color) {
  const w = str.length * 8 * scale;
  vga.outText((640 - w) >> 1, y, str, scale, color);
}

// ------------------------------------------------------------------- input ---
function changeMenuValue(dir) {
  const o = game.options;
  const it = MENU_ITEMS[menuSel];
  switch (it.type) {
    case 'bool': o[it.key] = !o[it.key]; break;
    case 'refl': o.reflectWalls = (o.reflectWalls + (dir > 0 ? 1 : 2)) % 3; break;
    case 'pct':  o.errorRate = Math.max(0, Math.min(100, o.errorRate + dir)); spk.play(SND.optErrorRate(o.errorRate), o.soundFX); break;
    case 'money':o.moneyStart = Math.max(0, Math.min(100000, o.moneyStart + dir * 1000)); spk.play(SND.optMoney(o.moneyStart), o.soundFX); break;
    case 'games':o.gamesPerMatch = Math.max(1, Math.min(50, o.gamesPerMatch + dir)); spk.play(SND.optGames(o.gamesPerMatch), o.soundFX); break;
    case 'players':o.numPlayers = Math.max(2, Math.min(10, o.numPlayers + dir)); spk.play(SND.optPlayers(o.numPlayers), o.soundFX); break;
  }
}

function beginNames() {
  // original order: choose Human/Computer first, THEN enter a name (human) or pick a
  // computer opponent — so the phase starts at 'hc'.
  nameSetup = { count: game.options.numPlayers, idx: 0, defs: [], phase: 'hc',
                buffer: '', isComputer: false, cpuSel: 0 };
  state = S.NAMES;
  kbSelect = true;
  drawNames();
}

function drawNames() {
  // Geometry pixel-measured from a DOSBox golden: full-screen frame + a nested inner frame,
  // red size-2 title at y=20, the player list box (50,70)-(400,440), and the right-hand
  // "Player Nr." box (420,70)-(580,170) with Human/Computer buttons. List rows: pitch 35,
  // first row y≈88, number at x≈92 (scale 2).
  vga.setPalette(MENU_PALETTE.map(c => c.slice()));
  vga.clear(COL.SKY);
  frame3DThick(vga, 0, 0, 639, 479, false);        // outer screen frame (raised)
  frame3DThick(vga, 20, 50, 619, 460, true);       // inner panel frame (sunken, measured)
  vga.outText(180, 20, 'The names please', 2, COL.RED);   // fixed x=180 (measured, not centred)
  frame3D(vga, 50, 70, 400, 440, false);           // player-list box
  const rowY = (i) => 88 + i * 35;
  for (let i = 0; i < nameSetup.defs.length; i++) {
    vga.outText(92, rowY(i), `${i + 1} ${nameSetup.defs[i].name}`, 2, TANK_COLORS[i]);
  }
  const i = nameSetup.idx;
  vga.outText(72, rowY(i), '→', 2, COL.RED);       // cursor arrow on the current row
  if (nameSetup.phase === 'type') {
    vga.outText(92, rowY(i), `${i + 1} ${nameSetup.buffer}_`, 2, TANK_COLORS[i]);
  } else {
    vga.outText(92, rowY(i), `${i + 1}`, 2, TANK_COLORS[i]);
  }
  if (nameSetup.phase === 'hc') {
    frame3DThick(vga, 420, 70, 580, 170, true);    // thick frame (measured 4px)
    centerTextIn(420, 580, 80, `Player Nr. ${i + 1}`, 1, COL.RED);
    drawButton(445, 105, 555, 125, !nameSetup.isComputer);
    centerTextIn(445, 555, 110, 'Human', 1, COL.BEVEL_DARK);
    drawButton(445, 130, 555, 150, nameSetup.isComputer);
    centerTextIn(445, 555, 135, 'Computer', 1, COL.BEVEL_DARK);
  } else if (nameSetup.phase === 'cpu') {
    frame3D(vga, 420, 200, 580, 450, true);
    centerTextIn(420, 580, 210, 'Computerplayer', 1, COL.RED);
    for (let k = 0; k < CPU_NAMES.length; k++) {
      drawButton(445, 230 + k * 40, 555, 262 + k * 40, k === nameSetup.cpuSel);
      vga.outText(455, 238 + k * 40, '■' + CPU_NAMES[k], 1, COL.BEVEL_DARK);
    }
  }
  if (kbSelect) warpToSelection();
  drawCursor();
  vga.present();
}
function centerTextIn(x1, x2, y, str, scale, color) {
  const w = str.length * 8 * scale;
  vga.outText(x1 + ((x2 - x1 - w) >> 1), y, str, scale, color);
}

// commit a finished player definition and advance
function commitPlayer(def) {
  // CPU players keep the leading ■ (0xfe) in their display name, as the original stores it
  // (personality stays plain for the AI dispatcher).
  if (def.isComputer && def.name && def.name[0] !== '■') def = { ...def, name: '■' + def.name };
  spk.play(SND.shopEnter, game.options.soundFX);   // per-player commit beep (Sound 400 + Delay 20)
  nameSetup.defs.push(def);
  nameSetup.idx++;
  if (nameSetup.idx >= nameSetup.count) {
    game.setupPlayers(nameSetup.defs);
    // The original main loop (0xeaa3-0xeac7) runs the SHOP before EVERY game — including
    // game 1. With the default $0 nobody passes the can-buy-or-sell test (sub_9a18) and the
    // shop is skipped invisibly; with "Money from Start" > 0 it appears before round 1.
    game.currentGame = 1;
    beginShop();
  } else {
    nameSetup.phase = 'hc'; nameSetup.buffer = ''; nameSetup.isComputer = false;
    drawNames();
  }
}

// ------------------------------------------------------------- game control --
function startNewGame() {
  game.currentGame = game.currentGame || 1;
  spk.enabled = game.options.soundFX;
  game.startRound();
  introFast = false;            // fresh fly-in: full-speed skip not yet requested
  state = S.ROUNDINTRO;          // parachute the tanks in, then start aiming
}

function maybeAITurn() {
  const p = game.players[game.current];
  if (p.isComputer) {
    state = S.AIM;
    setTimeout(() => {
      game.aiMove();
      game.drawScene();
      aimRingThenFire();
    }, 500);
  }
}

// sub_b4a2: before a CPU with an aiming brain fires, a red ring collapses around its target
// (radius 50 → 0). Random brains set no ringTarget and fire after a short pause.
function aimRingThenFire() {
  const doFire = () => { if (game.fire()) state = S.FLIGHT; else endTurn(); };
  const tgt = game._aimRingTarget;
  if (!tgt) { setTimeout(doFire, 400); return; }
  let r = 50;
  (function step() {
    if (state !== S.AIM) return;                 // aborted (e.g. window/state changed)
    if (r <= 1) { game.drawScene(); setTimeout(doFire, 120); return; }
    game.drawAimRing(tgt, r);
    r -= Math.max(1, Math.floor(r / 6));         // proportional shrink, like sub_b4a2
    setTimeout(step, 22);
  })();
}

function endTurn() {
  if (game.aliveCount() <= 1) { finishRound(); return; }
  game.nextPlayer();
  state = S.AIM;
  // panel preference persists ([0x1775]): a new HUMAN turn re-shows the confined cursor
  // and glides it onto the protractor (sub_557a tail: MouseCursor(1)+MouseGlideTo(190,30))
  const np = game.players[game.current];
  if (game.mousePanel && np && !np.isComputer) { warpCursor(190, 30); redrawAim(); }
  else { cursor.show = false; game.drawScene(); }
  maybeAITurn();
}

function finishRound() {
  game.endRoundScoring();
  // (No end-of-round tally sound in the original — those tones play at ROUND START, see
  // game.js stepRoundIntro / SND.roundPlace.) Rankings are shown after EVERY game (sub_abdc),
  // BEFORE advancing the game counter, so the title reads "after <currentGame> of <M>".
  beginRankings();
}

// Leave the rankings screen: after the LAST game return to the main menu, otherwise advance
// to the next game's shop (original main loop 0xeaa3-0xeac7). There is NO post-match Lucky
// Shots screen — that table is shown mid-game on a qualifying shot (see afterImpact). The
// original's end-of-match "New Match, new Luck ?" dialog (sub_8ac5) is deliberately unported.
function advanceAfterRankings() {
  if (game.currentGame >= game.options.gamesPerMatch) {
    game.currentGame = 1; state = S.MENU; drawMenu();
  } else {
    game.currentGame++;
    // NO arsenal reset here. The original (main loop 0xeaa3-0xeac7) only rebuilds the arsenal
    // ONCE per match in sub_7801 (0x7924); between games it keeps every purchased weapon. The
    // per-round reset (0xe9e7) touches only crew/power/protections — handled by startRound()
    // and endRoundScoring(). Resetting the arsenal here made bought weapons vanish unused.
    beginShop();
  }
}

// ---- shop (faithful 3-column layout: status bar + weapon list + Buy/For-Sale columns) ----
const WHITE = 6;
const SHOP_ROWY = (i) => 81 + 26 * i;              // y of weapon row / button i (1..13)
const SHOP_BUY = { x1: 327, x2: 470 };
const SHOP_SELL = { x1: 482, x2: 625 };

function canShop(p) {
  for (let w = 1; w <= 13; w++) {
    if (WEAPON_TABLE[w].price <= p.money) return true;                 // something to buy
    if ((p.inventory[w] || 0) >= WEAPON_TABLE[w].lot) return true;     // something to sell
  }
  return false;
}
function beginShop() {
  shop = { player: -1, side: 0, sel: 1 };
  nextShopPlayer();                                  // find first human who can shop
}
function nextShopPlayer() {
  let i = shop.player + 1;
  // CPU players auto-shop (sub_9d62 CPU branch) and are then skipped for the UI; humans
  // who can buy/sell get the interactive shop.
  while (i < game.players.length) {
    const pl = game.players[i];
    if (pl.isComputer) { game.cpuShop(pl); i++; continue; }
    if (canShop(pl)) break;
    i++;
  }
  if (i >= game.players.length) { startNewGame(); return; }
  shop.player = i; shop.side = 0; shop.sel = 1;
  spk.play(SND.shopEnter, game.options.soundFX);
  state = S.SHOP;
  kbSelect = true;
  drawShop();
}
function shopAdvancePlayer() { nextShopPlayer(); }

// build "name....right" padded to width with dots
function dotFill(left, right, width) {
  const r = String(right);
  const n = Math.max(1, width - left.length - r.length);
  return left + '.'.repeat(n) + r;
}

// centre a string within [x1,x2] and return the left x (8 px per char, size 1)
function centerX(x1, x2, str) { return x1 + (((x2 - x1) - str.length * 8) >> 1); }

function drawShop() {
  const p = game.players[shop.player];
  vga.setPalette(MENU_PALETTE.map(c => c.slice()));
  vga.clear(COL.SKY);                                 // ClearScreen([0x177b]) = bg blue (index 11)

  // --- frames (sub_9d62). The original's Frame3D "style 0" = raised (light top-left) and
  //     "style 1" = sunken (dark top-left); verified against the DOSBox bevels (top-bar top
  //     edge grey/195, bottom black/0 → raised). In our frame3D, raised=false = light-top-left. ---
  frame3DThick(vga, 0, 0, 639, 58, false);           // top status-bar border (raised)
  frame3DThick(vga, 0, 59, 639, 479, false);         // main outer frame (raised)
  frame3D(vga, 10, 65, 317, 447, true);              // left weapon-list window (sunken)
  frame3D(vga, 15, 98, 312, 355, false);             // upper box (10 offensive weapons)
  frame3D(vga, 15, 358, 312, 437, false);            // lower box (3 protections)
  frame3DThick(vga, 321, 65, 474, 447, false);       // "Buy these" column box
  frame3DThick(vga, 477, 65, 630, 447, false);       // "For Sale" column box

  // --- top panel (sub_3d21): NAME on its own line (10,6) in the tank colour, then FOUR
  //     right-aligned stat lines (x=25, y=16/26/36/46) in black (14) — Str(value:6)+label. ---
  vga.outText(10, 6, p.name, 1, p.colorIndex);
  vga.outText(25, 16, `${String(p.crew).padStart(6)} Men`, 1, 14);
  vga.outText(25, 26, `${String(p.wins).padStart(6)} Win${p.wins === 1 ? '' : 's'}`, 1, 14);
  vga.outText(25, 36, `${String(p.points).padStart(6)} Points`, 1, 14);
  vga.outText(25, 46, `${String(p.money).padStart(6)} Dollar`, 1, 14);
  // inventory: two columns of 5, GREY (15), name + dotted leader + count (cols at x=145/356)
  for (let k = 0; k < 5; k++) {
    const wa = k + 1, wb = k + 6, y = 6 + k * 10;
    vga.outText(145, y, dotFill(WEAPON_TABLE[wa].name, p.inventory[wa] || 0, 18), 1, 15);
    vga.outText(356, y, dotFill(WEAPON_TABLE[wb].name, p.inventory[wb] || 0, 27), 1, 15);
  }

  // headers — RED (12) with black shadow via emb; "Go to next…" is black (14) with a white outline
  const togo = game.options.gamesPerMatch - game.currentGame + 1;   // " Game"/" Games" plural (sub_10d23)
  // "You have <money> $ ( <N> Games to go )": money Str(:6), games-to-go Str(:3) (sub_9d62)
  emb(21, 72, `You have ${String(p.money).padStart(6)} $ ( ${String(togo).padStart(3)} Game${togo === 1 ? '' : 's'} to go )`, 1, 12);
  const gt = 'Go to next Window using [Tab].';
  for (const [dx, dy] of [[-1, 0], [1, 0], [0, -1], [0, 1]]) vga.outText(50 + dx, 85 + dy, gt, 1, 6);
  vga.outText(50, 85, gt, 1, 14);
  emb(centerX(SHOP_BUY.x1, SHOP_BUY.x2, 'Buy these'), 75, 'Buy these', 1, 12);   // measured y=75
  emb(centerX(SHOP_SELL.x1, SHOP_SELL.x2, 'For Sale'), 75, 'For Sale', 1, 12);

  // --- weapon rows (WHITE 6 + black shadow) + buy/sell buttons (GREY 15 prices) ---
  for (let w = 1; w <= 13; w++) {
    const y = SHOP_ROWY(w);
    const t = WEAPON_TABLE[w], lot = t.lot;
    const plural = lot === 1 ? '' : 's';
    const row = dotFill(`${String(lot).padStart(3)} ${t.name}${plural}`, '', 32);
    emb(21, y, row, 1, 6);

    // buy/sell prices: Str(price:7)+" $" (sub_9d62), a fixed-width 9-char field right-set in the button
    const buyable = t.price <= p.money;
    drawShopBtn(SHOP_BUY.x1, y, SHOP_BUY.x2, shop.side === 0 && shop.sel === w);
    if (buyable) vga.outText(SHOP_BUY.x2 - 8 - 9 * 8, y, `${String(t.price).padStart(7)} $`, 1, 15);
    const sellable = (p.inventory[w] || 0) >= lot;
    drawShopBtn(SHOP_SELL.x1, y, SHOP_SELL.x2, shop.side === 1 && shop.sel === w);
    if (sellable) vga.outText(SHOP_SELL.x2 - 8 - 9 * 8, y, `${String(t.price >> 1).padStart(7)} $`, 1, 15);
  }

  // --- bottom "start" bar ---
  frame3D(vga, 10, 450, 630, 473, false);
  const startTxt = `Start the ${game.currentGame}. Game, ${p.name} !`;
  emb(centerX(10, 630, startTxt), 460, startTxt, 1, 12);
  if (kbSelect) warpToSelection();
  drawCursor();
  vga.present();
}
function drawShopBtn(x1, y, x2, hot) {
  // blue interior (background) + grey 3-D bevel: RAISED normally, SUNKEN when selected
  // (agent: buttons style 0 raised / style 1 sunken → frame3D false / true).
  frame3D(vga, x1, y - 4, x2, y + 14, hot);
}

// ---- rankings ----
// emboss: navy shadow at (x+1,y+1) under the coloured text (like the original's OutTextXY pairs)
function emb(x, y, s, scale, color) { vga.outText(x + 1, y + 1, s, scale, COL.BEVEL_DARK); vga.outText(x, y, s, scale, color); }

function beginRankings() { state = S.RANK; drawRankings(); }
function drawRankings() {
  vga.setPalette(MENU_PALETTE.map(c => c.slice()));
  vga.clear(11);
  frame3DThick(vga, 0, 0, 639, 479, false);   // 3 nested bevels (sub_abdc 0xad12/0xae15/0xae2d)
  frame3DThick(vga, 20, 50, 619, 460, true);
  frame3DThick(vga, 30, 60, 609, 280, false);
  const M = game.options.gamesPerMatch, N = game.currentGame;   // "after N of M Games"
  emb(50, 20, `Rankings after ${N} of ${M} Games`, 2, COL.RED);   // shadow(14)+red(1), size 2
  // Each row is a leader-dot line ("<rank> " + 45 dots, white) with the name/wins/points
  // overprinted via sub_0c31, which fills a BLACK bar (colour 0) sized to the text and then
  // draws the text on it — punching the dots into clean separators between the columns.
  const order = [...game.players].sort((a, b) => b.wins - a.wins || b.points - a.points);
  order.forEach((p, k) => {
    const rank = k + 1;
    const y = rank * 20 + 55;                                    // sub_abdc: y = rank*20 + 55
    vga.outText(50, y, String(rank).padStart(2) + '.'.repeat(45), 1, WHITE);  // rank + leader dots
    rankCell(77,  y, p.name, p.colorIndex);                      // name (tank colour)
    rankCell(400, y, `${p.wins} Win${p.wins === 1 ? '' : 's'}`, WHITE);       // plural-s (sub_0d23)
    rankCell(480, y, `${p.points} Points`, WHITE);
  });
  // Trailing hint (only when NOT the last game, [0xf74] < [0xcfb]): a SINGLE string with
  // "( ...key ! )" pushed to the right by 20 embedded spaces (di=0xab98, length 67) — it is
  // not a separate right-aligned draw. This is what fixes the "…key" alignment.
  if (N < M) vga.outText(50, 443,
    "Well, not bad. But let's go on now." + ' '.repeat(20) + "( ...key ! )", 1, WHITE);
  vga.present();
}
// sub_0c31: an erase-bar sized to the text, then the text on top. The original fills with
// colour 0, which at runtime = the BACKGROUND colour (index 0 is the screen bg, NOT black —
// verified pixel-for-pixel against DOSBox: fill-0 renders as the menu blue srgb(40,81,255)).
// So we erase to the background (index 11) — the dots vanish behind the text, no black bars.
function rankCell(x, y, text, color) {
  vga.bar(x, y, x + text.length * 8, y + 6, COL.SKY);
  vga.outText(x, y, text, 1, color);
}

// ---- high scores: "The Lucky Shots" (sub_96f4) + localStorage persistence ----
const HS_KEY = 'tw_hiscores';
function loadHighScores() {
  try { const j = JSON.parse(localStorage.getItem(HS_KEY)); if (Array.isArray(j) && j.length === 10) return j; } catch (e) {}
  const def = [];                                    // sub_1ff5 default table: 11000 − 1000·i
  for (let i = 0; i < 10; i++) def.push({ name: 'M. Lindner', score: 11000 - 1000 * i });
  return def;
}
function saveHighScores(hs) { try { localStorage.setItem(HS_KEY, JSON.stringify(hs)); } catch (e) {} }
// "The Lucky Shots" is a table of the best SINGLE-SHOT results: score = 50 × enemy men
// killed by one shot (sub_bd08: [0x1692] accumulates men killed in non-self tanks across
// direct/chain/fall, then 0xcbb7 score = 50·[0x1692], compared to the table's lowest at
// 0xcbc0). Insert only if it beats the 10th entry; returns true if it made the table.
function recordLuckyShot(name, score) {
  const hs = loadHighScores();
  if (score <= hs[hs.length - 1].score) return false;   // 0xcbc8/0xcbd1: not high enough
  hs.push({ name, score });
  hs.sort((a, b) => b.score - a.score);
  hs.length = 10;
  saveHighScores(hs);
  return true;
}
// Modes: 'peek' = in-game 'L' key (0xdebd), returns to aiming; 'lucky' = a qualifying shot
// mid-game (0xccbe), then resumes the turn via _hsResume. Both draw over the game scene.
let _hsMode = 'peek', _hsPrev = S.MENU, _hsResume = null;
function beginHighScores(mode) { _hsMode = mode; _hsPrev = state; state = S.HISCORE; drawHighScores(); }
function leaveHighScores() {
  if (_hsMode === 'lucky') { const r = _hsResume; _hsResume = null; state = S.AIM; if (r) r(); }
  else { state = (_hsPrev === S.HISCORE) ? S.AIM : _hsPrev; game.drawScene(); }
}
function drawHighScores() {
  // sub_96f4: a top banner (fill 0 = bg) drawn OVER the running game — both the in-game 'L'
  // peek (arg 1 @0xdebd) and the qualifying-shot display (arg 0 @0xccbe) overlay the play
  // scene; there is NO post-match Lucky Shots screen in this build (verified in DOSBox).
  // Two columns of 5: col 1 rank+name at (130, n·10−4), score at 274 (n=1..5); col 2 at
  // (385, n·10−54)/529 (n=6..10). Entry = Str(n:2)+"."+name + leader dots + Str(score:6)+" Points".
  game.drawScene();
  vga.bar(4, 4, 635, 54, COL.SKY);
  vga.outText(10, 13, 'The Lucky Shots', 1, COL.NUKE_RED);   // colour 12
  const hs = loadHighScores();
  for (let n = 1; n <= 10; n++) {
    const left = n <= 5, y = left ? n * 10 - 4 : n * 10 - 54;
    const nx = left ? 130 : 385, px = left ? 274 : 529;
    const name = hs[n - 1].name, score = hs[n - 1].score;
    vga.outText(nx, y, `${String(n).padStart(2)}.${name}`, 1, 15);
    const dots = Math.max(0, 21 - name.length - String(score).length);
    if (dots) vga.outText(nx + 24 + name.length * 8, y, '.'.repeat(dots), 1, 15);
    vga.outText(px, y, `${String(score).padStart(6)} Points`, 1, 15);
  }
  vga.present();
}

// ---- help / status / quit overlays ----
function drawHelp() {
  // sub_8f25: bg-coloured top banner, red title, then a TWO-TONE key table. Each row is

// 'A' key gag screen (sub_95a0): a bg banner over the game, framed, with a red size-2 title

// ---- shareware farewell screen (sub_116c): a TEXT-MODE typewriter monologue shown on
// "quit" (Esc in the main menu). Pure text — yellow/light-gray/white on black, a 200 Hz
// click per character, the play-time, and one of four comments by minutes played. A browser
// has no program exit, so it returns to the main menu when done; any key/click fast-forwards
// the typing (as the original does). All strings are byte-exact from the EXE (0x0f32..0x114b).
const FW = { x0: 0, y0: 12, cols: 80, cw: 8, lh: 16 };   // DOS text mode: 80 cols from x=0
// DOS text-mode 16-colour palette (7 = light gray, 14 = yellow, 15 = white, on 0 = black).
const TEXT_PALETTE = [
  [0, 0, 0], [0, 0, 170], [0, 170, 0], [0, 170, 170], [170, 0, 0], [170, 0, 170], [170, 85, 0], [170, 170, 170],
  [85, 85, 85], [85, 85, 255], [85, 255, 85], [85, 255, 255], [255, 85, 85], [255, 85, 255], [255, 255, 85], [255, 255, 255],
];
function buildFarewellOps(overrideSec) {
  const totalSec = overrideSec != null ? overrideSec : Math.max(0, Math.floor((Date.now() - _startMs) / 1000));
  const h = Math.floor(totalSec / 3600), m = Math.floor((totalSec % 3600) / 60), s = totalSec % 60;
  const totalMin = h * 60 + m;
  const pl = (v) => (v === 1 ? '' : 's');          // plural "s" (sub_0d23) — 1 → "", else "s"
  const w = (v, n) => String(v).padStart(n);       // Str(v:n) — right-justified, space-padded
  const Y = 14, G = 7, W = 15;
  const seg = [[Y, '\n']];
  seg.push([Y, 'You played']);
  if (h > 0) seg.push([Y, w(h, 2) + ' hour' + pl(h) + ',']);
  if (m > 0) seg.push([Y, w(m, 3) + ' minute' + pl(m)]);
  if (s > 0 && (h > 0 || m > 0)) seg.push([Y, ' and']);
  if (s > 0) seg.push([Y, w(s, 3) + ' second' + pl(s)]);
  seg.push([Y, ' TankWars V2.07\n\r']);
  if (totalMin <= 5) seg.push([Y, 'Not your game ?']);
  else if (totalMin <= 59) seg.push([Y, "Nice game, isn't it ?"]);
  else if (totalMin <= 119) seg.push([Y, 'It seems to me that you like it.']);
  else seg.push([Y, 'Well, you could have done your homework, washed the dishes, cleaned the windows, \n\rmade your flat looking like the polished chrome of a Harley Davidson \n\r. . . and in between ' + w(Math.floor(totalMin / 3), 3) + ' times have pleased your wife (husband ?) !\n\r\n\rBut boy, you chose the right thing.']);
  seg.push([G, '\n\r\n\rVisit TankWars on WWW  : ']);
  seg.push([W, 'http://www.tu-chemnitz.de/~mali/tankwars/download.htm']);
  seg.push([G, '\n\rOr send me some e-mail : ']);
  seg.push([W, 'marko.lindner@hrz.tu-chemnitz.de']);
  const ops = [];
  for (const [c, t] of seg) for (const ch of t) ops.push([c, ch]);
  return ops;
}
function fwPaint(f, color, ch) {                   // advance the text cursor, drawing printables
  if (ch === '\n') { f.row++; f.col = 0; }
  else if (ch === '\r') { f.col = 0; }
  else {
    vga.outText(FW.x0 + f.col * FW.cw, FW.y0 + f.row * FW.lh, ch, 1, color);
    if (++f.col >= FW.cols) { f.col = 0; f.row++; }
    return true;                                   // printable → caller clicks
  }
  return false;
}
function beginFarewell() {
  vga.setPalette(TEXT_PALETTE.map(c => c.slice()));
  vga.clear(0);
  if (pointerLocked) { try { document.exitPointerLock(); } catch (e) {} }
  farewell = { ops: buildFarewellOps(), i: 0, acc: 0, col: 0, row: 0, skip: false, endAcc: 0, caret: null };
  state = S.FAREWELL;
  vga.present();
}
function stepFarewell(dt) {
  const f = farewell; if (!f || f.done) return;        // once finished, the screen stays (until reload)
  if (f.caret) { vga.bar(f.caret.x, f.caret.y, f.caret.x + 7, f.caret.y + 13, 0); f.caret = null; }
  f.acc += dt;
  while (f.i < f.ops.length) {
    const [color, ch] = f.ops[f.i];
    const cost = (ch === '\n' || ch === '\r') ? 10 : (f.skip ? 5 : 61);   // per-char typewriter timing
    if (f.acc < cost) break;
    f.acc -= cost; f.i++;
    if (fwPaint(f, color, ch)) spk.play(SND.introClick, game.options.soundFX);  // 200 Hz click
  }
  if (f.i < f.ops.length) {                        // block caret at the next cell
    const x = FW.x0 + f.col * FW.cw, y = FW.y0 + f.row * FW.lh;
    vga.bar(x, y, x + 7, y + 13, 15); f.caret = { x, y };
  } else {
    f.done = true;                                 // typing finished — the text stays on screen
  }                                                // (browser has no program exit; reload to leave)
  vga.present();
}

// Map a mouse event to 640x480 game coordinates (canvas is integer-scaled).
function canvasToGame(e) {
  const r = canvas.getBoundingClientRect();
  return {
    x: Math.round((e.clientX - r.left) / r.width * 640),
    y: Math.round((e.clientY - r.top) / r.height * 480),

}

// Move the software cursor by the mouse's RELATIVE motion, clamped to the screen. The
// original's MouseGlideTo/MouseToMenuItem repositions the DOS mouse driver's cursor; a
// browser page cannot move the OS pointer, so after such a warp absolute tracking would
// make the cursor JUMP to the (unrelated) real-pointer position on the next move. Tracking
// deltas instead keeps the warp and continues smoothly from it.
function cursorByDelta(e, x0 = 3, y0 = 3, x1 = 636, y1 = 476) {
  const r = canvas.getBoundingClientRect();
  cursor.x = Math.round(Math.max(x0, Math.min(x1, cursor.x + (e.movementX || 0) / r.width * 640)));
  cursor.y = Math.round(Math.max(y0, Math.min(y1, cursor.y + (e.movementY || 0) / r.height * 480)));
  cursor.show = true;
}

// --- Pointer Lock: on the mouse-driven screens we CAPTURE the mouse so its relative motion
// (movementX/Y) is UNBOUNDED — otherwise the real OS pointer can hit a screen edge and the
// in-game cursor freezes. This mirrors the DOS mouse driver, which owned a single captured
// cursor. Esc / Tab / a tab-switch releases the lock; the next click re-captures. The lock
// engages only on the mouse-driven screens, never during flight/animation/dialogs.

document.addEventListener('pointerlockerror', () => {});
function wantsCursor() {

  const p = game.players[game.current];

}

  if (state === S.MENU || state === S.NAMES || state === S.SHOP) {
    kbSelect = false; cursorByDelta(e);

      const i = menuItemAt(cursor.x, cursor.y);

  const p = game.players[game.current];

  const d = e.deltaY < 0 ? 1 : -1;
  p.power = Math.max(0, Math.min(10 * p.crew, p.power + d));

// apply one aiming-panel button action (sub_557a regions; dispatch 0xe1eb..0xe3d8).
// Returns false when the action ends the turn (Fire) — no redraw wanted then.
function panelAction(id, p) {
  const pmax = 10 * p.crew;
  switch (id) {
    case 'angle+': p.angle = wrapAngle(p.angle + 1); spk.play([{ f: SND_LIVE.angleTone(p.angle), d: 150 }], game.options.soundFX); break;
    case 'angle-': p.angle = wrapAngle(p.angle - 1); spk.play([{ f: SND_LIVE.angleTone(p.angle), d: 150 }], game.options.soundFX); break;
    case 'power+': p.power = Math.min(pmax, p.power + 1); spk.play([{ f: SND_LIVE.powerTone(p.power), d: 150 }], game.options.soundFX); break;
    case 'power-': p.power = Math.max(0, p.power - 1); spk.play([{ f: SND_LIVE.powerTone(p.power), d: 150 }], game.options.soundFX); break;
    case 'invert': p.angle = wrapAngle(180 - p.angle); spk.play(SND.turretMirror, game.options.soundFX); break;   // I
    case 'preset': p.angle = p.angle > 90 ? 135 : 45; spk.play(SND.turretFlip, game.options.soundFX); break;      // W
    case 'pmax':   p.power = pmax; spk.play([{ f: SND_LIVE.powerTone(p.power), d: 150 }], game.options.soundFX); break;
    case 'pdef':   p.power = Math.min(pmax, 250); spk.play([{ f: SND_LIVE.powerTone(p.power), d: 150 }], game.options.soundFX); break;
    case 'fire':   cursor.show = false; if (game.fire()) state = S.FLIGHT; return false;   // firing hides the cursor (0xbd17)
  }
  return true;
}
