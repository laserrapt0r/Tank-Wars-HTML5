// ===== palette.js =====
// palette.js — the exact 16-colour VGA palette, reverse-engineered from the
// SetRGBPalette calls in the original (see re/spec_graphics.md §1).
//
// The game stores 6-bit DAC values (0..63) and the VGA hardware expands them to
// 8-bit with  v8 = (v6<<2) | (v6>>4)  (NOT v*255/63) — this matches the DOS output
// bit-for-bit. We keep both the menu palette and the in-game overrides.

// 6-bit master table (index -> [r,g,b], 0..63), from routine 0x1dfb-0x1f32.
const MASTER6 = [
  [0, 0, 0],    // 0  black
  [63, 0, 0],   // 1  red (title, tank red)
  [0, 0, 43],   // 2  dark navy (button text/shadow)
  [63, 63, 0],  // 3  yellow (tank)
  [0, 36, 16],  // 4  dark green (tank)
  [36, 16, 12], // 5  brown (tank)
  [63, 63, 63], // 6  white (tank/text)
  [44, 0, 55],  // 7  purple (tank)
  [63, 28, 0],  // 8  orange (tank)
  [35, 54, 0],  // 9  lime (tank)
  [59, 0, 47],  // 10 magenta/pink (tank)
  [10, 20, 63], // 11 menu background blue -> becomes SKY in game
  [63, 0, 0],   // 12 red (tank / nuke flash highlight)
  [0, 63, 0],   // 13 GROUND green
  [0, 0, 0],    // 14 black -> becomes navy bevel in game
  [48, 48, 48], // 15 UI grey -> becomes white bevel in game
];

function expand6to8(v6) { return ((v6 << 2) | (v6 >> 4)) & 0xff; }
function toRGB8(tbl) { return tbl.map(c => c.map(expand6to8)); }

// Menu / default palette (8-bit RGB).

  if (i === 11) return [16, 51, 63];
  if (i === 15) return [63, 63, 63];

// ===== rtl.js =====
// rtl.js — faithful re-implementations of the Turbo Pascal 7 runtime pieces the
// game relies on. Everything here mirrors the exact behaviour found in the
// original TANK_ENG.EXE units (see docs/PORTIERUNG.md §RTL).

// ---------------------------------------------------------------------------
// Turbo Pascal 7 pseudo-random generator (SYSTEM unit).
//   RandSeed : LongInt (32-bit, stored at DS:0x0CE2 in the original)
//   Random(N) : Word  ->  (RandSeed * 0x08088405 + 1) mod 2^32, take high dword
//                          of (seed * N) ... actually TP does: seed := seed*k+1;
//                          result := (seed_hi16 * N) >> 16 style. We reproduce the
//                          documented TP7 algorithm exactly.
// TP7 Random(word) returns  (Int64(RandSeed_unsigned) * N) shr 32.
// ---------------------------------------------------------------------------
class TPRandom {
  constructor(seed = 0) { this.seed = seed >>> 0; }

  // Randomize: TP uses the DOS clock (INT 21/2C: CX=hh mm? , DX=ss hundredths).
  // We seed from performance/clock; exact value is irrelevant to fairness.
  randomize(seedOverride) {
    if (seedOverride !== undefined) { this.seed = seedOverride >>> 0; return; }
    // mimic: RandSeed := (hour*... ) — but any entropy is fine for play.
    const d = new Date();
    this.seed = (((d.getSeconds() * 100 + d.getMilliseconds() / 10) | 0)
                 ^ (d.getMinutes() << 16) ^ (d.getHours() << 24)) >>> 0;
  }

  // advance LCG: seed := seed * 134775813 + 1  (mod 2^32)
  _next() {
    // 32-bit multiply without precision loss
    const lo = this.seed & 0xffff, hi = this.seed >>> 16;
    const k = 0x8088405;
    const klo = k & 0xffff, khi = k >>> 16;
    let low = lo * klo;
    let mid = (lo * khi + hi * klo) & 0xffffffff;
    let res = (low + ((mid & 0xffff) << 16)) >>> 0;
    res = (res + 1) >>> 0;
    this.seed = res;
    return res;
  }

  // Random(N): word in [0, N)
  next(N) {
    const s = this._next();
    // (s * N) >> 32  — use float-safe 64-bit
    return Math.floor((s * N) / 0x100000000);
  }

  // Random real in [0,1)
  nextFloat() {
    const s = this._next();
    return s / 0x100000000;
  }
}

// ===== pcspeaker.js =====
// pcspeaker.js — faithful PC-speaker emulation via WebAudio.
//
// The original drives the 8253 timer channel 2 through the CRT unit:
//   Sound(Hz)  -> square wave at Hz on the speaker
//   NoSound    -> silence
//   Delay(ms)  -> busy wait
// The speaker is a 1-bit square wave, reproduced with a 'square' OscillatorNode.
// Sound effects are note lists [{f:Hz, d:ms}, ...] scheduled on the audio clock.
//
// Robustness: every WebAudio call is wrapped so that an audio error can never
// break the game loop, the context is auto-resumed if it got suspended, and stale
// scheduled gain events are cleared before each new sound (prevents "stuck silent").

class PCSpeaker {
  constructor() {
    this.ctx = null;
    this.osc = null;
    this.gain = null;
    this._seq = 0;            // sequence token to supersede running effects
    this.enabled = true;      // master "SoundFX" gate
  }

  _ensure() {
    if (this.ctx) return true;
    try {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return false;
      this.ctx = new AC();
      this.gain = this.ctx.createGain();
      this.gain.gain.value = 0;
      this.gain.connect(this.ctx.destination);
      this.osc = this.ctx.createOscillator();
      this.osc.type = 'square';
      this.osc.frequency.value = 440;
      this.osc.connect(this.gain);
      this.osc.start();
    } catch (e) { this.ctx = null; return false; }
    return true;
  }

  // Resume the AudioContext if the browser suspended it (autoplay policy / tab switch).
  _resume() { try { if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume(); } catch (e) {} }
  resume() { if (this._ensure()) this._resume(); }

  // Immediate primitives (mirror CRT.Sound / CRT.NoSound).
  soundOn(hz) {
    if (!this.enabled || !this._ensure()) return;
    this._resume();
    try {
      const t = this.ctx.currentTime;
      const g = this.gain.gain;
      g.cancelScheduledValues(t);
      if (hz > 0) {
        this.osc.frequency.cancelScheduledValues(t);
        this.osc.frequency.setValueAtTime(hz, t);
        g.setValueAtTime(0.18, t);
      } else {
        g.setValueAtTime(0, t);
      }
    } catch (e) {}
  }
  soundOff() {
    if (!this.ctx) return;
    try {
      const t = this.ctx.currentTime;
      this.gain.gain.cancelScheduledValues(t);
      this.gain.gain.setValueAtTime(0, t);
    } catch (e) {}
  }

  // Play a note list [{f,d}] on the audio clock. `gate` respects the SoundFX /
  // Flight-SoundFX option. Never throws.
  play(notes, gate = true) {
    if (!gate || !this.enabled || !notes || !notes.length || !this._ensure()) return Promise.resolve();
    this._resume();
    const myTok = ++this._seq;
    let totalMs = 0;
    try {
      const g = this.gain.gain, f = this.osc.frequency;
      let t = this.ctx.currentTime + 0.001;
      g.cancelScheduledValues(t);
      f.cancelScheduledValues(t);
      for (const n of notes) {
        const dur = Math.max(0, n.d) / 1000;
        if (n.f > 0) { f.setValueAtTime(n.f, t); g.setValueAtTime(0.18, t); }
        else g.setValueAtTime(0, t);
        t += dur;
      }
      g.setValueAtTime(0, t); // NoSound at end (scheduled on the AUDIO clock — authoritative)
      totalMs = (t - this.ctx.currentTime) * 1000;
    } catch (e) { return Promise.resolve(); }
    // The effect's END is already scheduled above on the audio clock. The timeout below is
    // only a safety net (and resolves the promise) — it must never cut the audible tail:
    // JS timers and the audio clock drift differently per OS/audio stack (Windows WASAPI
    // vs Linux PulseAudio), and an early soundOff() truncated short sweeps (e.g. the W/I
    // turret tones) to a barely-audible blip on some platforms. +80 ms margin fixes that.
    return new Promise(res => setTimeout(() => {
      if (myTok === this._seq) this.soundOff();
      res();
    }, totalMs + 80));
  }

  // Schedule a gated tone pattern within the current frame: slots = [{f, d}] with
  // d in SECONDS; f=0 -> silence. Mirrors the original's per-pixel Sound(f)/NoSound
  // pulsing (e.g. the earthquake's chopped 500 Hz rattle) at op granularity.
  gate(slots, gateFlag = true) {
    if (!gateFlag || !this.enabled || !slots || !slots.length || !this._ensure()) return;
    this._resume();
    try {
      const g = this.gain.gain, f = this.osc.frequency;
      let t = this.ctx.currentTime;
      g.cancelScheduledValues(t);
      f.cancelScheduledValues(t);
      for (const s of slots) {
        if (s.f > 0) { f.setValueAtTime(s.f, t); g.setValueAtTime(0.18, t); }
        else g.setValueAtTime(0, t);
        t += Math.max(0, s.d);
      }
      g.setValueAtTime(0, t);
    } catch (e) {}
  }

  // Cancel any running effect and silence immediately.
  stop() { this._seq++; this.soundOff(); }
}




// ===== sounds.js =====
// sounds.js — every PC-speaker effect, reproduced note-for-note from the original
// (see re/spec_sound.md; all frequencies in Hz, durations in ms; square wave).
//
// Two categories:
//  * Sequenced effects (fire launch, explosion, results, menu blips) -> note lists
//    played on the audio clock via spk.play().
//  * Live/continuous effects that track physics state (flight whistle, blast circle,
//    angle/power key tones) -> driven directly with spk.soundOn()/soundOff() by the
//    caller, using the frequency formulas below.
//
// Gating: `sfx` = "SoundFX" option (default on); `flightSfx` = "Flight SoundFX"
// (default off, gates ONLY the in-flight whistle). The intro typewriter click is
// ungated in the original.

// Build a descending/ascending glissando note list (mirror of sub_5a48: 1 ms/step).
function sweep(start, end, step) {
  const notes = [];
  const dir = start <= end ? 1 : -1;
  let cur = start;
  if (dir > 0) for (; cur <= end; cur += step) notes.push({ f: cur, d: 1 });
  else         for (; cur >= end; cur -= step) notes.push({ f: cur, d: 1 });
  return notes;
}

const SND = {
  // #1 intro typewriter click — Sound(200) Delay(1) per printable char (ungated).
  introClick: [{ f: 200, d: 1 }],

  // Launch of the shell (sub_5a48(1000,400,8)).
  launch: () => sweep(1000, 400, 8),

  // Impact pre-blast (sub_5a48(400,100,1)).
  impact: () => sweep(400, 100, 1),

  // End-of-explosion boom (sub_5a48(900,200,2)).
  boom: () => sweep(900, 200, 2),

  // Round-start per-tank placement sequence — DECOMPILED 1:1 from sub_7060 ([bp+6]==0):
  // the drop chirp sub_5a48(400,700,10) @0x714d, then (armed) a rising Sound(100+5·i),
  // i=1..angle, one note per vsync while the barrel rotates up (@0x71e6); an UNARMED tank
  // instead gets the sub_5a48(800,1500,10) fanfare (@0x7255).
  roundPlace: (armed, angle) => {
    const n = sweep(400, 700, 10);
    if (armed) { for (let i = 1; i <= (angle | 0); i++) n.push({ f: 100 + 5 * i, d: 16 }); }
    else n.push(...sweep(800, 1500, 10));
    return n;
  },

  // Full crater impact sequence (as the original plays it, in order): impact pre-blast
  // 400→100, then the blast circle rising Sound(200+2r) as it grows. Ring pacing (0xc13a):
  // 1 WaitVerticalRetrace (≈16 ms) per ring, but ONLY while the total radius is < 50 —
  // bigger blasts run their rings unpaced. NO boom — the crater never booms in the
  // original (only the tank-death flash does, sub_6895).
  craterSeq: (B) => {
    const n = sweep(400, 100, 1);
    const d = B < 50 ? 16 : 1;
    for (let r = 1; r <= B; r += 2) n.push({ f: 200 + 2 * r, d });
    return n;
  },

  // Shot flew off the arena — Sound(200) held for sub_0aa1(30) = 30 centiseconds (0xcb82).
  miss: [{ f: 200, d: 300 }],

  // Tank explosion flash tune (sub_6895) — delays are sub_0a3a units, 1 unit ≈ 5 ms by
  // design (37·[0x175c]−550 empty loops): up 300..600 with i units per step, hold at
  // WHITE for 100 units (silent), down 600..300 staccato (i/2 tone + i/2 silence),
  // then the 900→200 boom sweep.
  explosion: () => {
    const n = [];
    for (let i = 0; i <= 15; i++) n.push({ f: 300 + 20 * i, d: Math.max(1, 5 * i) });
    n.push({ f: 0, d: 500 });                            // white hold, sub_0a3a(100.0)
    for (let i = 15; i >= 0; i--) {
      n.push({ f: 300 + 20 * i, d: Math.max(1, Math.round(2.5 * i)) });
      n.push({ f: 0, d: Math.max(1, Math.round(2.5 * i)) });
    }
    return n.concat(sweep(900, 200, 2));
  },

  // (No end-of-round score tally exists in the original — the 100+5·i / 400→700 / 800→1500
  // tones are all ROUND-START sounds, see roundPlace above.)

  // Menu / shop blips.
  menuMove:   [{ f: 400, d: 20 }],           // main menu cursor move (#17)
  optMove:    [{ f: 400, d: 8 }],            // options list cursor (#16)
  weaponCycle:[{ f: 300, d: 12 }],           // next/prev weapon (#25/#26/#27)
  shopEnter:  [{ f: 400, d: 20 }],           // enter buy window (#18)
  buyConfirm: () => [{ f: 500, d: 50 }].concat(sweep(500, 400, 2)), // (#19) sub_9a18: 500,Delay,500→400 DESC

  // Options value blips (#12-#15) — encode the value in the pitch.
  optErrorRate: (rate)    => [{ f: 200 + 5 * Math.round(rate), d: 12 }],
  optMoney:     (money)   => [{ f: 200 + Math.floor(money / 100), d: 12 }],
  optGames:     (games)   => [{ f: 300 + 10 * games, d: 12 }],
  optPlayers:   (players) => [{ f: 300 + 20 * players, d: 12 }],

  // Aim tones on W/I keys (set angle 45/135 resp. mirror 180−a).
  turretFlip:   () => sweep(600, 300, 5),    // key W (0xe0a5): 600→300 DESC
  turretMirror: () => sweep(300, 600, 10),   // key I (0xe150): 300→600 ASC
};

// Live frequency formulas (called each physics tick / key repeat).
const SND_LIVE = {
  // In-flight whistle (0xb883-0xb8d0): f = 400 + Round(vy/4), NoSound (return 0) when
  // vy ≤ −1200. vy is the shell's Y-VELOCITY (px/step, tiny) — NOT its height; the
  // original whistle is therefore a near-constant 400 Hz with a very slow drift.
  flightWhistle: (vy) => (vy <= -1200 ? 0 : 400 + Math.round(vy / 4)),
  // Blast circle expanding: f = 200 + 2*radius.
  blast: (r) => 200 + 2 * r,
  // Angle key-repeat tone: f = 500 - |90 - angle|.
  angleTone: (angle) => 500 - Math.abs(90 - angle),
  // Power key-repeat tone: f = power + 100.
  powerTone: (power) => power + 100,
  // Terrain landslide 500 Hz per falling dirt pixel (sub_625d). NOTE: the tank FALL
  // (sub_6d3c) has NO sound in the original — the nearby 700 Hz tone is the Caveman
  // drill (sub_3bb7), not the fall — so there is deliberately no tank-fall tone here.
  landslide: 500,
};




// ===== vga.js =====
// vga.js — a 640x480, 16-colour indexed framebuffer that reproduces the Borland
// BGI (EGAVGA driver) drawing model the original game used. All game rendering
// goes through these primitives so the output is pixel-faithful to the DOS build.
//
//   - putPixel / getPixel : direct VRAM access (BGI PutPixel/GetPixel)
//   - line                : Bresenham (BGI Line, solid, thickness 1)
//   - bar / fillRect       : filled rectangle (BGI Bar with SolidFill)
//   - circle / fillCircle  : BGI Circle (integer midpoint) / filled disc
//   - floodFill            : BGI FloodFill (scanline, 4-connected, border mode)
//   - outText              : BGI OutTextXY with the 8x8 bitmap font, integer scale
//
// The indexed buffer is blitted to a canvas via the active 6-bit VGA palette.

class VGA {
  constructor(canvas, palette /* Uint8 array [16][3] 8-bit RGB */) {
    this.W = 640; this.H = 480;
    this.buf = new Uint8Array(this.W * this.H);   // colour index per pixel
    this.palette = palette;                       // [16] of [r,g,b] 0..255
    this.color = 15;                              // current draw colour (SetColor)
    this.font = null;                             // set via setFont()
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d', { alpha: false });
    this.img = this.ctx.createImageData(this.W, this.H);
    this.rgb = new Uint8Array(16 * 3);
    this._syncPalette();
  }

  setPalette(pal) { this.palette = pal; this._syncPalette(); }
  _syncPalette() {
    for (let i = 0; i < 16; i++) {
      this.rgb[i*3]   = this.palette[i][0];
      this.rgb[i*3+1] = this.palette[i][1];
      this.rgb[i*3+2] = this.palette[i][2];
    }
  }
  setColor(c) { this.color = c & 15; }
  setFont(font) { this.font = font; }

  clear(c) { this.buf.fill(c & 15); }

  putPixel(x, y, c) {
    x |= 0; y |= 0;
    if (x < 0 || x >= this.W || y < 0 || y >= this.H) return;
    this.buf[y * this.W + x] = (c === undefined ? this.color : c) & 15;
  }
  getPixel(x, y) {
    x |= 0; y |= 0;
    if (x < 0 || x >= this.W || y < 0 || y >= this.H) return 0;
    return this.buf[y * this.W + x];
  }

  // Bresenham line (BGI-compatible endpoints, both inclusive).
  line(x0, y0, x1, y1, c) {
    c = (c === undefined ? this.color : c) & 15;
    x0|=0; y0|=0; x1|=0; y1|=0;
    let dx = Math.abs(x1 - x0), dy = -Math.abs(y1 - y0);
    let sx = x0 < x1 ? 1 : -1, sy = y0 < y1 ? 1 : -1;
    let err = dx + dy;
    for (;;) {
      this.putPixel(x0, y0, c);
      if (x0 === x1 && y0 === y1) break;
      const e2 = 2 * err;
      if (e2 >= dy) { err += dy; x0 += sx; }
      if (e2 <= dx) { err += dx; y0 += sy; }
    }
  }

  // Filled rectangle (BGI Bar: x1..x2, y1..y2 inclusive, current fill colour).
  bar(x1, y1, x2, y2, c) {
    c = (c === undefined ? this.color : c) & 15;
    if (x1 > x2) [x1, x2] = [x2, x1];
    if (y1 > y2) [y1, y2] = [y2, y1];
    x1 = Math.max(0, x1|0); y1 = Math.max(0, y1|0);
    x2 = Math.min(this.W - 1, x2|0); y2 = Math.min(this.H - 1, y2|0);
    for (let y = y1; y <= y2; y++) {
      const row = y * this.W;
      this.buf.fill(c, row + x1, row + x2 + 1);
    }
  }

  // BGI Circle (midpoint, outline only, thickness 1).
  circle(cx, cy, r, c) {
    c = (c === undefined ? this.color : c) & 15;
    cx|=0; cy|=0; r|=0;
    let x = 0, y = r, d = 3 - 2 * r;
    const plot8 = (x, y) => {
      this.putPixel(cx+x, cy+y, c); this.putPixel(cx-x, cy+y, c);
      this.putPixel(cx+x, cy-y, c); this.putPixel(cx-x, cy-y, c);
      this.putPixel(cx+y, cy+x, c); this.putPixel(cx-y, cy+x, c);
      this.putPixel(cx+y, cy-x, c); this.putPixel(cx-y, cy-x, c);
    };
    while (y >= x) {
      plot8(x, y);
      x++;
      if (d > 0) { y--; d += 4 * (x - y) + 10; } else { d += 4 * x + 6; }
    }
  }

  // Filled disc (used for craters / explosions).
  fillCircle(cx, cy, r, c) {
    c = (c === undefined ? this.color : c) & 15;
    cx|=0; cy|=0; r|=0;
    for (let dy = -r; dy <= r; dy++) {
      const dx = Math.floor(Math.sqrt(r*r - dy*dy) + 1e-9);
      const y = cy + dy;
      if (y < 0 || y >= this.H) continue;
      let a = cx - dx, b = cx + dx;
      a = Math.max(0, a); b = Math.min(this.W - 1, b);
      if (a <= b) this.buf.fill(c, y*this.W + a, y*this.W + b + 1);
    }
  }

  // BGI FloodFill: 4-connected scanline flood that stops at `border` colour.
  floodFill(x, y, fill, border) {
    x|=0; y|=0; fill&=15; border&=15;
    if (x < 0 || x >= this.W || y < 0 || y >= this.H) return;
    const start = this.buf[y*this.W + x];
    if (start === border || start === fill) return;
    const stack = [[x, y]];
    while (stack.length) {
      let [px, py] = stack.pop();
      let row = py * this.W;
      let xl = px;
      while (xl >= 0 && this.buf[row+xl] !== border && this.buf[row+xl] === start) xl--;
      xl++;
      let xr = px;
      while (xr < this.W && this.buf[row+xr] !== border && this.buf[row+xr] === start) xr++;
      xr--;
      for (let i = xl; i <= xr; i++) this.buf[row+i] = fill;
      for (const ny of [py-1, py+1]) {
        if (ny < 0 || ny >= this.H) continue;
        const nrow = ny * this.W;
        let i = xl;
        while (i <= xr) {
          if (this.buf[nrow+i] === start && this.buf[nrow+i] !== border) {
            stack.push([i, ny]);
            while (i <= xr && this.buf[nrow+i] === start) i++;
          } else i++;
        }
      }
    }
  }

  // Text: 8x8 bitmap font, integer scale (BGI SetTextStyle(DefaultFont,_,size)).
  outText(x, y, str, scale, c) {
    if (!this.font) return;
    c = (c === undefined ? this.color : c) & 15;
    scale = scale || 1;
    let cx = x|0;
    for (const ch of str) {
      const g = this.font[ch.charCodeAt(0)] || this.font[0];
      if (g) {
        for (let ry = 0; ry < 8; ry++) {
          const bits = g[ry];
          for (let rx = 0; rx < 8; rx++) {
            if (bits & (0x80 >> rx)) {
              if (scale === 1) this.putPixel(cx+rx, y+ry, c);
              else this.bar(cx+rx*scale, y+ry*scale, cx+rx*scale+scale-1, y+ry*scale+scale-1, c);
            }
          }
        }
      }
      cx += 8 * scale;
    }
  }

  // Blit indexed buffer through palette to the canvas.
  present() {
    const buf = this.buf, rgb = this.rgb, data = this.img.data;
    const n = this.W * this.H;
    for (let i = 0, j = 0; i < n; i++, j += 4) {
      const ci = buf[i] * 3;
      data[j]   = rgb[ci];
      data[j+1] = rgb[ci+1];
      data[j+2] = rgb[ci+2];
      data[j+3] = 255;
    }
    this.ctx.putImageData(this.img, 0, 0);
  }
}




// ===== terrain.js =====
// terrain.js — landscape generation and destruction, faithful to sub_5e3f / sub_625d
// (see re/spec_graphics.md §3 and spec_physics.md §4).
//
// The original builds a segmented random-walk ("turtle") curve into a per-column
// height array (DS:0x119a, columns 4..635), draws vertical walls at x=4 and x=635,
// then solid-flood-fills ground-green below the surface. Because |theta| <= 1.2 rad
// (< pi/2), cos(theta) > 0 always, so the surface is single-valued in x.
//
// Trig note: in the original 0x144f = Cos, 0x1462 = Sin (see spec_physics §0). The
// segment step is  x += cos(theta)*amp ,  y += sin(theta)*amp .



const FIELD = { X0: 4, X1: 635, YTOP: 63, YBOT: 475, YCLAMP_TOP: 88, YCLAMP_BOT: 470 };

// Generate terrain into the VGA buffer. Returns the heightmap (surface y per column).
function generateTerrain(vga, rnd) {
  // sky already implied; explicitly clear play area to sky, keep status bar untouched.
  vga.bar(0, FIELD.YTOP, vga.W - 1, vga.H - 1, COL.SKY);

  const height = new Int16Array(vga.W).fill(FIELD.YBOT);

  const stepRange = rnd.next(40) + 10;          // [10,49]
  const R1 = rnd.nextFloat() + 0.3;             // [0.3,1.3)
  let x = 4;
  let y = 445 - rnd.next(206);                  // [240,445]
  let theta = rnd.nextFloat() * (Math.PI / 2) - Math.PI / 4; // [-pi/4, pi/4)
  let amp = rnd.next(stepRange) + 5;            // [5, stepRange+4]

  // baseline + left wall (green), like the original draws before the walk.
  height[4] = y;

  const plotColumn = (col, ys) => {
    if (col < 0 || col >= vga.W) return;
    ys = Math.max(FIELD.YCLAMP_TOP, Math.min(FIELD.YCLAMP_BOT, ys)) | 0;
    height[col] = ys;
  };

  const limitX = 635 - stepRange - 5;
  let guard = 0;
  while (x < limitX && guard++ < 5000) {
    let nx = x + Math.round(Math.cos(theta) * amp);
    let ny = y + Math.round(Math.sin(theta) * amp);
    if (nx <= x) nx = x + 1;                     // guarantee forward progress
    if (ny < FIELD.YCLAMP_TOP) { ny = FIELD.YCLAMP_TOP; theta = 0; }
    else if (ny > FIELD.YCLAMP_BOT) { ny = FIELD.YCLAMP_BOT; theta = 0; }

    const dxs = nx - x;
    for (let col = x; col <= nx; col++) {
      const ys = y + Math.round((col - x) * (ny - y) / dxs);
      plotColumn(col, ys);
    }
    x = nx; y = ny;
    amp = rnd.next(stepRange) + 5;
    theta += rnd.nextFloat() * R1 - R1 / 2;
    if (theta > 1.2) theta = 1.0;
    else if (theta < -1.2) theta = -1.0;
  }
  // final closing segment to x=635 — sub_5e3f does ONE more turtle step (a fresh sloped
  // endpoint from the current heading), NOT a flat run: newY = y + round(sin·amp), clamped.
  {
    const nx = 635;
    const ny = Math.max(FIELD.YCLAMP_TOP, Math.min(FIELD.YCLAMP_BOT, y + Math.round(Math.sin(theta) * amp)));
    const dxs = Math.max(1, nx - x);
    for (let col = x; col <= nx; col++) {
      const ys = y + Math.round((col - x) * (ny - y) / dxs);
      plotColumn(col, ys);
    }
    y = ny;
  }
  // ensure columns 0..3 and 636..639 match the walls (edge columns solid to bottom)
  for (let col = 0; col < 4; col++) height[col] = height[4];
  for (let col = 636; col < vga.W; col++) height[col] = height[635];

  // paint ground: fill each column from its surface y down to the bottom.
  for (let col = 0; col < vga.W; col++) {
    const ys = height[col];
    for (let yy = ys; yy <= FIELD.YBOT; yy++) vga.buf[yy * vga.W + col] = COL.GROUND;
  }
  return height;
}

// Surface y at column x from the live pixel buffer (first ground pixel top-down).
function surfaceYAt(vga, x) {
  x |= 0;
  if (x < 0 || x >= vga.W) return FIELD.YBOT;
  for (let y = FIELD.YTOP; y <= FIELD.YBOT; y++) {
    if (vga.buf[y * vga.W + x] === COL.GROUND) return y;
  }
  return FIELD.YBOT + 1; // no ground in this column (hole)
}

// Remove ground in a filled circle (crater), setting it to sky. Used by explosions.
function makeCrater(vga, cx, cy, r) {
  cx|=0; cy|=0; r|=0;
  for (let dy = -r; dy <= r; dy++) {
    const y = cy + dy;
    if (y < FIELD.YTOP || y > FIELD.YBOT) continue;
    const dx = Math.floor(Math.sqrt(r*r - dy*dy) + 1e-9);
    for (let x = cx - dx; x <= cx + dx; x++) {
      if (x < FIELD.X0 || x > FIELD.X1) continue;
      const idx = y * vga.W + x;
      if (vga.buf[idx] === COL.GROUND) vga.buf[idx] = COL.SKY;
    }
  }
}




// ===== tank.js =====
// tank.js — tank hull + barrel drawing, faithful to sub_64cc (hull) and sub_44a6
// (barrel) in the original (re/spec_graphics.md §4).
//
// Hull: 5 stacked horizontal Lines about the bottom-centre reference (cx,cy):
//   cy-4: cx-7..cx+7 (15)   cy-3: cx-8..cx+8 (17)   cy-2: cx-9..cx+9 (19)
//   cy-1: cx-8..cx+8 (17)   cy:   cx-7..cx+7 (15)
// -> 19x5 rounded body. Colour = the tank's palette index; brightness scales with
// crew: SetRGBPalette(color, R6*men/100, G6*men/100, B6*men/100).
//
// Barrel: 10-px Line from pivot (cx, cy-5) toward the aim angle. In the original
// 0x144f=Cos, 0x1462=Sin, so the tip is (cx + round(cos*10), (cy-5) - round(sin*10)).
// Angle is 0..180 degrees (0 = right, 90 = up, 180 = left).



// Full tank = a raised TURRET (3 rows, widths 7/9/9) on top of the HULL (5 rows,
// 15/17/19/17/15). Measured pixel-exact from the original (game_landed.png). Reference
// point (cx,cy) is the bottom-centre; rows run cy-7 (turret top) .. cy (hull bottom).
const HULL_ROWS = [
  { dy: -7, hw: 3 },   // turret top   (width 7)
  { dy: -6, hw: 4 },   // turret       (width 9)
  { dy: -5, hw: 4 },   // turret base  (width 9)
  { dy: -4, hw: 7 },   // hull         (width 15)
  { dy: -3, hw: 8 },   //              (width 17)
  { dy: -2, hw: 9 },   //              (width 19)
  { dy: -1, hw: 8 },   //              (width 17)
  { dy:  0, hw: 7 },   // hull bottom  (width 15)
];
const BARREL_DRAW_LEN = 10;   // drawn barrel (sub_44a6)
const MUZZLE_LEN = 15;        // shot spawn distance (sub_bd08)

// Apply the per-tank health dimming to the tank's palette entry.
function applyTankBrightness(vga, colorIndex, crew) {
  const base = GAME6[colorIndex];
  const f = Math.max(0, Math.min(100, crew)) / 100;
  const r = expand6to8(Math.round(base[0] * f));
  const g = expand6to8(Math.round(base[1] * f));
  const b = expand6to8(Math.round(base[2] * f));
  vga.palette[colorIndex] = [r, g, b];
  vga._syncPalette();
}

// true if the tank owns no offensive weapon 1..10 (sub_0225) — it then flies a flag.
function tankUnarmed(tank) {
  const inv = tank.inventory;
  if (!inv) return false;
  for (let w = 1; w <= 10; w++) if ((inv[w] || 0) > 0) return false;
  return true;
}

// Decorations from sub_44a6: white surrender flag when unarmed (leaning by wind), a dotted
// shield bubble (radius 12 about (cx,cy-5)) when shielded, and a quake-protection dot band.
function drawSurrenderFlag(vga, cx, cy, c, wind) {
  const L = wind < 0 ? -1 : wind > 0 ? 1 : 0.2;      // sub_444c
  vga.line(cx, cy - 8, cx, cy - 13, c);              // pole (tank colour)
  const nx = Math.round(cx + L), fx = Math.round(cx + 6 * L);
  vga.line(nx, cy - 13, fx, cy - 12, 15);            // 3-px pennant (white)
  vga.line(nx, cy - 12, fx, cy - 11, 15);
  vga.line(nx, cy - 11, fx, cy - 10, 15);
}
function drawShieldBubble(vga, cx, cy, c) {
  const oy = cy - 5;                                 // ring of ~32 dots, radius 12
  for (let k = 0; k < 32; k++) {
    const a = k * Math.PI / 16;
    vga.putPixel(Math.round(cx + 12 * Math.cos(a)), Math.round(oy + 12 * Math.sin(a)), c);
  }
}
function drawQuakeDots(vga, cx, cy, c) {
  const pts = [[-6,2],[-5,3],[-4,3],[-3,2],[-2,2],[-1,3],[0,3],[6,2],[5,3],[4,3],[3,2],[2,2],[1,3]];
  for (const [dx, dy] of pts) vga.putPixel(cx + dx, cy + dy, c);
}

function drawTank(vga, tank, wind) {
  const cx = tank.x | 0, cy = tank.y | 0;
  applyTankBrightness(vga, tank.colorIndex, tank.crew);
  const c = tank.colorIndex;
  for (const row of HULL_ROWS) {
    vga.line(cx - row.hw, cy + row.dy, cx + row.hw, cy + row.dy, c);
  }
  const unarmed = tankUnarmed(tank);
  drawBarrel(vga, tank, unarmed ? 0 : c);            // sub_44a6: barrel BLACK when unarmed
  if (unarmed) drawSurrenderFlag(vga, cx, cy, c, wind || 0);
  const inv = tank.inventory || {};
  if ((inv[13] || 0) > 0) drawShieldBubble(vga, cx, cy, c);   // Protection Shield (inv[13])
  if ((inv[12] || 0) > 0) drawQuakeDots(vga, cx, cy, c);       // Quake Protection (inv[12])
}

// Draw the tank shape in its colour index WITHOUT touching the palette — used by the
// death-flash animation, which drives palette[colorIndex] itself (sub_6895).
function drawDeadTank(vga, tank) {
  const cx = tank.x | 0, cy = tank.y | 0, c = tank.colorIndex;
  for (const row of HULL_ROWS) vga.line(cx - row.hw, cy + row.dy, cx + row.hw, cy + row.dy, c);
  drawBarrel(vga, tank, c);
}

// Is pixel (x,y) inside this tank's drawn hull? Used by the fall support tests, which in
// the original read the composited screen (any non-sky pixel supports — sub_6cbd et al.),
// so a tank can come to rest on top of another tank.
function tankOccupies(tank, x, y) {
  const dy = (y | 0) - (tank.y | 0);
  if (dy < -7 || dy > 0) return false;
  return Math.abs((x | 0) - (tank.x | 0)) <= HULL_ROWS[dy + 7].hw;
}

function eraseTank(vga, tank) {
  const cx = tank.x | 0, cy = tank.y | 0;
  for (const row of HULL_ROWS) {
    vga.line(cx - row.hw, cy + row.dy, cx + row.hw, cy + row.dy, COL.SKY);
  }
  // erase barrel span too
  const { tx, ty } = barrelTip(tank);
  vga.line(cx, cy - 5, tx, ty, COL.SKY);
}

function barrelTip(tank) {
  const rad = tank.angle * Math.PI / 180;
  const tx = tank.x + Math.round(Math.cos(rad) * BARREL_DRAW_LEN);
  const ty = (tank.y - 5) - Math.round(Math.sin(rad) * BARREL_DRAW_LEN);
  return { tx, ty };
}

function drawBarrel(vga, tank, c) {
  const { tx, ty } = barrelTip(tank);
  vga.line(tank.x, tank.y - 5, tx, ty, c);
}

// Muzzle spawn point (barrel length 15) — where the shell is born.
function muzzle(tank) {
  const rad = tank.angle * Math.PI / 180;
  return {
    x: tank.x + Math.round(Math.cos(rad) * MUZZLE_LEN),
    y: (tank.y - 5) - Math.round(Math.sin(rad) * MUZZLE_LEN),
  };
}

// Parachute above the tank during the round-start descent — DECOMPILED from sub_4291:
// 7 solid canopy rows at cy-16..cy-22 (widths 15/15/15/13/13/11/7) with 3 suspension lines
// converging at (cx, cy-9) and fanning to (cx±5, cy-15) / (cx, cy-15).
function drawParachute(vga, cx, cy, color) {
  cx |= 0; cy |= 0;
  const hw = [7, 7, 7, 6, 6, 5, 3];                 // half-widths, bottom (cy-16) → top (cy-22)
  for (let i = 0; i < 7; i++) vga.line(cx - hw[i], cy - 16 - i, cx + hw[i], cy - 16 - i, color);
  vga.line(cx - 5, cy - 15, cx, cy - 9, color);      // suspension lines → (cx, cy-9)
  vga.line(cx,     cy - 15, cx, cy - 9, color);
  vga.line(cx + 5, cy - 15, cx, cy - 9, color);
}




// ===== weapons.js =====
// weapons.js — weapon table and impact effects, faithful to the fire routine
// sub_bd08 and its category dispatch (re/spec_rules.md §1, §2, §3).
//
// WEAPON_TABLE: index 1..13 (0 unused to keep 1-based like the original).
//   name, cat(egory), price($ per lot), lot(size), B(radius/param).
// Category: 0 crater bomb · 1 earthquake · 2 ping-pong · 3 CR-Inducer ·
//           4 Julia · 5 Captain Caveman · 6 protection item.




const WEAPON_TABLE = [
  null,
  { name: 'HandGrenade',              cat: 0, price: 1000,  lot: 100, B: 4   },
  { name: '5 kT Nuke',               cat: 0, price: 2000,  lot: 10,  B: 30  },
  { name: '5 MT Nuke',               cat: 0, price: 10000, lot: 1,   B: 100 },
  { name: 'Earthquake',              cat: 1, price: 5000,  lot: 1,   B: 30  },
  { name: 'Ping Pong Jack',          cat: 2, price: 5000,  lot: 5,   B: 10  },
  { name: 'ChainReactionInducer 256',cat: 3, price: 5000,  lot: 1,   B: 4   },
  { name: 'ChainReactionInducer 512',cat: 3, price: 10000, lot: 1,   B: 8   },
  { name: 'Julia 256',               cat: 4, price: 5000,  lot: 1,   B: 4   },
  { name: 'Julia 512',               cat: 4, price: 10000, lot: 1,   B: 8   },
  { name: 'Captain Caveman',         cat: 5, price: 20000, lot: 1,   B: 5   },
  { name: 'Parachute',               cat: 6, price: 10000, lot: 1,   B: 0   },
  { name: 'Quake Protection',        cat: 6, price: 10000, lot: 1,   B: 0   },
  { name: 'Protection Shield',       cat: 6, price: 20000, lot: 1,   B: 0   },
];
const WPN = { HANDGRENADE:1, NUKE5KT:2, NUKE5MT:3, EARTHQUAKE:4, PINGPONG:5,
  CR256:6, CR512:7, JULIA256:8, JULIA512:9, CAVEMAN:10,
  PARACHUTE:11, QUAKEPROT:12, SHIELD:13 };

// ---- direct-blast crew damage (common loop 0xc8ca), returns men killed (enemies) ----
// impact = {x,y}; shooter = index of firing player; players = live array.
function applyBlastDamage(players, shooterIdx, impact, B) {
  let menKilled = 0;
  for (let i = 0; i < players.length; i++) {
    const t = players[i];
    if (!t.alive) continue;
    const dx = t.x - impact.x;
    const dy = (t.y - impact.y) - 4.0;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const D = Math.max(1, Math.round(dist - 3.0));
    if (B > D) {
      let dmg = t.hasShield ? Math.floor(B / D) : Math.floor((80 * B) / D);
      dmg = Math.min(dmg, t.crew);
      t.crew -= dmg;
      t.power = Math.min(t.power, 10 * t.crew);
      if (i !== shooterIdx) menKilled += dmg;
      if (t.crew <= 0) { t.crew = 0; }
    }
  }
  return menKilled;
}

// Every offensive effect returns { menKilled, anim } where `anim` drives a progressive,
// sound-tracked reveal in the game loop (game.stepAnim), matching the original's animated
// weapons. Terrain is carved during the animation, not instantly. `anim` kinds:
//   {kind:'crater', x,y,B}        — grow a red disc r=0..B (Sound 200+2r) then lay the crater
//   {kind:'ops', ops:[{px:[idx],f:Hz}]} — reveal batches of pixel-ops, playing each op's tone

// collect the GROUND pixels to erase for a "removal op", plus its sound freq and its
// processing weight (`cost` ≈ pixels the original touched for this op — replayed at
// EFFECT_SAMPLES_PER_SEC in game.stepAnim so the pace matches the CPU-bound original)
function op(vga, pixels, f, cost) { return { px: pixels, f, cost: cost || (pixels.length + 1) }; }

// ---- category 0: crater bomb (grenade / nukes) — animated red flash then crater ----
function effectCrater(vga, players, shooterIdx, impact, B) {
  const menKilled = applyBlastDamage(players, shooterIdx, impact, B);
  const box = { minX: Math.max(4, impact.x - B), maxX: Math.min(635, impact.x + B),
                maxY: Math.min(475, impact.y + B) };
  return { menKilled, anim: { kind: 'crater', x: impact.x, y: impact.y, B }, box };
}

// ---- category 1: earthquake — DECOMPILED 1:1 from sub_3511 (driver), sub_2f9a
// (recursive fissure walker) and sub_2c0d (strip-line eraser):
//   driver:  count = 20·power;  dir normalised to length 0.7 (with the original's
//            quirk of re-using the already-normalised vx for vy's norm);
//            start = impact − (0.005·count·vx/2, −0.005·count·vy/2).
//   walker:  angle = arctan(vy/vx) (+π if vx<0); per step: (dx,dy)=0.7·(cos,sin);
//            pos += (dx,dy); angle += rand·0.08 − 0.04; draw TWO strip lines from the
//            path to its perpendicular offset 0.005·count·(dy,−dx)  → a WEDGE that is
//            0.0035·count px wide at the epicentre and tapers to 0 at the tip.
//            With p=1/20 per step: n = Random(round(0.2·count)); n odd → branch at
//            −45° from the strip edge at (count−n); n even → branch at +45° (literal
//            offset arithmetic below) and the parent shifts by 0.005·n·(dy,−dx).
//            Parent loses the branch length: count −= n. Always: count−−.
//   eraser:  skip line if NEITHER endpoint is on GROUND; sample round(0.0035·count)+1
//            points; each GROUND pixel → colour 0 (shows sky) with a Sound(500)/NoSound
//            PULSE (the rattling rumble); count>1000 → also (x+1,y),(x+1,y+1),(x,y+1).
// The reveal is queued as ops (one per strip line) with `cost` = sample count, so the
// animation replays at the original's CPU-bound pace (see EFFECT_SAMPLES_PER_SEC).
function effectEarthquake(vga, players, shooterIdx, impact, power, vel, rnd) {
  const W = vga.W, ops = [];
  const box = { minX: 635, maxX: 4, maxY: 63 };            // driver's bbox init
  let count = 20 * power;                                   // count = 20·power (0xc261)
  let vx = (vel && vel.x) || (impact.dx || 1);
  let vy = (vel && vel.y) || 0.5;
  const spd1 = Math.sqrt(vx * vx + vy * vy) || 1;
  vx = 0.7 * vx / spd1;
  const spd2 = Math.sqrt(vy * vy + vx * vx) || 1;           // original quirk: uses new vx
  vy = 0.7 * vy / spd2;
  let X0 = impact.x - count * 0.005 * vx / 2;
  let Y0 = impact.y + count * 0.005 * vy / 2;

  const isGround = (x, y) => {
    x = Math.round(x); y = Math.round(y);
    if (x < FIELD.X0 || x > FIELD.X1 || y < FIELD.YTOP || y > FIELD.YBOT) return false;
    return vga.buf[y * W + x] === COL.GROUND;
  };
  // sub_2c0d: strip line from (x1,y1) to (x2,y2), interpolated with n+1 samples
  function stripLine(x1, y1, x2, y2, cur) {
    if (!isGround(x1, y1) && !isGround(x2, y2)) return;     // both endpoints off ground
    for (const [bx, by] of [[x1, y1], [x2, y2]]) {          // bbox tracking (min/max)
      const rx = Math.round(bx), ry = Math.round(by);
      if (rx < box.minX) box.minX = rx; if (rx > box.maxX) box.maxX = rx;
      if (ry > box.maxY) box.maxY = ry;
    }
    const n = Math.round(0.0035 * cur) + 1;
    const sx = (x2 - x1) / n, sy = (y2 - y1) / n;
    const px = [];
    for (let i = 0; i <= n; i++) {
      const x = Math.round(x1 + i * sx), y = Math.round(y1 + i * sy);
      if (x < 4 || x > 635 || y < 63 || y > 475) continue;  // sub_2c0d clip window
      const idx = y * W + x;
      if (vga.buf[idx] !== COL.GROUND) continue;
      px.push(idx);
      if (cur > 1000) {                                      // thick 2x2 for big quakes
        if (x + 1 <= 635) px.push(idx + 1);
        if (x + 1 <= 635 && y + 1 <= 475) px.push(idx + W + 1);
        if (y + 1 <= 475) px.push(idx + W);
      }
    }
    ops.push({ px, f: 500, cost: n + 1 });
  }
  // sub_2f9a: recursive fissure walker
  function crack(cnt, cvy, cvx, Y, X) {
    let angle = (cvx === 0) ? Math.PI / 2 : Math.atan(cvy / cvx);
    if (cvx < 0) angle += Math.PI;
    let guard = 0;
    while (cnt > 0 && guard++ < 60000) {
      const dy = Math.sin(angle) * 0.7, dx = Math.cos(angle) * 0.7;
      const perpX = 0.005 * cnt * dy, perpY = -0.005 * cnt * dx;
      X += dx; Y += dy;
      angle += rnd.nextFloat() * 0.08 - 0.04;               // jitter ±0.04 rad
      stripLine(X, Y, X + perpX, Y + perpY, cnt);
      stripLine(X + dx, Y + dy, X + dx + perpX, Y + dy + perpY, cnt);
      if (rnd.next(20) === 0) {                             // 1/20: spawn a branch
        const k = Math.round(0.2 * cnt);
        const nb = k > 0 ? rnd.next(k) : 0;                 // branch length
        if (nb & 1) {                                       // odd → −45° twig
          const bx = X + 0.005 * (cnt - nb) * dy;
          const by = Y - 0.005 * (cnt - nb) * dx;
          crack(nb, (dy - dx) / Math.SQRT2, (dx + dy) / Math.SQRT2, by, bx);
        } else if (nb > 0) {                                // even → +45° twig
          const A = (dx + dy) / Math.SQRT2, C = (dx - dy) / Math.SQRT2;
          const bx = X + 0.005 * nb * (dy - A);
          const by = Y - 0.005 * nb * (dx - C);
          crack(nb, (dx + dy) / Math.SQRT2, (dx - dy) / Math.SQRT2, by, bx);
          X += 0.005 * nb * dy;                             // parent shifts (347c..34f9)
          Y -= 0.005 * nb * dx;
        }
        cnt -= nb;
      }
      cnt--;
    }
  }
  crack(count, vy, vx, Y0, X0);

  // damage: tanks inside the fissure's bbox lose 50% crew (unless Quake Protection),
  // plus the common direct blast at the epicentre.
  const minX = Math.max(box.minX, 4), maxX = Math.min(box.maxX, 635),
        maxY = Math.min(box.maxY, 475);
  let menKilled = 0;
  for (let i = 0; i < players.length; i++) {
    const t = players[i];
    if (!t.alive || t.hasQuake) continue;
    if (t.x >= minX && t.x <= maxX && t.y <= maxY) {
      const before = t.crew;
      t.crew = Math.floor(t.crew / 2);                      // exact integer halve
      t.power = Math.min(t.power, 10 * t.crew);
      if (i !== shooterIdx) menKilled += (before - t.crew);
    }
  }
  menKilled += applyBlastDamage(players, shooterIdx, impact, 30);
  // dispatch (0xc394..0xc43c) expands the collapse box by ±B(=30) around the impact
  const cbox = {
    minX: Math.max(4, Math.min(minX, impact.x - 30)),
    maxX: Math.min(635, Math.max(maxX, impact.x + 30)),
    maxY: Math.min(475, Math.max(maxY, impact.y + 30)),
  };
  return { menKilled, anim: { kind: 'ops', ops }, box: cbox };
}

// ---- category 2: Ping Pong Jack — DECOMPILED 1:1 from sub_371d (all TP-real
// constants decoded). The routine has TWO loops:
//   LOOP 1 (descent, 0x37ef): vx,vy ÷ 3.0; per step pos += vel; if the Reflecting-Walls
//     flag [0xcf7] is set, bounce off x=635 (→625) / x=4 (→14) / ceiling y=63 (→64),
//     flipping the matching velocity; vy += 0.00012222 (=0.0011/9); erase a 21-px swath
//     (round(x)−10..+10) with Sound(1000−y). Runs until y ≥ 475 (floor). Busy-wait 1.0.
//   LOOP 2 (bounce-back, 0x3a6c): from the floor the ball carves straight UP through its
//     landing swath until it rises above the terrain there (while min_surface ≤ y: y−−,
//     erase swath). This is the "ping-pong" return and is NOT gated by the reflect flag.
//     Busy-wait 3.0 (3× slower than the descent).
// The direct blast (B=10) is at the ORIGINAL impact; the dug channel then collapses
// (sub_625d) and path casualties come from fall damage.
function effectPingPong(vga, players, shooterIdx, impact, vel, B, reflect) {
  const W = vga.W, ops = [];
  const box = { minX: 635, maxX: 4, maxY: 63 };
  let x = impact.x, y = impact.y;
  let vx = vel.x / 3.0, vy = vel.y / 3.0;               // velocities ÷ 3.0
  // erase the 21-px horizontal swath (round(x)−10..+10, clamped 4..635) at row round(y)
  const swath = (cx, cy, cost) => {
    const rx = Math.round(cx), ry = Math.round(cy);
    if (ry < 63 || ry > 475) { ops.push({ px: [], f: 0, cost }); return; }
    const xl = Math.max(4, rx - 10), xr = Math.min(635, rx + 10), px = [];
    for (let xx = xl; xx <= xr; xx++) { const idx = ry * W + xx; if (vga.buf[idx] === COL.GROUND) px.push(idx); }
    if (px.length) {
      if (xl < box.minX) box.minX = xl; if (xr > box.maxX) box.maxX = xr;
      if (ry > box.maxY) box.maxY = ry;
    }
    ops.push({ px, f: Math.max(0, 1000 - ry), cost });
  };
  // ---- LOOP 1 (0x37ef): parabolic descent to the floor (y ≥ 475). Wall/ceiling bounces
  // are gated by the Reflecting-Walls flag [0xcf7]; busy-wait factor 1.0/step.
  let guard = 0;
  while (Math.round(y) < 475 && guard++ < 12000) {
    x += vx; y += vy;                                   // RADD position
    if (reflect) {
      if (Math.round(x) + 10 >= 635) { x = 625; vx = -vx; }        // right wall
      else if (Math.round(x) - 10 <= 4) { x = 14; vx = -vx; }      // left wall
      if (Math.round(y) <= 63) { y = 64; vy = -vy; }               // ceiling
    }
    vy += 0.00012222;                                   // gravity (=0.0011/9)
    swath(x, y, 21);
  }
  // ---- LOOP 2 (0x3a6c): THE BOUNCE-BACK — from the floor the ball carves straight UP
  // through its landing swath until it rises above the terrain there. NOT gated by the
  // reflect flag (this is the ping-pong's defining behaviour); busy-wait factor 3.0/step.
  const rx = Math.round(x), xl = Math.max(4, rx - 10), xr = Math.min(635, rx + 10);
  let minSurf = 475;                                    // topmost stored ground in the swath
  for (let xx = xl; xx <= xr; xx++) { const s = surfaceYAt(vga, xx); if (s < minSurf) minSurf = s; }
  let ry = Math.round(y);
  guard = 0;
  while (minSurf <= ry && ry > 63 && guard++ < 600) {
    ry -= 1;                                            // rise one pixel
    swath(x, ry, 63);                                   // factor 3.0 ⇒ 3× the descent cost
  }
  const menKilled = applyBlastDamage(players, shooterIdx, impact, B);  // B=10 at ORIGINAL impact
  const cbox = {
    minX: Math.max(4, Math.min(box.minX, impact.x - B)),
    maxX: Math.min(635, Math.max(box.maxX, impact.x + B)),
    maxY: Math.min(475, Math.max(box.maxY, impact.y + B)),
  };
  return { menKilled, anim: { kind: 'ops', ops }, box: cbox };
}

// ---- category 3/4: CR-Inducer / Julia — DECOMPILED 1:1 from sub_2307 (recursive
// direction fractal, a space-filling-curve "eater") + driver sub_2b8c + dispatch:
//   size = B·64 (256/512), start = impact, dir = 2 (east) if vx>0 else 3 (west);
//   CR-Inducer: fractal flag = 1 (each expansion slot picks its ALT direction with
//   p=1/2 via Random(10) odd) — chaotic chain-reaction; Julia: flag = 0 → strictly
//   deterministic, self-similar. Base case (size==1): move 1 px (dirs 1,2:x+ 3,4:x−
//   5,6:y+ 7,8:y−), clip x∈[4,635], y≤475 (y≥63 when erasing), eat only GROUND
//   (continuous 500 Hz while eating). Production rules extracted from 0x2466..0x2b86:
//   each dir expands into 4 half-size sub-curves [alt|deterministic]:
const FRACTAL_RULES = {
  1: [[7, 8], [1, 2], [6, 5], [1, 2]],
  2: [[2, 1], [5, 6], [2, 1], [8, 7]],
  3: [[3, 4], [8, 7], [3, 4], [5, 6]],
  4: [[6, 5], [4, 3], [7, 8], [4, 3]],
  5: [[2, 1], [5, 6], [3, 4], [5, 6]],
  6: [[6, 5], [4, 3], [6, 5], [1, 2]],
  7: [[7, 8], [1, 2], [7, 8], [4, 3]],
  8: [[3, 4], [8, 7], [2, 1], [8, 7]],
};
const EATER_MOVE_COST = 0.5;   // integer-only work ≈ half a soft-float sample

function effectEater(vga, players, shooterIdx, impact, B, dirx, fractal, rnd) {
  const W = vga.W, size = B * 64;                       // 256 or 512 (B<<6 in 0xc56c)
  const ops = [];
  const box = { minX: 635, maxX: 4, maxY: 63 };
  const pos = { x: impact.x, y: impact.y };
  // batch base moves into ops so the queue stays manageable
  let batch = { px: [], f: 500, cost: 0 };
  const flush = () => { if (batch.cost > 0) { ops.push(batch); batch = { px: [], f: 500, cost: 0 }; } };
  function walk(sz, dir) {
    if (sz === 1) {                                      // base case: 1-px move + eat
      if (dir === 1 || dir === 2) pos.x++;
      else if (dir === 3 || dir === 4) pos.x--;
      else if (dir === 5 || dir === 6) pos.y++;
      else pos.y--;
      batch.cost += EATER_MOVE_COST;
      if (pos.x < 4 || pos.x > 635 || pos.y > 475 || pos.y < 63) return;   // clip (erase mode)
      const idx = pos.y * W + pos.x;
      if (vga.buf[idx] !== COL.GROUND) return;
      batch.px.push(idx);
      if (pos.x < box.minX) box.minX = pos.x; if (pos.x > box.maxX) box.maxX = pos.x;
      if (pos.y > box.maxY) box.maxY = pos.y;
      if (batch.px.length >= 48) flush();
      return;
    }
    const half = sz >> 1;
    for (const [alt, det] of FRACTAL_RULES[dir]) {
      const d = (fractal && (rnd.next(10) & 1)) ? alt : det;   // Random(10) odd → alt
      walk(half, d);
    }
  }
  walk(size, dirx > 0 ? 2 : 3);
  flush();
  const menKilled = applyBlastDamage(players, shooterIdx, impact, B);   // raw B (4/8)
  // dispatch expands the collapse box by ±B around the impact (0xc5d8ff)
  box.minX = Math.max(4, Math.min(box.minX, impact.x - B));
  box.maxX = Math.min(635, Math.max(box.maxX, impact.x + B));
  box.maxY = Math.min(475, Math.max(box.maxY, impact.y + B));
  return { menKilled, anim: { kind: 'ops', ops }, box };
}

// ---- category 5: Captain Caveman (sub_3bb7) ----
// Bores a horizontal TUNNEL at the shot's row through the hills in the shot direction,
// leaving a ~9px roof; stops at the first valley (surface at/below the shot row). Direct
// blast B=5 at the impact.
// ---- category 5: Captain Caveman — DECOMPILED 1:1 from sub_3bb7 (three walk phases +
// dig, all with the bounds test sub_3b4d = x∈[4,635] and the advance sub_3b7f = x±1 in
// the shot direction):
//   PHASE 1 (0x3bcb): advance from the impact until the pixel AT THE SHOT ROW is ground
//     (reach a hill face) — or run off the map.
//   PHASE 2 (0x3bee): keep advancing while the hill is shallow (surface+8 ≥ Y) and there
//     is still ground — i.e. skip low ground until a hill that rises >8 px above the row.
//   PHASE 3 (0x3c28): while surface+8 < Y (a tall hill), bore the column: erase rows
//     surface+9 .. Y (leaving a 9-px roof), Sound(700) per column; stop at the valley.
function effectCaveman(vga, players, shooterIdx, impact, dirx) {
  const W = vga.W, Y = impact.y, ops = [];
  const box = { minX: 635, maxX: 4, maxY: Math.min(475, Y + 1) };
  const inB = (x) => x >= 4 && x <= 635;
  const isGnd = (x, y) => (y >= 63 && y <= 475 && vga.buf[y * W + x] === COL.GROUND);
  let x = impact.x, g;
  // PHASE 1: walk to the hill face (first ground pixel at the shot row)
  g = 0; while (inB(x) && g++ < 2000 && !isGnd(x, Y)) x += dirx;
  // PHASE 2: skip shallow ground until a tall hill (surface+8 < Y); stop if no ground
  g = 0;
  while (inB(x) && g++ < 2000) {
    if (surfaceYAt(vga, x) + 8 < Y) break;               // tall hill reached -> dig
    if (!isGnd(x, Y)) break;                              // ran into open space -> stop
    x += dirx;
  }
  // PHASE 3: bore through the tall hill, leaving a 9-px roof, until the valley
  g = 0;
  while (inB(x) && g++ < 2000) {
    const s = surfaceYAt(vga, x);
    if (s + 8 >= Y) break;                                // no longer a tall hill -> stop
    const px = [];
    for (let yy = s + 9; yy <= Y; yy++) { const idx = yy * W + x; if (vga.buf[idx] === COL.GROUND) px.push(idx); }
    if (x < box.minX) box.minX = x; if (x > box.maxX) box.maxX = x;
    ops.push(op(vga, px, 700, (Y - s) * 0.5 + 1));       // pulsed 700 Hz per column
    x += dirx;
  }
  const menKilled = applyBlastDamage(players, shooterIdx, impact, 5);
  const cbox = {
    minX: Math.max(4, Math.min(box.minX, impact.x - 5)),
    maxX: Math.min(635, Math.max(box.maxX, impact.x + 5)),
    maxY: box.maxY,
  };
  return { menKilled, anim: { kind: 'ops', ops }, box: cbox };
}

// ---- terrain collapse — DECOMPILED 1:1 from sub_625d (runs after EVERY impact over
// the effect's bounding box): per column, the surface descends over eaten空 air; then
// repeated sweeps: scan `top` down through the solid block to the first gap, `bot` to
// the next ground below; while a gap exists, ONE pixel per sweep falls — the column's
// SURFACE pixel is erased and a ground pixel appears at the gap's top (the block sinks),
// with a Sound(500)/NoSound pulse per moved pixel — until nothing moves any more.
// Works on a scratch copy of the post-carve world layer; returns animation ops
// ({px: clear→sky, add: set→ground}) in the original's sweep order.
function simulateCollapse(buf, W, box) {
  const minX = Math.max(4, Math.min(635, box.minX));
  const maxX = Math.max(4, Math.min(635, box.maxX));
  const maxY = Math.max(63, Math.min(475, box.maxY));
  if (minX > maxX) return [];
  const G = COL.GROUND;
  const ops = [];
  const n = maxX - minX + 1;
  const surf = new Int32Array(n), top = new Int32Array(n), bot = new Int32Array(n);
  const done = new Uint8Array(n);
  for (let i = 0; i < n; i++) {                       // phase A: surface per column
    const x = minX + i;
    let s = FIELD.YTOP;
    while (s < maxY && buf[s * W + x] !== G) s++;
    surf[i] = s;
    if (s === maxY) { done[i] = 1; continue; }        // original: surf==maxY → done
    top[i] = s; bot[i] = s;
  }
  let scanCost = 0;
  for (let changed = true, guard = 0; changed && guard < 8192; guard++) {  // phase B
    changed = false;
    for (let i = 0; i < n; i++) {
      if (done[i]) continue;
      const x = minX + i;
      if (top[i] >= bot[i]) {
        while (top[i] <= maxY && buf[top[i] * W + x] === G) { top[i]++; scanCost += 0.25; }
        if (top[i] > maxY) { done[i] = 1; continue; }
        bot[i] = top[i];
        while (bot[i] <= maxY && buf[bot[i] * W + x] !== G) { bot[i]++; scanCost += 0.25; }
        changed = true;
      } else {
        top[i]++;                                     // drop ONE pixel (sub_625d 63b6..640e)
        const clearIdx = surf[i] * W + x;
        surf[i]++;
        const setIdx = (top[i] - 1) * W + x;
        buf[clearIdx] = COL.SKY;
        buf[setIdx] = G;
        ops.push({ px: [clearIdx], add: [setIdx], f: 500, cost: 1 + scanCost });
        scanCost = 0;
        changed = true;
      }
    }
  }
  return ops;
}




// ===== physics.js =====
// physics.js — the projectile integrator, faithful to sub_bd08 (launch) and
// sub_b785 (step loop) in the original (re/spec_physics.md §1, §6).
//
// Equations of motion (explicit Euler, dt = 1 per step, position accumulated in
// full precision, only a rounded copy used for pixel tests):
//   VX0 =  0.003 * Power * cos(Angle°)
//   VY0 = -0.003 * Power * sin(Angle°)      (y-down, so -sin = upward)
//   each step:  X += VX;  Y += VY;
//               [reflecting-walls bounce];
//               VX += Wind * 1e-6;  VY += 0.0011 (gravity)
// Collision: leading-corner pixel not in {0 sky, 15 trace} and inside the field.
//
// Trig: original 0x144f=Cos, 0x1462=Sin (spec_physics §0).





const V_SCALE = 0.003;
const GRAVITY = 0.0011;
const WIND_SCALE = 1e-6;
const STEP_CAP = 20000;

// Create a projectile state from a firing tank.
function launch(tank) {
  const rad = tank.angle * Math.PI / 180;
  const m = muzzle(tank);
  return {
    x: m.x, y: m.y,
    vx:  V_SCALE * tank.power * Math.cos(rad),
    vy: -V_SCALE * tank.power * Math.sin(rad),
    prevX: m.x, prevY: m.y,
    steps: 0,
    done: false,
    impact: null,     // {x,y} rounded, set on terrain/tank hit
    offArena: false,  // fell off bottom / stepcap without hitting
  };
}

// Test whether the rounded (x,y) is a solid impact pixel. Ignores sky, the trajectory
// trace, and the projectile's own marker colour (never self-collide).
function impactAt(vga, x, y) {
  const rx = Math.round(x), ry = Math.round(y);
  if (!(rx > FIELD.X0 && rx < FIELD.X1 && ry > FIELD.YTOP && ry < FIELD.YBOT)) return false;
  const c = vga.getPixel(rx, ry);
  return c !== COL.SKY && c !== COL.TRACE && c !== COL.PROJECTILE;
}

// Advance one integration step. Mutates `p`. Handles bounce/collision/termination.
// `opts`: {reflect:bool, wind:int}. Does NOT draw (caller draws marker/trace).
function step(vga, p, opts) {
  if (p.done) return;
  p.steps++;

  // 1-2: position update (dt = 1), pre-gravity velocity.
  p.prevX = p.x; p.prevY = p.y;
  p.x += p.vx;
  p.y += p.vy;

  // reflecting-walls bounce (after position, before gravity)
  if (opts.reflect) {
    if (p.x + 1 >= FIELD.X1) { p.x = FIELD.X1 - 1; p.vx = -p.vx; }
    else if (p.x <= FIELD.X0) { p.x = FIELD.X0; p.vx = -p.vx; }
    if (p.y + 1 >= FIELD.YBOT) { p.y = FIELD.YBOT - 1; p.vy = -p.vy; }
    else if (p.y <= FIELD.YTOP) { p.y = FIELD.YTOP; p.vy = -p.vy; }
  }

  // accelerations
  p.vx += opts.wind * WIND_SCALE;
  p.vy += GRAVITY;

  // leading-corner pixel selection by velocity signs
  let cx = p.x, cy = p.y;
  if (p.vx > 0) cx = p.x + 1;
  if (p.vy > 0) cy = p.y + 1;

  if (impactAt(vga, cx, cy)) {
    p.impact = { x: Math.round(p.x), y: Math.round(p.y) };
    p.done = true;
    return;
  }
  // termination: fell off the bottom, or safety cap
  if (p.y >= FIELD.YBOT) { p.offArena = true; p.done = true; return; }
  if (p.steps > STEP_CAP) { p.offArena = true; p.done = true; return; }
}



// Wind generation, faithful to db1f..db98: Wind = round(1000*(2*RandomR-1)^5),
// integer in [-1000,1000], calm-biased. Sign = direction.
function generateWind(rnd) {
  const r = 2 * rnd.nextFloat() - 1;
  return Math.round(1000 * Math.pow(r, 5));
}


// ===== ai.js =====
// ai.js — computer players, DECOMPILED from the aim brains and the CPU dispatcher in
// sub_da0c (re/spec_rules.md §5). Aim is CLOSED-FORM (no iteration):
//   * sub_d2c8  parabolic lob  — angle 45/135, ballistic power (Ballisto, Jack-no-PP)
//   * sub_d61a  direct fire     — arctan barrel, full power (Terminator, non-reflect)
//   * sub_d48a  reflection aim  — arctan to a mirrored target (Terminator, reflect walls)
//   * sub_d17a  Jack's PP lob   — parabolic but aimed at the FIELD BOTTOM, half error
// A single multiplicative range error (sub_0361) is applied. The error value P is the
// per-match "computer error rate" ([0x176e], default 10); it HALVES once per completed
// turn-cycle (sub at 0xd0d0), NOT per shot — the game loop drives that decay.
//
// Verified constants: gravity G = 0.0011 (real 1b77 e00d 102d), INV_C = 333.333 = 1/0.003
// (real ab89 aaaa 26aa), RAD2DEG = 57.2958 (real 1e86 e0d3 652e).



const G = 0.0011;
const INV_C = 1000 / 3;         // 333.333…
const RAD2DEG = 180 / Math.PI;  // 57.2958…
const FIELD_BOTTOM = 475;       // 0x1db — Jack lobs toward here (+16)

// sub_0361: range-error factor = (100 − arg + 2·arg·RandomR)/100 = 1 + (arg/100)·(2R−1).
// The caller passes the EXACT numerator `arg` the original feeds in: P+1 for the parabolic/
// direct/reflect brains (they RADD 1.0), P/2 for Jack's PP lob (RDIV 2.0).
function errFactor(arg, rnd) {
  return (100 - arg + 2 * arg * rnd.nextFloat()) / 100;
}

// sub_d2c8 — parabolic lob. angle 45 (target right) / 135 (left); dXe = |factor·(|Δx|−11)|;
// power = min(10·crew, round(333.333·√(0.0011·dXe² / (dXe + (Δy+11))))). denom≤0 ⇒ max power.
function solveParabolic(shooter, target, P, rnd) {
  const angle = target.x > shooter.x ? 45 : 135;
  const dXe = Math.abs(errFactor(P + 1, rnd) * (Math.abs(target.x - shooter.x) - 11));
  const denom = dXe + ((target.y - shooter.y) + 11);
  // denom ≤ 0 (target far above): sub_d2c8 @0xd444 gives up — full power AND forces the
  // weapon to 3 (5 MT Nuke); `giveUp` tells the caller to scan from 3 instead of 2.
  if (denom <= 0) return { angle, power: 10 * shooter.crew, giveUp: true };
  const power = Math.max(0, Math.min(10 * shooter.crew,
    Math.round(INV_C * Math.sqrt((G * dXe * dXe) / denom))));
  return { angle, power };
}

// sub_d17a — Jack's Ping-Pong lob: identical to the parabolic solve BUT the denominator
// uses the field bottom (491 − shooter.y) so the shot lobs the full width, and the error
// arg is P/2 (Jack aims WELL). Weapon forced to Ping-Pong.
function solveJack(shooter, target, P, rnd) {
  const angle = target.x > shooter.x ? 45 : 135;
  const dXe = Math.abs(errFactor(P / 2, rnd) * (Math.abs(target.x - shooter.x) - 11));
  const denom = dXe + (FIELD_BOTTOM + 16 - shooter.y);   // 491 − shooter.y (always > 0)
  const power = Math.max(0, Math.min(10 * shooter.crew,
    Math.round(INV_C * Math.sqrt((G * dXe * dXe) / denom))));
  return { angle, power, weapon: WPN.PINGPONG };
}

// sub_d61a — direct fire. K = factor·(Δx); K=0 ⇒ 90°; K>0 ⇒ round(atan((Sy−Ty)/K)·°);
// K<0 ⇒ 180 − round(atan((Ty−Sy)/K)·°). power = 10·crew.
function solveDirect(shooter, target, P, rnd) {
  const K = errFactor(P + 1, rnd) * (target.x - shooter.x);
  let angle;
  if (K === 0) angle = 90;
  else if (K > 0) angle = Math.round(Math.atan((shooter.y - target.y) / K) * RAD2DEG);
  else angle = 180 - Math.round(Math.atan((target.y - shooter.y) / K) * RAD2DEG);
  return { angle, power: 10 * shooter.crew };
}

// sub_d48a — reflection-mode aim. K = factor·(Δx); N = target.y + shooter.y − 126;
// target right ⇒ round(atan(N/K)·°); left ⇒ 180 − round(atan(N/(−K))·°). power = 10·crew.
function solveReflect(shooter, target, P, rnd) {
  const K = errFactor(P + 1, rnd) * (target.x - shooter.x);
  const N = target.y + shooter.y - 126;
  let angle;
  if (target.x > shooter.x) angle = (K === 0) ? 90 : Math.round(Math.atan(N / K) * RAD2DEG);
  else { const Kn = (K !== 0) ? -K : 1e-9; angle = 180 - Math.round(Math.atan(N / Kn) * RAD2DEG); }
  return { angle, power: 10 * shooter.crew };
}

// --- target selection ---------------------------------------------------------
// sub_086e: alive, non-self, NO parachute, minimum Y (highest on screen); if none
// unprotected, ignore protection; else any alive.
function pickLowestUnprotected(players, shooterIdx) {
  let best = null, bestY = Infinity;
  for (let i = 0; i < players.length; i++) {
    const t = players[i];
    if (i === shooterIdx || !t.alive || t.hasParachute) continue;
    if (t.y < bestY) { bestY = t.y; best = t; }
  }
  if (best) return best;
  for (let i = 0; i < players.length; i++) {
    const t = players[i];
    if (i === shooterIdx || !t.alive) continue;
    if (t.y < bestY) { bestY = t.y; best = t; }
  }
  return best;
}

function nearestEnemy(players, shooterIdx) {
  const s = players[shooterIdx];
  let best = null, bestD = Infinity;
  for (let i = 0; i < players.length; i++) {
    if (i === shooterIdx || !players[i].alive) continue;
    const d = Math.abs(players[i].x - s.x);
    if (d < bestD) { bestD = d; best = players[i]; }
  }
  return best;
}

// sub_0467: among alive non-self SLOTS (turn-order), the one whose tank has MAX wins
// (priority byte +0x3a), tiebreak MAX points (+0x32). Returns a slot index.
function pickMostWinsSlot(players, ctx, selfSlot) {
  let bestSlot = selfSlot, bestWins = -1, bestPts = -1;
  for (let s = 0; s < players.length; s++) {
    const t = players[ctx.order[s]];
    if (s === selfSlot || !t.alive) continue;
    // NOTE: `>=` on points (not `>`) — sub_0467 @0x04fa updates on ties, keeping the LAST match.
    if (t.wins > bestWins || (t.wins === bestWins && t.points >= bestPts)) { bestWins = t.wins; bestPts = t.points; bestSlot = s; }
  }
  return bestSlot;
}

// sub_071a / sub_07c4: Σ(self.y − other.y) over alive tanks that stand HIGHER than self,
// scanning forward (nextAliveSlot) / backward (prevAliveSlot) through the turn order until
// the slot index wraps back past self. A big sum ⇒ many low targets on that side.
function heightSum(players, ctx, selfSlot, forward) {
  const self = players[ctx.order[selfSlot]];
  let sum = 0, s = forward ? ctx.nextAliveSlot(selfSlot) : ctx.prevAliveSlot(selfSlot);
  while (forward ? (s > selfSlot) : (s < selfSlot)) {
    const o = players[ctx.order[s]];
    if (o.y < self.y) sum += self.y - o.y;
    s = forward ? ctx.nextAliveSlot(s) : ctx.prevAliveSlot(s);
  }
  return sum;
}

// sub_0530: clear line of sight from tank `fromIdx` to `toIdx` across the terrain surface.
// Walks the straight barrel ray B→A one column at a time; blocked if the surface rises to/
// above the ray. Clear iff it reaches A's column with the ray within 5 px of A.
function hasLineOfSight(players, ctx, fromIdx, toIdx) {
  const B = players[fromIdx], A = players[toIdx];
  if (fromIdx === toIdx || !A.alive || !B.alive) return false;
  const xA = A.x | 0, xB = B.x | 0, yB = B.y | 0;
  const stepX = (xA > xB) ? 1 : -1;
  const slope = (xA === xB) ? 1000 : (A.y - B.y) / (xA - xB);
  let curX = xB, curY = yB;
  for (let g = 0; g < 2050; g++) {
    if (ctx.surfaceY(curX) <= curY) break;      // terrain surface at/above the ray → blocked
    if (curX === xA) break;                       // reached the target column
    curX += stepX;
    curY = (yB - 5) + Math.round(slope * (curX - xB));
  }
  // sub_0530 @0x06c1: clear iff the ray reached A's column AND the target is not far below
  // the SHOOTER — the original tests (A.y − B.y) < 5 (signed), NOT the ray height at A.
  return curX === xA && (A.y - B.y) < 5;
}

function ownsAny(t, weapons) { return weapons.find(w => (t.inventory[w] || 0) > 0) || null; }

// sub_d2c8 / sub_d48a / super-blast weapon pick: from `start`, scan DOWN to the first owned
// weapon (d2c8 wraps 1→10; d48a & the super-blast just decrement toward 1).
function scanWeaponDown(t, start, wrap) {
  let w = start;
  for (let k = 0; k < 13; k++) {
    if ((t.inventory[w] || 0) > 0) return w;
    w = (w === 1) ? (wrap ? 10 : 1) : w - 1;
  }
  return start;
}

// Decide this computer player's move — DECOMPILED 1:1 from the CPU dispatcher in sub_da0c
// (0xe4e4..0xe926). `P` is the live per-match error value ([0x176e]); `reflect` is this
// round's reflecting-walls flag ([0xcf7]); `ctx` carries the turn-order slots ([0x1161]),
// the shooter's slot ([0x1774]) and the terrain surface, for faithful target selection.
function computeMove(players, shooterIdx, P, rnd, reflect, ctx) {
  const t = players[shooterIdx];
  const name = t.personality;

  // Berti / Klaus (0xe411 / 0xe4ae) — first cycle the selected weapon: from the current
  // weapon, step 1→2→…→10→1 skipping unowned; at each OWNED weapon stop with a die roll
  // (Berti RandomN(10)>=8 ≈20 %; Klaus RandomN(10) even ≈50 %). Then pure random aim:
  // angle RandomN(181), power RandomN(5·crew+1).
  if (name === 'Berti' || name === 'Klaus') {
    let w = t.weapon;
    for (let k = 0; k < 40; k++) {
      if ((t.inventory[w] || 0) > 0) {
        const stop = name === 'Berti' ? (rnd.next(10) >= 8) : ((rnd.next(10) & 1) === 0);
        if (stop) break;
      }
      w = (w % 10) + 1;
    }
    return { weapon: w, angle: rnd.next(181), power: rnd.next(5 * t.crew + 1) };
  }

  const hasCtx = !!(ctx && ctx.order);
  const selfSlot = hasCtx ? ctx.slot : 0;
  const tankOf = (slot) => players[ctx.order[slot]];

  // Jack (0xe53b): owns Ping-Pong → sub_d17a (weapon 5) on the lowest UNPROTECTED enemy
  // (sub_086e). Else → sub_d2c8 with error temporarily DOUBLED (arg 2P+1), weapon scan-2.
  if (name === 'Jack') {
    if ((t.inventory[WPN.PINGPONG] || 0) > 0) {
      const target = pickLowestUnprotected(players, shooterIdx) || nearestEnemy(players, shooterIdx);
      if (!target) return { weapon: t.weapon, angle: t.angle, power: t.power };
      const sol = solveJack(t, target, P, rnd);
      return { weapon: WPN.PINGPONG, angle: sol.angle, power: sol.power, ringTarget: target };
    }
    // target: forward random-walk from self slot (0xe577) — stop when back at prev-of-self or 30%
    let target;
    if (!hasCtx) target = nearestEnemy(players, shooterIdx);
    else {
      let s = selfSlot; const stop = ctx.prevAliveSlot(selfSlot);
      while (s !== stop && rnd.next(10) < 7) s = ctx.nextAliveSlot(s);
      target = tankOf(s);
    }
    if (!target) return { weapon: t.weapon, angle: t.angle, power: t.power };
    const sol = solveParabolic(t, target, 3 * P, rnd);   // error TRIPLED (dispatcher 0xe5b3 ×3.0)
    return { weapon: scanWeaponDown(t, sol.giveUp ? 3 : 2, true), angle: sol.angle, power: sol.power, ringTarget: target };
  }

  // Ballisto (0xda02): 50% → most-wins slot (sub_0467); else forward walk (advance, 20% stop).
  if (name === 'Ballisto') {
    let target;
    if (!hasCtx) target = nearestEnemy(players, shooterIdx);
    else {
      let s;
      if ((rnd.next(10) & 1) === 1) s = pickMostWinsSlot(players, ctx, selfSlot);
      else {
        s = selfSlot; const stop = ctx.prevAliveSlot(selfSlot);
        do { s = ctx.nextAliveSlot(s); } while (s !== stop && rnd.next(10) <= 7);
      }
      target = tankOf(s);
    }
    if (!target) return { weapon: t.weapon, angle: t.angle, power: t.power };
    const sol = solveParabolic(t, target, P, rnd);
    return { weapon: scanWeaponDown(t, sol.giveUp ? 3 : 2, true), angle: sol.angle, power: sol.power, ringTarget: target };
  }

  // Terminator / default (0xe683).
  const superW = ownsAny(t, [WPN.EARTHQUAKE, WPN.CR256, WPN.CR512, WPN.JULIA256, WPN.JULIA512, WPN.CAVEMAN]);
  const fSum = hasCtx ? heightSum(players, ctx, selfSlot, true) : 0;
  const bSum = hasCtx ? heightSum(players, ctx, selfSlot, false) : 0;
  // (1) high ground + a directional super-weapon → horizontal blast toward the busier side.
  if ((fSum > 500 || bSum > 500) && superW)
    return { weapon: scanWeaponDown(t, 10, false), angle: (fSum > bSum) ? 0 : 180, power: 10 * t.crew };

  // (2) LOS walk (0xe76c): from a random alive slot, forward to the first target we can see.
  let target, los;
  if (!hasCtx) { target = nearestEnemy(players, shooterIdx); los = !reflect; }
  else {
    let start = rnd.next(players.length);
    while (!players[ctx.order[start]].alive) start = rnd.next(players.length);
    let s = start;
    do { s = ctx.nextAliveSlot(s); if (s === start) break; }
    while (!hasLineOfSight(players, ctx, shooterIdx, ctx.order[s]));
    target = tankOf(s);
    los = hasLineOfSight(players, ctx, shooterIdx, ctx.order[s]);
  }
  if (!target) return { weapon: t.weapon, angle: t.angle, power: t.power };
  // (2a) clear shot → direct fire (sub_d61a). d61a forces the weapon to 2 then scans DOWN
  // with NO wrap (0xd7a4) — same as d48a.
  if (los) {
    const sol = solveDirect(t, target, P, rnd);
    return { weapon: scanWeaponDown(t, 2, false), angle: sol.angle, power: sol.power, ringTarget: target };
  }
  // (2b) no clear shot + reflecting walls → sub_d48a at the most-decorated enemy.
  if (reflect) {
    const tgt = hasCtx ? tankOf(pickMostWinsSlot(players, ctx, selfSlot)) : target;
    const sol = solveReflect(t, tgt, P, rnd);
    return { weapon: scanWeaponDown(t, 2, false), angle: sol.angle, power: sol.power, ringTarget: tgt };
  }
  // (2c) no clear shot, no reflection → blind lob toward the near wall (0xe849). angle
  // 45/135 by slot-vs-random; power = min(10·crew, max(50, RandomN(min(10·crew, wall/2))))
  // — DECOMPILED from 0xe89e..0xe922 (both branches RandomN then MaxLong 50 then MinLong).
  const angle = (selfSlot > rnd.next(players.length)) ? 135 : 45;
  const wallDist = (angle === 45) ? (640 - (t.x | 0)) : (t.x | 0);
  const cap = Math.min(10 * t.crew, Math.floor(wallDist / 2));
  const power = Math.min(10 * t.crew, Math.max(50, rnd.next(Math.max(1, cap))));
  return { weapon: scanWeaponDown(t, 2, false), angle, power };
}

// Frame3D: a bevelled box. raised=true -> light top/left, dark bottom/right.
function frame3D(vga, x1, y1, x2, y2, raised) {
  const light = COL.BEVEL_LIGHT, dark = COL.BEVEL_DARK;
  // Match the original's bevel: a "raised" (flag=1) box has DARK top/left and LIGHT
  // bottom/right (verified from the name box: top/left navy, bottom/right white).
  const a = raised ? dark : light;      // top/left
  const b = raised ? light : dark;      // bottom/right
  vga.line(x1, y2, x1, y1, a);          // left
  vga.line(x1, y1, x2, y1, a);          // top
  vga.line(x2, y1, x2, y2, b);          // right
  vga.line(x2, y2, x1, y2, b);          // bottom
}
function frame3DThick(vga, x1, y1, x2, y2, raised) {
  for (let i = 0; i < 4; i++) frame3D(vga, x1 + i, y1 + i, x2 - i, y2 - i, raised);
}

// wind/angle direction arrow chars (CP437): up 24, down 25, right 26, left 27.
function windArrow(wind) { return wind === 0 ? '↑' : (wind > 0 ? '→' : '←'); }

// ---- weapon icons (sub_4eae): hand-drawn pictograms in colour 14, centre cx = 235+38i ----
// CR/Julia icons (i=6..9) use sub_2b8c: a recursive space-filling-curve walker that plots
// only on background pixels. Production rules + 50% twin-substitution when randomized.
const CR_RULES = { 1: [8, 2, 5, 2], 2: [1, 6, 1, 7], 3: [4, 7, 4, 6], 4: [5, 3, 8, 3],
                   5: [1, 6, 4, 6], 6: [5, 3, 5, 2], 7: [8, 2, 8, 3], 8: [4, 7, 1, 7] };
const CR_TWIN = { 1: 2, 2: 1, 3: 4, 4: 3, 5: 6, 6: 5, 7: 8, 8: 7 };
function crIcon(vga, X, Y, S, seed) {
  let x = X, y = Y;
  const rndBit = () => {                       // TP7 LCG, Odd(Random(10)) twin coin-flip
    if (!seed) return false;
    seed.s = (Math.imul(seed.s, 134775813) + 1) >>> 0;
    return Math.floor(seed.s / 4294967296 * 10) % 2 === 1;   // Random(10) = (seed·10) shr 32
  };
  const step = (d, s) => {
    if (s > 1) { for (const nd of CR_RULES[d]) step(rndBit() ? CR_TWIN[nd] : nd, s >> 1); return; }
    if (d <= 2) x++; else if (d <= 4) x--; else if (d <= 6) y++; else y--;   // unit move
    if (x >= 4 && x <= 635 && y <= 475 && vga.buf[y * vga.W + x] === COL.SKY)
      vga.putPixel(x, y, COL.BEVEL_DARK);      // plot on background only (GetPixel guard)
  };
  step(1, S);
}
function circleOutline(vga, cx, cy, r, c) {    // midpoint circle (BGI Circle)
  let x = r, y = 0, err = 1 - r;
  while (x >= y) {
    for (const [px, py] of [[x, y], [y, x], [-y, x], [-x, y], [-x, -y], [-y, -x], [y, -x], [x, -y]])
      vga.putPixel(cx + px, cy + py, c);
    y++; if (err < 0) err += 2 * y + 1; else { x--; err += 2 * (y - x) + 1; }
  }
}
function drawWeaponIcon(vga, n, cx, crSeed) {
  const c = COL.BEVEL_DARK;
  switch (n) {
    case 1:                                            // HandGrenade: 2×2 dot
      vga.bar(cx - 1, 42, cx, 43, c); break;
    case 2:                                            // 5 kT Nuke: solid disc r4
      vga.fillCircle(cx, 42, 4, c); break;
    case 3:                                            // 5 MT Nuke: solid disc r8
      vga.fillCircle(cx, 42, 8, c); break;
    case 4: {                                          // Earthquake: centre dot + 6 cracks
      vga.putPixel(cx, 42, c);
      for (const [pxo, lxo, ly1, ly2] of [[-7, -8, 45, 39], [-4, -5, 44, 40], [-1, -2, 43, 41],
                                          [1, 2, 43, 41], [4, 5, 44, 40], [7, 8, 45, 39]]) {
        vga.putPixel(cx + pxo, ly1 + 1, c);
        vga.line(cx + lxo, ly1, cx + lxo, ly2, c);
        vga.putPixel(cx + pxo, ly2 - 1, c);
      }
      break;
    }
    case 5:                                            // PingPongJack: dashes + 4-wide pole
      vga.line(cx - 10, 42, cx - 7, 42, c);
      vga.line(cx - 7, 43, cx - 4, 43, c);
      vga.line(cx - 5, 44, cx - 2, 44, c);
      vga.line(cx - 4, 45, cx - 1, 45, c);
      vga.line(cx - 3, 46, cx, 46, c);
      for (let x = cx - 2; x <= cx + 1; x++) vga.line(x, 38, x, 48, c);
      break;
    case 6: crIcon(vga, cx - 3, 45, 8, crSeed); break;   // CRInducer 256 (randomized)
    case 7: crIcon(vga, cx - 7, 45, 16, crSeed); break;  // CRInducer 512 (randomized)
    case 8: crIcon(vga, cx - 3, 45, 8, null); break;     // Julia 256 (deterministic)
    case 9: crIcon(vga, cx - 7, 45, 16, null); break;    // Julia 512 (deterministic)
    case 10: {                                         // Captain Caveman: circle + mound
      circleOutline(vga, cx, 43, 5, c);
      for (let k = 0; k <= 6; k++) vga.line(cx - 6 - k, 42 + k, cx + 6 + k, 42 + k, c);
      break;
    }
  }
}

// ---- the MOUSE AIMING PANEL (sub_557a), shown instead of the name/weapon boxes when the
// mouse-panel mode is active ([0x115f]; toggled by RIGHT CLICK during a human's aim turn).

// ← → buttons, Fire / I / W / max / default-power buttons, +/− power group with readout.

function drawAimPanel(vga, game, p) {

  frame3D(vga, 6, 6, 250, 53, false);
  vga.outText(12, 8, p.name, 1, p.colorIndex);         // name, size 1
  frame3D(vga, 135, 9, 150, 50, false);                // ← button
  frame3D(vga, 152, 9, 228, 50, true);                 // protractor housing (style 1)
  frame3D(vga, 230, 9, 245, 50, false);                // → button
  vga.outText(140, 27, '\x1b', 1, COL.BEVEL_DARK);
  vga.outText(235, 27, '\x1a', 1, COL.BEVEL_DARK);
  vga.line(155, 48, 225, 48, COL.BEVEL_DARK);          // baseline
  for (let a = 0; a <= 180; a += 10) {                 // dot arc, r=35.0
    const r = a * Math.PI / 180;
    vga.putPixel(190 + Math.round(Math.cos(r) * 35), 47 - Math.round(Math.sin(r) * 35), COL.BEVEL_DARK);
  }
  const dot4 = (cx, cy, mid) => {                      // Circle(cx,cy,1) [+ centre pixel]
    vga.putPixel(cx - 1, cy, COL.BEVEL_DARK); vga.putPixel(cx + 1, cy, COL.BEVEL_DARK);
    vga.putPixel(cx, cy - 1, COL.BEVEL_DARK); vga.putPixel(cx, cy + 1, COL.BEVEL_DARK);
    if (mid) vga.putPixel(cx, cy, COL.BEVEL_DARK);
  };
  dot4(190, 47, true); dot4(225, 47); dot4(155, 47); dot4(190, 12);   // hub, 0°, 180°, 90°
  dot4(215, 22, true); dot4(165, 22, true);                            // 45°, 135°
  frame3D(vga, 9, 17, 55, 50, false);  vga.outText(18, 30, 'Fire', 1, COL.BEVEL_DARK);
  frame3D(vga, 57, 17, 73, 27, false); vga.outText(62, 19, 'I', 1, COL.BEVEL_DARK);
  frame3D(vga, 75, 17, 91, 27, false); vga.outText(80, 19, 'W', 1, COL.BEVEL_DARK);
  frame3D(vga, 57, 29, 91, 38, false); vga.outText(63, 30, 'max', 1, COL.BEVEL_DARK);
  frame3D(vga, 57, 40, 91, 50, false); vga.outText(63, 42, '250', 1, COL.BEVEL_DARK);
  frame3D(vga, 94, 17, 133, 50, true);                 // power group (style 1)
  frame3D(vga, 96, 19, 131, 28, false); vga.outText(110, 20, '+', 1, COL.BEVEL_DARK);
  frame3D(vga, 96, 39, 131, 48, false); vga.outText(110, 40, '-', 1, COL.BEVEL_DARK);
  // needle r4→r32 at the current angle, colour [0x1782]=15 (white in-game)
  const na = p.angle * Math.PI / 180;
  vga.line(190 + Math.round(4 * Math.cos(na)), 47 - Math.round(4 * Math.sin(na)),
           190 + Math.round(32 * Math.cos(na)), 47 - Math.round(32 * Math.sin(na)), 15);
  // power readout between +/− (sub_0c31: bg bar then text, colour 15)
  const pw = String(p.power).padStart(4);
  vga.bar(97, 30, 97 + pw.length * 8, 36, COL.SKY);
  vga.outText(97, 30, pw, 1, 15);
  game._panel = [                                      // click regions 11..19
    { id: 'angle+', x1: 135, y1: 9,  x2: 150, y2: 50 },
    { id: 'angle-', x1: 230, y1: 9,  x2: 245, y2: 50 },
    { id: 'power+', x1: 96,  y1: 19, x2: 131, y2: 28 },
    { id: 'power-', x1: 96,  y1: 39, x2: 131, y2: 48 },
    { id: 'invert', x1: 57,  y1: 17, x2: 73,  y2: 27 },
    { id: 'preset', x1: 75,  y1: 17, x2: 91,  y2: 27 },
    { id: 'pmax',   x1: 57,  y1: 29, x2: 91,  y2: 38 },
    { id: 'pdef',   x1: 57,  y1: 40, x2: 91,  y2: 50 },
    { id: 'fire',   x1: 9,   y1: 17, x2: 55,  y2: 50 },
