<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TankWars V2.07 — HTML5 Port</title>
<style>
  html,body{margin:0;padding:0;background:#000;height:100%;display:flex;align-items:center;
    justify-content:center;font-family:monospace;overflow:hidden}
  #screen{image-rendering:pixelated;image-rendering:crisp-edges;width:640px;height:480px;background:#000}
  #overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;color:#eee;
    background:rgba(0,0,0,.9);cursor:pointer;text-align:center;z-index:10}
  #overlay .card{max-width:34em;line-height:1.5}#overlay h1{color:#ff4040;letter-spacing:.1em}
  kbd{background:#222;border:1px solid #555;border-radius:3px;padding:0 .3em}
  .btn{display:inline-block;margin-top:1em;padding:.5em 1.1em;background:#2851ff;color:#fff;
    border-radius:5px;cursor:pointer;font-weight:bold;border:1px solid #6f8cff}
  .btn:hover{background:#3f66ff}
  #docview{position:fixed;inset:0;z-index:20;display:none;background:#0d1b3e;color:#e6ecff;
    overflow:auto;padding:2em 1em;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
  #docview .doc{max-width:52em;margin:0 auto;line-height:1.6}
  #docview h1,#docview h2,#docview h3{color:#8fb0ff;border-bottom:1px solid #24366b;padding-bottom:.2em}
  #docview h1{color:#ff6a6a}
  #docview code{background:#1b2b57;padding:.1em .35em;border-radius:3px;font-size:.9em}
  #docview pre{background:#101d40;padding:1em;border-radius:6px;overflow:auto}
  #docview pre code{background:none;padding:0}
  #docview table{border-collapse:collapse;margin:1em 0;display:block;overflow:auto}
  #docview th,#docview td{border:1px solid #2d427f;padding:.3em .6em;text-align:left}
  #docview th{background:#1b2b57}
  #docview a{color:#8fb0ff}
  #docview blockquote{border-left:3px solid #3f66ff;margin:1em 0;padding:.2em 1em;background:#101d40}
  #docclose{position:fixed;top:1em;right:1em;z-index:21}
  #doclang{position:fixed;top:1em;right:8.5em;z-index:21}
  #langtoggle{margin-top:.9em;font-size:.85em;opacity:.85;cursor:pointer;text-decoration:underline}
</style>
</head>
<body>
  <canvas id="screen" width="640" height="480"></canvas>
  <div id="overlay"><div class="card">
    <h1>TankWars&nbsp;V2.07</h1>
    <p id="ovDesc">Faithful HTML5 port of the DOS game by Marko Lindner (1995/96).</p>
    <p id="ovStart"><b>Click to start</b> (enables sound).</p>
    <p id="ovKeys" style="font-size:.85em;opacity:.7"></p>
    <div class="btn" id="docbtn">📖 Show documentation</div>
    <div id="langtoggle">Deutsch</div>
  </div></div>
  <div id="docview"><div class="btn" id="docclose">✕ Close</div><div class="btn" id="doclang">Deutsch</div><div class="doc" id="doccontent"></div></div>
<script type="module" src="js/main.js"></script>
</body>
</html>
